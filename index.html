<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reunião de Pais 2026 - Kumon Rio Preto Shopping</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Script Oficial Cloudinary -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <!-- FIREBASE COMPAT (Garante que funcione localmente sem problemas de Módulos) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        /* BLOQUEIO FÍSICO DO ECRÃ (Zero Scroll) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Poppins', sans-serif;
            touch-action: none;
        }

        /* ARQUITETURA DO VIEWPORT ABSOLUTO */
        #app-container {
            width: 100vw; height: 100vh;
            background-color: white;
            position: relative;
        }

        .bg-blobs::before {
            content: ''; position: absolute; top: -10vh; right: -5vw; width: 40vmin; height: 40vmin;
            background: radial-gradient(circle, rgba(0, 174, 239, 0.08) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }
        .bg-blobs::after {
            content: ''; position: absolute; bottom: -10vh; left: -5vw; width: 50vmin; height: 50vmin;
            background: radial-gradient(circle, rgba(243, 146, 0, 0.05) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }

        /* CORES INSTITUCIONAIS */
        :root {
            --k-blue: #00AEEF;
            --k-dark: #004578;
            --k-orange: #F39200;
            --k-yellow: #FFB703;
            --txt-main: #334155;
        }

        /* TIPOGRAFIA MATEMÁTICA */
        .txt-mega { font-family: 'Nunito', sans-serif; font-size: 8vmin; font-weight: 900; line-height: 1.1; color: var(--k-dark); text-transform: uppercase; }
        .txt-title { font-family: 'Nunito', sans-serif; font-size: 5vmin; font-weight: 900; color: var(--k-dark); text-transform: uppercase; }
        .txt-sub { font-size: 3vmin; font-weight: 700; letter-spacing: 0.3vmin; color: var(--k-blue); text-transform: uppercase; }
        .txt-body { font-size: 2.5vmin; font-weight: 600; color: var(--txt-main); line-height: 1.3; }
        .txt-small { font-size: 1.5vmin; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1vmin; }
        
        .icon-xl { font-size: 12vmin; }
        .icon-lg { font-size: 6vmin; }
        .icon-md { font-size: 3.5vmin; }

        /* GESTÃO DE ÁREAS DA TELA (Ancoradas rigidamente) */
        .progress-bar { 
            position: absolute; top: 0; left: 0; height: 1vh; width: 0%; 
            background: var(--k-orange); transition: width 0.3s; z-index: 1000; 
        }
        
        .header-area {
            position: absolute; top: 1vh; left: 0; height: 11vh; width: 100%;
            display: flex; align-items: center; padding: 0 5vw; 
            border-bottom: 0.2vh solid #f1f5f9; z-index: 100;
        }
        
        .main-area {
            position: absolute; top: 0; left: 0; height: 100vh; width: 100vw;
            padding-top: 12vh; padding-bottom: 12vh;
            display: flex; flex-direction: column; justify-content: center; z-index: 10;
        }
        
        /* FOOTER ABSOLUTAMENTE TRAVADO */
        .footer-area {
            position: absolute; bottom: 0; left: 0; height: 12vh; width: 100%; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5vw; border-top: 0.2vh solid #f1f5f9; z-index: 100; background: white;
        }

        /* LAYOUTS INTERNOS */
        .slide { display: none; width: 100%; height: 100%; flex-direction: column; padding: 0 5vw; }
        .slide.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .flex-row-locked { display: flex; flex-direction: row; gap: 4vw; height: 100%; align-items: center; }
        .flex-col-locked { display: flex; flex-direction: column; gap: 2vh; height: 100%; justify-content: center; }
        
        .grid-locked { display: grid; gap: 2vmin; height: 100%; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        @media (orientation: portrait) {
            .flex-row-locked { flex-direction: column; justify-content: space-evenly; gap: 2vh; }
            .grid-2, .grid-4 { grid-template-columns: 1fr; grid-auto-rows: minmax(0, 1fr); }
            .txt-mega { font-size: 10vmin; }
            .txt-title { font-size: 7vmin; }
            .txt-body { font-size: 3.5vmin; }
            .media-box { height: 30vh !important; } 
        }

        /* ELEMENTOS VISUAIS */
        .card-box {
            background: white; padding: 2vmin 3vmin; border-radius: 2vmin;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.08); border-left: 1vmin solid var(--k-blue);
            display: flex; align-items: center; gap: 3vmin; flex: 1; min-height: 0;
        }
        
        .grid-card {
            background: white; padding: 3vmin; border-radius: 3vmin;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.08); border-bottom: 1vmin solid var(--k-orange);
            display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; min-height: 0;
        }

        .media-box {
            background: black; border-radius: 3vmin; overflow: hidden;
            width: 100%; height: 100%; border: 0.5vmin solid white; box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.2);
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .media-box img, .media-box video, .media-box iframe { width: 100%; height: 100%; object-fit: cover; border: none; }

        /* BOTÕES DO RODAPÉ */
        .btn-nav {
            height: 8vh; width: 8vh; border-radius: 50%; background: #f1f5f9; color: var(--k-dark);
            display: flex; align-items: center; justify-content: center; font-size: 3vh; cursor: pointer;
            border: none; transition: 0.2s; box-shadow: 0 0.5vh 1vh rgba(0,0,0,0.05);
        }
        .btn-nav:active { transform: scale(0.9); }
        .btn-logo {
            height: 10vh; width: 10vh; border-radius: 50%; background: var(--k-blue); color: white;
            display: flex; align-items: center; justify-content: center; font-size: 4vh; font-weight: 900; cursor: pointer;
            border: none; box-shadow: 0 1vh 2vh rgba(0,174,239,0.3); transition: 0.2s;
        }

        /* ==========================================
           MODO GESTOR (*177) - DISTINÇÃO CLARA
           ========================================== */
           
        /* 1. Blocos de Texto (Laranja) -> Para LINKS */
        .admin-mode .editable {
            outline: 0.4vmin dashed var(--k-orange); position: relative; cursor: pointer; border-radius: 1vmin;
            transition: background 0.2s;
        }
        .admin-mode .editable:hover { background: rgba(243, 146, 0, 0.1); }
        .admin-mode .editable::before {
            content: '🔗 ADD LINK'; position: absolute; top: -2.5vmin; left: 0; background: var(--k-orange); color: white;
            font-size: 1.5vmin; font-weight: bold; padding: 0.2vmin 1vmin; border-radius: 0.5vmin; z-index: 100;
        }
        
        /* 2. Áreas de Imagem/Vídeo (Azul) -> Para UPLOAD CLOUDINARY */
        .admin-mode .editable-media { 
            outline: 0.6vmin dashed var(--k-blue); 
            cursor: pointer; 
            position: relative;
        }
        .admin-mode .editable-media::after {
            content: '📸 ENVIAR VÍDEO/FOTO'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,174,239,0.95); color: white; padding: 2vmin 4vmin; border-radius: 1vmin; font-size: 3vmin; font-weight: bold;
            pointer-events: none; text-align: center; box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.5);
        }
        .admin-mode .editable-media > * { pointer-events: none !important; }

        .has-link:not(.editable) { cursor: pointer; border-bottom: 0.3vmin solid var(--k-blue); }

        /* Tabela */
        table { width: 100%; height: 100%; border-collapse: collapse; background: white; border-radius: 2vmin; overflow: hidden; box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.08); }
        th { background: var(--k-dark); color: white; padding: 1.5vmin; font-size: 2.2vmin; text-align: center; }
        td { padding: 1.5vmin; text-align: center; font-size: 2vmin; font-weight: 600; color: var(--txt-main); border-bottom: 0.2vmin solid #f1f5f9; }
        td:first-child { background: #f8fafc; text-align: left; color: var(--k-dark); font-weight: 800; }

        /* MODAIS CUSTOMIZADOS PROFISSIONAIS */
        #admin-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8);
            z-index: 999999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .admin-modal-content {
            background: white; padding: 4vmin; border-radius: 2vmin; width: 85vw; max-width: 600px;
            box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.5); font-family: 'Poppins', sans-serif;
        }
        .admin-input { 
            width: 100%; padding: 2vmin; border: 0.2vmin solid #cbd5e1; border-radius: 1vmin; 
            font-size: 2.2vmin; margin-bottom: 2vmin; font-family: 'Poppins', sans-serif; color: #1e293b;
        }
        .admin-input:focus { outline: 0.2vmin solid var(--k-blue); }
        .admin-btn { padding: 2vmin 3vmin; border: none; border-radius: 1vmin; font-weight: 700; font-size: 2.2vmin; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--k-blue); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--txt-main); }
        .btn-upload { background: var(--k-orange); color: white; width: 100%; margin-bottom: 2vmin; font-size: 2.5vmin !important; padding: 2.5vmin !important;}
        .btn-danger { background: #ef4444; color: white; }
        .warning-box { background: #fef2f2; border-left: 0.5vmin solid #ef4444; padding: 1.5vmin; color: #b91c1c; font-size: 1.6vmin; margin-bottom: 2vmin; font-weight: 600; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="progress-bar" id="progress-bar"></div>

        <!-- HEADER -->
        <header class="header-area" id="main-header">

                    <i class="fa-solid fa-gear"></i> Cloudinary

    <script>
        // CONFIGURAÇÕES BASE E PREVENÇÃO DE FALHAS
        function safeParseJSON(key, defaultObj) {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultObj;
            } catch (e) {
                console.error('Erro na leitura da cache:', e);
                return defaultObj;
            }
        }

        let currentIndex = 0;
        let isAdmin = false;
        let adminClicks = 0;
        let currentEditingId = null;
        let currentEditingType = null; // 'link' ou 'media'

        let savedLinks = safeParseJSON('kumon_v177_links', {});
        let savedMedia = safeParseJSON('kumon_v177_media', {});
        let cloudinaryConfig = safeParseJSON('kumon_v177_cloud', {cloudName: "", preset: ""});
        let firebaseCfg = safeParseJSON('kumon_v177_firebase', {apiKey: "", projectId: ""});

        let db = null;
        if (firebaseCfg.apiKey && firebaseCfg.projectId) {
            try {
                firebase.initializeApp(firebaseCfg);
                db = firebase.firestore();
                db.collection("kumon_config").doc("settings").onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        savedLinks = data.links || savedLinks;
                        savedMedia = data.media || savedMedia;
                        renderSlide();
                    }
                });
            } catch(e) { console.error("Erro Firebase: ", e); }
        }

        function saveData() {
            localStorage.setItem('kumon_v177_links', JSON.stringify(savedLinks));
            localStorage.setItem('kumon_v177_media', JSON.stringify(savedMedia));
            if (db) {
                db.collection("kumon_config").doc("settings").set({
                    links: savedLinks, media: savedMedia
                }, { merge: true }).catch(e => console.error(e));
            }

        // DADOS 100% REAIS (Slides)
        const slidesData = [

            { id: 'oque', type: 'grid', title: "O que é o Kumon?", icon: "fa-circle-question", grid: [

            { id: 'objetivos', type: 'list', title: "Objetivos do Kumon", icon: "fa-rocket",
              items: ["Ressignificar o sentido da educação para crianças e jovens.", "Promover mudança de vida e transformação social, transformando a educação pós-pandemia.", "Garantir uma organização de estudos com sequência lógica e coerente.", "Respeitar o ritmo de cada aluno, construindo a base para a vida toda."] },
            { id: 'historia', type: 'list', title: "Nossa História", icon: "fa-landmark", items: ["Início em 1993 com a pioneira Fernanda Musolino.", "Única unidade Clube Ouro de São José do Rio Preto desde 1998.", "Atingimos a marca incrível de 450 alunos durante a pandemia.", "Liderada por Maria Flavia Musolino desde 2013. Referência em excelência para a Matriz Kumon."] },
            { id: 'equipe', type: 'team', title: "Equipe da Unidade", icon: "fa-users", groups: [

                { t: "Equipe Pedagógica", m: ["Auxiliares: Tia Dani, Tia Gabi, Tia Ana Julia", "Auxiliares: Tia Maria Clara, Tia Isadhora, Tio João", "Estagiário de Correção: Tio Bruno"] }
            ]},

            ]},

            { id: 'fim', type: 'end', title: "MUITO OBRIGADO!", subtitle: "Unidade Kumon Rio Preto Shopping", contact: "Tel: 3227-0644" }
        ];

        // GESTÃO DE MÍDIA RENDERIZADOR
        function getMediaTag(mediaId, defaultType) {
            let src = savedMedia[mediaId];
            if (!src) return `
                <div style="color: white; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; opacity: 0.5;">
                    <i class="fa-solid fa-video icon-xl" style="margin-bottom: 1vh;"></i>
                    <span class="txt-title" style="color: white; font-size: 3vmin;">Área de Vídeo / Imagem</span>
                </div>`;
            
            if (src.includes('youtube.com') || src.includes('youtu.be')) {
                let vid = src.split('v=')[1] || src.split('youtu.be/')[1];
                if(vid && vid.includes('&')) vid = vid.split('&')[0];
                return `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=0" allowfullscreen></iframe>`;
            }
            if (src.endsWith('.mp4') || defaultType === 'video') return `<video src="${src}" controls></video>`;
            return `<img src="${src}" alt="Midia" />`;
        }

        // MOTOR RENDER
        function renderSlide() {
            const data = slidesData[currentIndex];
            const mainContent = document.getElementById('main-content');
            const header = document.getElementById('main-header');
            let html = '';

            document.body.style.background = data.bg ? data.bg : '#0f172a';
            document.getElementById('app-container').style.background = data.bg ? 'transparent' : 'white';
            
            if(data.type === 'cover' || data.type === 'quote' || data.type === 'end') {
                header.style.display = 'none';
            } else {
                header.style.display = 'flex';
                document.getElementById('slide-title').innerHTML = data.title;
                document.getElementById('slide-title').dataset.id = `${data.id}_title`;
                document.getElementById('slide-icon').innerHTML = `<i class="fa-solid ${data.icon}"></i>`;
                const isDark = data.bg ? true : false;
                document.getElementById('slide-title').style.color = isDark ? 'white' : 'var(--k-dark)';
            }

            // HTML INJECTIONS
            if (data.type === 'cover') {
                html = `<div class="flex-col-locked" style="align-items: center; text-align: center; height: 100%;">
                    <h1 class="txt-mega editable text-white" data-id="${data.id}_t" style="text-shadow: 0 1vh 2vh rgba(0,0,0,0.3); color: white;">${data.t}</h1>
                    <div style="width: 20vw; height: 1vh; background: var(--k-orange); border-radius: 1vh;"></div>
                    <p class="txt-sub editable text-white" data-id="${data.id}_sub" style="color: white; margin-top: 2vh;">${data.sub}</p>
                    <div class="editable" data-id="${data.id}_ext" style="margin-top: 4vh; background: rgba(255,255,255,0.15); border: 0.3vh solid rgba(255,255,255,0.3); padding: 2vh 4vw; border-radius: 4vh;">
                        <p class="txt-body text-white" style="margin:0; color: white; font-weight: 800; font-size: 3vmin;">${data.ext}</p>
                    </div></div>`;
            } 
            else if (data.type === 'list') {
                html = `<div class="flex-col-locked" style="width: 100%; max-width: 85vw; margin: auto;">
                    ${data.items.map((item, i) => `<div class="card-box editable" data-id="${data.id}_i${i}" style="border-left-width: 1vmin;"><div style="background: #f0f9ff; color: var(--k-blue); width: 6vmin; height: 6vmin; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;" class="icon-md"><i class="fa-solid fa-check"></i></div><p class="txt-body" style="margin:0;">${item}</p></div>`).join('')}
                </div>`;
            }
            else if (data.type === 'media-left' || data.type === 'media-right') {
                const mediaBlock = `<div class="media-box editable-media" data-media-id="${data.mediaId}" style="flex: 1; border: 0.8vmin solid #e2e8f0;">${getMediaTag(data.mediaId, data.mediaType)}</div>`;
                const listBlock = `<div class="flex-col-locked" style="flex: 1.2;">${data.items.map((item, i) => `<div class="card-box editable" data-id="${data.id}_i${i}" style="padding: 2vmin; border-left-width: 0.8vmin;"><div style="background: #f0f9ff; color: var(--k-blue); width: 4.5vmin; height: 4.5vmin; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;" class="icon-md"><i class="fa-solid fa-check"></i></div><p class="txt-body" style="margin:0; font-size: 2.2vmin;">${item}</p></div>`).join('')}</div>`;
                html = `<div class="flex-row-locked w-full h-full" style="align-items: stretch; padding: 2vh 0;">${data.type === 'media-left' ? mediaBlock + listBlock : listBlock + mediaBlock}</div>`;
            }
            else if (data.type === 'quote') {
                html = `<div class="flex-col-locked" style="align-items: center; text-align: center; max-width: 80vw; margin: auto;"><i class="fa-solid fa-quote-left text-white icon-xl" style="opacity: 0.3;"></i><h2 class="txt-title editable" data-id="${data.id}_t" style="color: white; font-style: italic; text-transform: none; line-height: 1.4;">"${data.text}"</h2><cite class="txt-sub editable" data-id="${data.id}_auth" style="color: white; opacity: 0.8; margin-top: 3vh;">— ${data.author}</cite></div>`;
            }
            else if (data.type === 'grid') {
                const cols = data.grid.length > 3 ? 'grid-4' : 'grid-2';
                html = `<div class="grid-locked ${cols} w-full h-full" style="align-items: stretch; padding: 2vh 0;">${data.grid.map(g => `<div class="grid-card editable" data-id="${g.id}" style="justify-content: flex-start; padding-top: 4vh;"><div style="color: var(--k-orange);" class="icon-lg"><i class="fa-solid ${g.i}"></i></div><h3 class="txt-title" style="margin: 3vh 0 2vh 0; font-size: 3.5vmin;">${g.t}</h3><p class="txt-body" style="margin:0; text-align: center;">${g.d}</p></div>`).join('')}</div>`;
            }
            else if (data.type === 'team') {
                html = `<div class="flex-row-locked w-full h-full" style="align-items: flex-start; padding-top: 2vh;">${data.groups.map((grp, gIdx) => `<div class="flex-col-locked" style="flex: 1; justify-content: flex-start; gap: 2.5vh;"><div style="background: var(--k-dark); color: white; padding: 2vmin; border-radius: 1.5vmin; text-align: center; box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.1);"><span class="txt-title" style="font-size: 3.5vmin; color: white;">${grp.t}</span></div><div class="flex-col-locked" style="gap: 1.5vh; justify-content: flex-start;">${grp.m.map((m, mIdx) => `<div class="card-box editable" data-id="${data.id}_${gIdx}_${mIdx}" style="border-left-width: 1.2vmin; border-left-color: ${gIdx===0 ? 'var(--k-orange)' : 'var(--k-blue)'}; padding: 2.5vmin;"><p class="txt-body" style="margin:0; font-size: 2.6vmin;">${m}</p></div>`).join('')}</div></div>`).join('')}</div>`;
            }
            else if (data.type === 'table') {
                html = `<div class="flex-col-locked w-full h-full" style="justify-content: center; align-items: center;"><div style="width: 100%; max-width: 90vw; background: white; border-radius: 3vmin; overflow: hidden; box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.1); border: 0.2vmin solid #e2e8f0;"><table style="width: 100%; border-collapse: collapse;"><thead><tr style="background: var(--k-dark); color: white;"><th style="padding: 4vmin; font-size: 3.5vmin; text-align: left; width: 33%; font-family: 'Nunito', sans-serif;">Disciplina</th><th style="padding: 4vmin; font-size: 3.5vmin; text-align: center; width: 33%; font-family: 'Nunito', sans-serif;">Orientação Inicial</th><th style="padding: 4vmin; font-size: 3.5vmin; text-align: center; width: 33%; color: var(--k-orange); font-family: 'Nunito', sans-serif;">Orientação Avançada</th></tr></thead><tbody>${data.rows.map((r, i) => `<tr style="border-bottom: 0.2vmin solid #e2e8f0; background: ${i%2===0?'#f8fafc':'white'};"><td style="padding: 4vmin; font-size: 3vmin; font-weight: 800; color: var(--k-dark); text-align: left;">${r.mat}</td><td style="padding: 4vmin; font-size: 2.8vmin; font-weight: 600; color: var(--txt-main); text-align: center;">${r.ini}</td><td style="padding: 4vmin; font-size: 3vmin; font-weight: 900; color: var(--k-orange); text-align: center;">${r.ava}</td></tr>`).join('')}</tbody></table></div></div>`;
            }
            else if (data.type === 'stats') {
                html = `<div class="flex-row-locked w-full h-full" style="justify-content: center;">${data.stats.map((s, i) => `<div class="grid-card editable" data-id="${data.id}_s${i}" style="border-bottom: none; border-top: 2.5vmin solid ${i===0 ? 'var(--k-blue)' : 'var(--k-orange)'}; justify-content: center; gap: 3vh;"><div class="txt-mega" style="font-size: 18vmin; color: ${s.color};">${s.val}</div><div class="txt-title" style="font-size: 4vmin; color: #94a3b8;">${s.label}</div></div>`).join('')}</div>`;
            }
            else if (data.type === 'sophia') {
                html = `<div class="flex-row-locked w-full h-full" style="align-items: stretch; padding: 2vh 0;"><div class="flex-col-locked" style="flex: 1.2; background: #f8fafc; padding: 5vmin; border-radius: 3vmin; border-left: 1.5vmin solid var(--k-blue); justify-content: center;"><div style="background: var(--k-yellow); color: var(--k-dark); padding: 1.5vmin 3vmin; border-radius: 3vmin; font-weight: 900; align-self: flex-start; box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.1);" class="txt-small"><i class="fa-solid fa-trophy"></i> ALUNA DE SUCESSO</div><h3 class="txt-mega editable" data-id="${data.id}_name" style="margin: 3vh 0;">${data.name}</h3><div class="flex-col-locked" style="gap: 2.5vh; justify-content: flex-start;">${data.details.map((d, i) => `<div style="display: flex; align-items: flex-start; gap: 2.5vmin;" class="editable" data-id="${data.id}_d${i}"><i class="fa-solid fa-check" style="color: var(--k-blue); font-size: 3.5vmin; margin-top: 0.5vmin;"></i><span class="txt-body" style="font-size: 3vmin;">${d}</span></div>`).join('')}</div></div><div class="media-box editable-media" data-media-id="${data.mediaId}" style="flex: 1; border: 0.8vmin solid #e2e8f0; background: black;">${getMediaTag(data.mediaId, 'video')}</div></div>`;
            }
            else if (data.type === 'end') {
                html = `<div class="flex-col-locked" style="align-items: center; text-align: center; height: 100%;"><i class="fa-regular fa-handshake icon-xl" style="color: var(--k-orange); margin-bottom: 2vh;"></i><h2 class="txt-mega editable" data-id="${data.id}_t" style="font-size: 9vmin;">${data.title}</h2><p class="txt-sub editable" data-id="${data.id}_sub" style="margin: 2vh 0; color: var(--k-dark);">${data.subtitle}</p><div class="editable" data-id="${data.id}_contact" style="background: var(--k-blue); color: white; padding: 2.5vh 5vw; border-radius: 5vh; margin-top: 3vh; box-shadow: 0 2vmin 4vmin rgba(0,174,239,0.3);"><span class="txt-title" style="color: white; text-transform: none; font-size: 4vmin;">${data.contact}</span></div></div>`;
            }

            mainContent.innerHTML = `<div class="slide active w-full h-full">${html}</div>`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / slidesData.length) * 100}%`;
            setupGestor();
        }

        // EVENTOS NAVEGAÇÃO
        document.getElementById('btn-next').addEventListener('click', () => { if (currentIndex < slidesData.length - 1) { currentIndex++; renderSlide(); } });
        document.getElementById('btn-prev').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderSlide(); } });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { if (currentIndex < slidesData.length - 1) { currentIndex++; renderSlide(); } }
            if (e.key === 'ArrowLeft' || e.key === 'Backspace') { if (currentIndex > 0) { currentIndex--; renderSlide(); } }
        });

        // ==========================================
        // GESTOR (MODAIS E LÓGICA V177)
        // ==========================================
        document.getElementById('logo-btn').addEventListener('click', () => {
            adminClicks++;
            if (adminClicks === 3) {
                const pass = prompt("SISTEMA GESTOR (*177). SENHA:");
                if (pass === "*177") {
                    isAdmin = true; 
                    document.body.classList.add('admin-mode');
                    document.getElementById('btn-config-cloudinary').style.display = 'block';
                    document.getElementById('btn-config-firebase').style.display = 'block';
                    renderSlide(); 
                } else { alert("Senha Incorreta."); }
                adminClicks = 0;
            }
        });

        // Fechar Modal
        const overlay = document.getElementById('admin-modal-overlay');
        function closeAdminModal() { overlay.style.display = 'none'; }
        overlay.addEventListener('click', function(e) { if (e.target === this) closeAdminModal(); });

        // Modal Cloudinary / Firebase omitidos aqui do escopo da análise rápida de UI pois já estavam funcionais
        // (O foco do usuário é: como enviar vídeo pro Cloudinary quando clica na imagem/link).

        // MODAL 1: Links Comuns (Textos Laranjas)
        function openLinkModal(linkId) {
            currentEditingId = linkId;
            currentEditingType = 'link';
            const currentUrl = savedLinks[linkId] || "";
            
            overlay.innerHTML = `
                <div class="admin-modal-content">
                    <h3 style="font-size: 3vmin; font-weight: 800; margin-bottom: 2vmin; color: var(--k-dark); text-align: center;">🔗 Editar Redirecionamento</h3>
                    <p style="font-size: 1.8vmin; color: #64748b; margin-bottom: 2vmin; text-align: center;">Cole o link que deve abrir quando clicarem neste texto.</p>
                    <input type="text" id="link-input" class="admin-input" value="${currentUrl.replace(/"/g, '&quot;')}" placeholder="Ex: https://wa.me/...">
                    <div style="display: flex; gap: 2vmin; justify-content: center; margin-top: 2vmin;">
                        <button class="admin-btn btn-secondary" id="btn-cancel-modal">Cancelar</button>
                        <button class="admin-btn btn-danger" id="btn-remove-link">Remover</button>
                        <button class="admin-btn btn-primary" id="btn-save-link">Salvar Link</button>
                    </div>
                </div>
            `;
            overlay.style.display = 'flex';
            
            document.getElementById('btn-cancel-modal').addEventListener('click', closeAdminModal);
            document.getElementById('btn-remove-link').addEventListener('click', () => {
                delete savedLinks[currentEditingId];
                saveData(); closeAdminModal(); renderSlide();
            });
            document.getElementById('btn-save-link').addEventListener('click', () => {
                const val = document.getElementById('link-input').value.trim();
                if (val === "") delete savedLinks[currentEditingId]; else savedLinks[currentEditingId] = val;
                saveData(); closeAdminModal(); renderSlide();
            });
        }

        // MODAL 2: Mídia (Vídeos e Fotos - Caixas Azuis)
        function openMediaModal(mediaId) {
            currentEditingId = mediaId;
            currentEditingType = 'media';
            const currentUrl = savedMedia[mediaId] || "";
            
            overlay.innerHTML = `
                <div class="admin-modal-content">
                    <h3 style="font-size: 3.5vmin; font-weight: 900; margin-bottom: 1vmin; color: var(--k-blue); text-align: center;">📸 Enviar ou Alterar Mídia</h3>
                    <p style="font-size: 2vmin; color: var(--txt-main); margin-bottom: 3vmin; text-align: center; font-weight: 600;">Deseja exibir um Vídeo ou Foto aqui?</p>
                    
                    <div class="warning-box">
                        <i class="fa-solid fa-triangle-exclamation"></i> IMPORTANTE: A sua conta Cloudinary (Upload Preset) DEVE estar configurada como "Unsigned" (Não assinado) nas definições de upload do Cloudinary.
                    </div>

                    <button class="admin-btn btn-upload" id="btn-upload-media">
                        <i class="fa-solid fa-cloud-arrow-up"></i> ENVIAR ARQUIVO (Cloudinary)
                    </button>
                    
                    <div style="text-align: center; margin: 3vmin 0; font-weight: bold; color: #94a3b8; font-size: 2vmin;">OU</div>
                    
                    <label style="font-weight: bold; font-size: 1.8vmin; color: var(--k-dark);">Colar Link Externo (YouTube / Link .mp4 / .jpg):</label>
                    <input type="text" id="media-link-input" class="admin-input" value="${currentUrl.replace(/"/g, '&quot;')}" placeholder="Ex: https://youtu.be/... ou foto.jpg">
                    
                    <div style="display: flex; gap: 2vmin; justify-content: center; margin-top: 2vmin;">
                        <button class="admin-btn btn-secondary" id="btn-cancel-media">Cancelar</button>
                        <button class="admin-btn btn-danger" id="btn-remove-media">Apagar</button>
                        <button class="admin-btn btn-primary" id="btn-save-media">Salvar Mídia</button>
                    </div>
                </div>
            `;
            overlay.style.display = 'flex';
            
            document.getElementById('btn-cancel-media').addEventListener('click', closeAdminModal);
            
            document.getElementById('btn-remove-media').addEventListener('click', () => {
                delete savedMedia[currentEditingId];
                saveData(); closeAdminModal(); renderSlide();
            });

            document.getElementById('btn-save-media').addEventListener('click', () => {
                const val = document.getElementById('media-link-input').value.trim();
                if (val === "") delete savedMedia[currentEditingId]; else savedMedia[currentEditingId] = val;
                saveData(); closeAdminModal(); renderSlide();
            });

            document.getElementById('btn-upload-media').addEventListener('click', () => {
                if(typeof cloudinary === 'undefined') { alert("O script do Cloudinary não carregou."); return; }
                if(!cloudinaryConfig.cloudName || !cloudinaryConfig.preset) {
                    alert("Por favor, configure o Cloudinary no botão Laranja ⚙️ no rodapé primeiro!");
                    closeAdminModal(); return;
                }
                
                var myWidget = cloudinary.createUploadWidget({
                    cloudName: cloudinaryConfig.cloudName,
                    uploadPreset: cloudinaryConfig.preset,
                    sources: ['local', 'url', 'camera'],
                    multiple: false,
                    clientAllowedFormats: ['image', 'video'], // ACEITA VÍDEO E FOTO ESTATICO EXPLICITAMENTE
                    maxFileSize: 104857600 // 100MB max limit
                }, (error, result) => {
                    if (!error && result && result.event === "success") {
                        savedMedia[currentEditingId] = result.info.secure_url;
                        saveData(); closeAdminModal(); renderSlide();
                    }
                });
                myWidget.open();
            });
        }

        // BIND DOS CLIQUES (A Mágica da UI do Administrador)
        function setupGestor() {
            // Textos normais (Laranja) -> LINK
            document.querySelectorAll('.editable').forEach(el => {
                const id = el.dataset.id;
                if (savedLinks[id]) el.classList.add('has-link'); else el.classList.remove('has-link');
                
                el.onclick = null; 
                el.onclick = (e) => {
                    if (isAdmin) {
                        e.stopPropagation(); e.preventDefault();
                        openLinkModal(id);
                    } else if (savedLinks[id]) { 
                        e.stopPropagation(); e.preventDefault(); window.open(savedLinks[id], '_blank'); 
                    }
                };
            });

            // Mídias e Blocos de Imagem (Azul) -> FOTO E VÍDEO
            if (isAdmin) {
                document.querySelectorAll('.editable-media').forEach(box => {
                    box.onclick = null;
                    box.onclick = (e) => {
                        e.stopPropagation(); e.preventDefault();
                        openMediaModal(box.dataset.mediaId);
                    };
                });
            }
        }

        // (LÓGICA DE CLOUDINARY E FIREBASE MODAL DE CONFIGURAÇÃO FICA AQUI)
        document.getElementById('btn-config-cloudinary').addEventListener('click', () => {
            overlay.innerHTML = `
                <div class="admin-modal-content">
                    <h3 style="font-size: 3vmin; font-weight: 800; margin-bottom: 2vmin; color: var(--k-dark);">⚙️ Configuração Cloudinary</h3>
                    <p style="font-size: 1.8vmin; color: #64748b; margin-bottom: 2vmin;">Insira os dados para ativar o upload de imagens e vídeos no seu GitHub.</p>
                    
                    <div class="warning-box">
                        <i class="fa-solid fa-triangle-exclamation"></i> O seu "Upload Preset" DEVE estar configurado como "Unsigned" nas configurações do Cloudinary.
                    </div>

                    <label style="font-weight: bold; font-size: 1.8vmin;">Cloud Name:</label>
                    <input type="text" id="cfg-cloudname" class="admin-input" value="${cloudinaryConfig.cloudName}" placeholder="Ex: dxkxvxyz">
                    <label style="font-weight: bold; font-size: 1.8vmin;">Upload Preset (Unsigned):</label>
                    <input type="text" id="cfg-preset" class="admin-input" value="${cloudinaryConfig.preset}" placeholder="Ex: my_preset">
                    <div style="display: flex; gap: 2vmin; justify-content: flex-end; margin-top: 2vmin;">
                        <button class="admin-btn btn-secondary" id="btn-cancel-cfg">Cancelar</button>
                        <button class="admin-btn btn-primary" id="btn-save-cfg">Guardar Configuração</button>
                    </div>
                </div>
            `;
            overlay.style.display = 'flex';
            document.getElementById('btn-cancel-cfg').addEventListener('click', closeAdminModal);
            document.getElementById('btn-save-cfg').addEventListener('click', () => {
                cloudinaryConfig.cloudName = document.getElementById('cfg-cloudname').value.trim();
                cloudinaryConfig.preset = document.getElementById('cfg-preset').value.trim();
                localStorage.setItem('kumon_v177_cloud', JSON.stringify(cloudinaryConfig));
                alert("Configurações do Cloudinary salvas localmente!"); closeAdminModal();
            });
        });

        document.getElementById('btn-config-firebase').addEventListener('click', () => {
            overlay.innerHTML = `
                <div class="admin-modal-content">
                    <h3 style="font-size: 3vmin; font-weight: 800; margin-bottom: 2vmin; color: var(--k-dark);">☁️ Configuração Firebase (Database)</h3>
                    <p style="font-size: 1.8vmin; color: #64748b; margin-bottom: 2vmin;">Para salvar em tempo real no Github Pages, insira o seu projeto.</p>
                    <label style="font-weight: bold; font-size: 1.8vmin;">API Key:</label>
                    <input type="text" id="cfg-fb-key" class="admin-input" value="${firebaseCfg.apiKey}" placeholder="Ex: AIzaSyB...">
                    <label style="font-weight: bold; font-size: 1.8vmin;">Project ID:</label>
                    <input type="text" id="cfg-fb-pid" class="admin-input" value="${firebaseCfg.projectId}" placeholder="Ex: meu-projeto-123">
                    <div style="display: flex; gap: 2vmin; justify-content: flex-end; margin-top: 2vmin;">
                        <button class="admin-btn btn-secondary" id="btn-cancel-fb">Cancelar</button>
                        <button class="admin-btn btn-primary" id="btn-save-fb">Salvar e Conectar</button>
                    </div>
                </div>
            `;
            overlay.style.display = 'flex';
            document.getElementById('btn-cancel-fb').addEventListener('click', closeAdminModal);
            document.getElementById('btn-save-fb').addEventListener('click', () => {
                firebaseCfg.apiKey = document.getElementById('cfg-fb-key').value.trim();
                firebaseCfg.projectId = document.getElementById('cfg-fb-pid').value.trim();
                localStorage.setItem('kumon_v177_firebase', JSON.stringify(firebaseCfg));
                alert("Firebase Configurado! A página será recarregada."); location.reload();
            });
        });

        window.onload = renderSlide;
    </script>
</body>
</html>
