<!DOCTYPE html>

    <!-- Tailwind CSS (Responsividade Fluida Absoluta) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para Ícones Estáveis -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kumon-blue': '#00AEEF',
                        'kumon-dark': '#004578',
                        'kumon-orange': '#F39200',

                        sans: ['Poppins', 'sans-serif'],

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f8fafc; overflow: hidden;
        }

        /* Animação suave para troca de slides */
        .slide-enter {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Efeitos visuais de fundo modernos (Background Blobs) */
        .bg-blobs::before {
            content: ''; position: absolute; top: -10%; right: -5%; width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(0, 174, 239, 0.08) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }
        .bg-blobs::after {
            content: ''; position: absolute; bottom: -10%; left: -5%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(243, 146, 0, 0.05) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }

        /* Modo Administrador (*177) */
        .admin-mode .editable {
            outline: 3px dashed #F39200;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            border-radius: 4px;
        }
        .admin-mode .editable:hover {
            background-color: rgba(243, 146, 0, 0.1);
        }
        .admin-mode .editable::before {
            content: '🔗 EDITAR';
            position: absolute; top: -25px; left: 0; background: #F39200; color: white;
            font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px;
            opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 50;
        }
        .admin-mode .editable:hover::before { opacity: 1; }
        
        /* Indicador de Link Ativo */
        .has-link:not(.editable) {
            cursor: pointer;
            border-bottom: 3px solid #00AEEF;
            transition: all 0.2s;
        }
        .has-link:not(.editable):hover {
            filter: brightness(1.2);
            color: #00AEEF;
        }

        /* Rolagem elegante para mobile */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen w-screen text-slate-800">

    <!-- ÁREA DO SLIDE PRINCIPAL -->

        // FUNÇÃO PRINCIPAL DE RENDERIZAÇÃO
        function renderSlide() {
            const container = document.getElementById('slide-container');
            const data = slidesData[currentIndex];
            let html = '';

            // Limpar classes de background antigas e aplicar novas se existirem
            container.className = `flex-grow flex flex-col relative w-full h-[calc(100vh-80px)] md:h-[calc(100vh-96px)] p-6 md:p-12 lg:p-16 overflow-y-auto overflow-x-hidden slide-enter bg-blobs z-10 ${data.bg || 'bg-white'}`;

            // CABEÇALHO PADRÃO (Para todos exceto capa, quote e fim)
            if (data.type !== 'cover' && data.type !== 'end' && data.type !== 'quote') {
                html += `
                    <header class="flex justify-between items-center mb-6 md:mb-12 pb-4 md:pb-6 border-b-2 md:border-b-4 border-slate-100 w-full shrink-0 z-20">
                        <div class="flex items-center gap-3 md:gap-6">

                                <i class="fa-solid ${data.icon || 'fa-star'}"></i>
                            </div>
                            <h2 class="font-title text-2xl md:text-5xl lg:text-6xl font-black text-kumon-dark uppercase tracking-tight editable-elem" data-id="${data.id}_title">
                                ${data.title}
                            </h2>
                        </div>
                    </header>
                `;
            }

            // CORPO DO SLIDE: CAPA
            if (data.type === 'cover') {
                html += `
                    <div class="flex-grow flex flex-col items-center justify-center text-center space-y-6 md:space-y-12 z-20">
                        <h1 class="font-title text-5xl md:text-8xl lg:text-[100px] xl:text-[120px] font-black leading-tight drop-shadow-xl md:drop-shadow-2xl editable-elem" data-id="${data.id}_t">${data.t}</h1>
                        <div class="w-1/3 h-1 md:h-2 bg-kumon-orange rounded-full"></div>
                        <p class="text-sm md:text-3xl lg:text-4xl tracking-[0.2em] md:tracking-[0.4em] font-light uppercase opacity-90 editable-elem" data-id="${data.id}_sub">${data.sub}</p>
                        <div class="mt-4 md:mt-8 bg-white/10 backdrop-blur-md border border-white/20 px-6 py-3 md:px-12 md:py-6 rounded-full editable-elem" data-id="${data.id}_ext">
                            <p class="text-xs md:text-2xl font-bold uppercase tracking-widest">${data.ext}</p>
                        </div>
                    </div>
                `;
            }

            // CORPO DO SLIDE: LISTA
            else if (data.type === 'list') {
                html += `
                    <div class="flex-grow flex flex-col justify-center w-full max-w-6xl mx-auto space-y-3 md:space-y-6 z-20">
                        ${data.items.map((item, i) => `
                            <div class="bg-white p-4 md:p-8 rounded-2xl md:rounded-3xl shadow-md md:shadow-lg border-l-[6px] md:border-l-[12px] border-kumon-blue flex items-start md:items-center gap-4 md:gap-6 editable-elem" data-id="${data.id}_i${i}">
                                <div class="bg-blue-50 text-kumon-blue w-8 h-8 md:w-14 md:h-14 rounded-full flex items-center justify-center shrink-0 text-sm md:text-2xl mt-1 md:mt-0">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <p class="text-base md:text-3xl lg:text-4xl font-bold text-slate-700 leading-snug">${item}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // CORPO DO SLIDE: CITAÇÃO
            else if (data.type === 'quote') {
                html += `
                    <div class="flex-grow flex items-center justify-center p-4 md:p-8 z-20">
                        <div class="max-w-5xl text-center space-y-6 md:space-y-12">
                            <i class="fa-solid fa-quote-left text-4xl md:text-8xl opacity-30 block mb-2 md:mb-4"></i>
                            <h2 class="font-title text-3xl md:text-6xl lg:text-7xl font-bold italic leading-tight editable-elem" data-id="${data.id}_text">"${data.text}"</h2>
                            <cite class="text-lg md:text-4xl font-black uppercase tracking-widest block opacity-70 editable-elem" data-id="${data.id}_auth">— ${data.author}</cite>
                        </div>
                    </div>
                `;
            }

            // CORPO DO SLIDE: GRID (Blocos Lado a Lado / Empilhados no Mobile)
            else if (data.type === 'grid') {
                html += `
                    <div class="flex-grow flex items-center justify-center z-20">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-10 w-full max-w-6xl">

            // CORPO DO SLIDE: EQUIPE
            else if (data.type === 'team') {
                html += `
                    <div class="flex-grow flex items-center justify-center z-20">

                                    </h3>

                                        ${grp.m.map((m, mIdx) => `

                                                ${m}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // CORPO DO SLIDE: TABELA (Com scroll horizontal no mobile)
            else if (data.type === 'table') {
                html += `
                    <div class="flex-grow flex items-center justify-center z-20">

                                <thead class="bg-kumon-dark text-white">

                                        <th class="p-4 md:p-8 font-title text-lg md:text-4xl font-black uppercase text-center">Início</th>
                                        <th class="p-4 md:p-8 font-title text-lg md:text-4xl font-black uppercase text-center text-kumon-orange">Avançado</th>
                                    </tr>
                                </thead>
                                <tbody class="text-sm md:text-3xl font-bold text-slate-600">
                                    ${data.rows.map((r, i) => `
                                        <tr class="${i % 2 !== 0 ? 'bg-slate-50' : 'bg-white'} border-b border-slate-100">
                                            <td class="p-4 md:p-8 border-r border-slate-100">${r.mat}</td>
                                            <td class="p-4 md:p-8 text-center">${r.ini}</td>
                                            <td class="p-4 md:p-8 text-center text-kumon-orange font-black">${r.ava}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            // CORPO DO SLIDE: ESTATÍSTICAS
            else if (data.type === 'stats') {
                html += `
                    <div class="flex-grow flex items-center justify-center z-20">
                        <div class="flex flex-col md:flex-row gap-6 md:gap-16 w-full max-w-6xl">
                            ${data.stats.map((s, i) => `
                                <div class="flex-1 bg-white p-8 md:p-20 rounded-3xl md:rounded-[50px] shadow-lg md:shadow-2xl text-center border-t-[8px] md:border-t-[16px] ${i===0 ? 'border-kumon-blue' : 'border-kumon-orange'} editable-elem transform transition hover:scale-105" data-id="${data.id}_s${i}">
                                    <div class="font-title text-[70px] md:text-[120px] lg:text-[180px] font-black leading-none mb-2 md:mb-6 ${s.color}">${s.val}</div>
                                    <div class="text-lg md:text-4xl font-black text-slate-400 uppercase tracking-widest">${s.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // CORPO DO SLIDE: DESTAQUE SOPHIA (COM VÍDEO RESPONSIVO)
            else if (data.type === 'sophia') {
                html += `
                    <div class="flex-grow flex flex-col xl:flex-row items-center justify-center gap-8 md:gap-12 w-full max-w-7xl mx-auto z-20">
                        <div class="flex-1 bg-white p-6 md:p-12 lg:p-16 rounded-3xl md:rounded-[50px] shadow-lg md:shadow-2xl border-l-[10px] md:border-l-[20px] border-kumon-blue space-y-6 md:space-y-8 w-full">
                            <div class="inline-block bg-yellow-400 text-kumon-dark px-4 py-2 md:px-6 md:py-2 rounded-full font-black text-sm md:text-2xl uppercase shadow-md mb-2 md:mb-4">
                                <i class="fa-solid fa-trophy mr-2"></i> Aluna de Sucesso
                            </div>
                            <h3 class="font-title text-4xl md:text-7xl lg:text-8xl font-black text-kumon-dark leading-none tracking-tighter editable-elem" data-id="${data.id}_name">${data.name}</h3>
                            <div class="space-y-3 md:space-y-6 mt-4 md:mt-8">
                                ${data.details.map((d, i) => `
                                    <div class="flex items-start gap-3 md:gap-4 text-sm md:text-2xl lg:text-3xl font-bold text-slate-600 editable-elem" data-id="${data.id}_d${i}">
                                        <i class="fa-solid fa-check text-kumon-blue mt-1"></i> <span>${d}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="w-full xl:w-[45%] aspect-video bg-slate-900 rounded-2xl md:rounded-[40px] overflow-hidden shadow-lg md:shadow-2xl border-[4px] md:border-[10px] border-white flex items-center justify-center">
                            <video class="w-full h-full object-cover" controls>
                                <source src="video_sophia.mp4" type="video/mp4">
                                Seu navegador não suporta vídeos.
                            </video>
                        </div>
                    </div>
                `;
            }

            // CORPO DO SLIDE: ENCERRAMENTO
            else if (data.type === 'end') {
                html += `
                    <div class="flex-grow flex flex-col items-center justify-center text-center space-y-8 md:space-y-12 z-20">
                        <i class="fa-regular fa-handshake text-[80px] md:text-[150px] lg:text-[200px] text-kumon-orange animate-bounce"></i>
                        <h2 class="font-title text-4xl md:text-7xl lg:text-[120px] font-black text-kumon-dark uppercase tracking-tighter leading-none editable-elem" data-id="${data.id}_t">${data.title}</h2>
                        <div class="space-y-6 md:space-y-8">
                            <p class="text-xl md:text-4xl lg:text-5xl font-black text-kumon-blue tracking-widest editable-elem" data-id="${data.id}_sub">${data.subtitle}</p>
                            <div class="bg-kumon-dark text-white px-6 py-4 md:px-16 md:py-8 rounded-full text-lg md:text-4xl lg:text-5xl font-black shadow-xl md:shadow-2xl inline-block editable-elem" data-id="${data.id}_contact">
                                ${data.contact}
                            </div>
                        </div>
                    </div>
                `;
            }

            // INJETA O HTML
            container.innerHTML = html;

            // Atualiza Barra de Progresso
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / slidesData.length) * 100}%`;

            // Rola para o topo ao trocar de slide no mobile
            container.scrollTop = 0;

            // Configura Interatividade do Modo Gestor e Links Ativos
            setupInteractivity();
        }

        // CONTROLO DE NAVEGAÇÃO
        function nextSlide() {
            if (currentIndex < slidesData.length - 1) {
                currentIndex++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide();
            }
        }

        // NAVEGAÇÃO POR TECLADO
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') nextSlide();
            if (e.key === 'ArrowLeft' || e.key === 'Backspace') prevSlide();
        });

        // AUTENTICAÇÃO GESTOR (*177)
        function triggerAdmin() {
            adminClicks++;
            if (adminClicks === 3) {
                const pass = prompt("MODO GESTOR (*177). INSIRA A SENHA:");
                if (pass === "*177") {
                    isAdmin = true;
                    document.body.classList.add('admin-mode');
                    alert("Modo Gestor Ativado com Sucesso! Clique em qualquer texto/caixa para inserir ou editar um Link.");
                    renderSlide(); 
                } else {
                    alert("Senha Incorreta.");
                }
                adminClicks = 0;
            }
        }

        // CONFIGURAÇÃO DOS CLIQUES (EDIÇÃO OU NAVEGAÇÃO)
        function setupInteractivity() {
            const elements = document.querySelectorAll('.editable-elem');
            
            elements.forEach(el => {
                const id = el.dataset.id;
                
                if (savedLinks[id]) {
                    el.classList.add('has-link');
                } else {
                    el.classList.remove('has-link');
                }

                if (isAdmin) {
                    el.classList.add('editable');
                }

                el.onclick = (e) => {
                    if (isAdmin) {
                        e.stopPropagation();
                        const currentVal = savedLinks[id] || "";
                        const newUrl = prompt(`Definir URL para este item:`, currentVal);
                        
                        if (newUrl !== null) { 
                            if (newUrl.trim() === "") {
                                delete savedLinks[id]; 
                            } else {
                                savedLinks[id] = newUrl.trim();
                            }
                            localStorage.setItem('kumon_v177_links', JSON.stringify(savedLinks));
                            renderSlide(); 
                        }
                    } else if (savedLinks[id]) {
                        e.stopPropagation();
                        window.open(savedLinks[id], '_blank');
                    }
                };
            });
        }

        // INICIALIZAÇÃO
        window.onload = () => {
            renderSlide();
        };
    </script>
</body>
</html>
