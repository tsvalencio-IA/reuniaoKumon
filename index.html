<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reunião de Pais 2026 - Kumon Rio Preto Shopping</title>
    <!-- Bibliotecas de Alta Performance -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            font-family: 'Poppins', sans-serif;
        }

        /* Container que mantém a proporção 16:9 independente do monitor */
        #app-viewport {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
            background: white;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        .bg-kumon-blue { background-color: #00AEEF; }
        .bg-kumon-dark { background-color: #004578; }
        .bg-kumon-orange { background-color: #F39200; }
        .text-kumon-blue { color: #00AEEF; }
        .text-kumon-dark { color: #004578; }
        
        /* Animações suaves */
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [scale, setScale] = useState(1);

            // Ajuste de Escala Dinâmico para TVs
            useEffect(() => {
                const handleResize = () => {
                    const width = window.innerWidth;
                    const height = window.innerHeight;
                    const scaleW = width / 1920;
                    const scaleH = height / 1080;
                    setScale(Math.min(scaleW, scaleH));
                };
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Controle via Teclado/Controle Remoto
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === "ArrowRight" || e.key === "Enter" || e.key === " ") {
                        setCurrentSlide(prev => Math.min(prev + 1, slides.length - 1));
                    }
                    if (e.key === "ArrowLeft" || e.key === "Backspace") {
                        setCurrentSlide(prev => Math.max(prev - 1, 0));
                    }
                };
                window.addEventListener("keydown", handleKeyDown);
                return () => window.removeEventListener("keydown", handleKeyDown);
            }, []);

            const slides = [
                {
                    id: 1,
                    type: "cover",
                    title: "REUNIÃO DE PAIS 2026",
                    subtitle: "KUMON RIO PRETO SHOPPING",
                    unit: "Unidade Tia Fernanda",
                    bg: "bg-gradient-to-br from-[#00AEEF] via-[#004578] to-[#010b1a]"
                },
                {
                    id: 2,
                    title: "TORU KUMON: A ORIGEM",
                    icon: "⭐",
                    items: [
                        "Metodologia nascida da extrema dedicação de um pai.",
                        "Foco total no desenvolvimento pleno da autonomia.",
                        "Baseado no encorajamento e na consistência diária.",
                        "Uma filosofia que transforma vidas além da escola."
                    ]
                },
                {
                    id: 3,
                    type: "quote",
                    text: "Obter máximo resultado com o mínimo de esforço. Produzir os melhores resultados no menor espaço de tempo é possível.",
                    author: "Toru Kumon",
                    bg: "bg-kumon-orange"
                },
                {
                    id: 4,
                    title: "O QUE É O KUMON?",
                    grid: [
                        { t: "AUTODIDATISMO", d: "Capacidade de aprender por si, buscando o conhecimento de forma ativa.", i: "🧠" },
                        { t: "MATERIAL DIDÁTICO", d: "Estruturado e autoinstrutivo, evoluindo em pequenos passos.", i: "📚" },
                        { t: "INDIVIDUALIZAÇÃO", d: "Ensino focado no ritmo e na capacidade única de cada aluno.", i: "🎯" },
                        { t: "ORIENTADOR", d: "Guia o aluno a descobrir e alcançar seu próprio potencial máximo.", i: "💡" }
                    ]
                },
                {
                    id: 5,
                    title: "OBJETIVOS DO KUMON",
                    items: [
                        "Ressignificar a educação para crianças e jovens.",
                        "Transformar a educação após os desafios da pandemia.",
                        "Promover mudança de vida e transformação social.",
                        "Sequência de estudos lógica, coerente e eficiente.",
                        "Construir uma base sólida para a vida toda."
                    ]
                },
                {
                    id: 6,
                    title: "NOSSA HISTÓRIA",
                    items: [
                        "1993: Início da unidade com a pioneira Fernanda Musolino.",
                        "1998: Única unidade Clube Ouro de Rio Preto (mantido desde então).",
                        "2013: Maria Flavia Musolino assume a liderança da unidade.",
                        "Marca histórica de 450 alunos atingida na pandemia.",
                        "Referência em Qualidade para a Matriz Kumon Brasil."
                    ]
                },
                {
                    id: 7,
                    title: "EQUIPE DA UNIDADE",
                    layout: "team",
                    groups: [
                        {
                            title: "LIDERANÇA E APOIO",
                            members: [
                                { r: "Orientadora", n: "Maria Flavia" },
                                { r: "Gerente Geral", n: "Thamis" },
                                { r: "Psicóloga", n: "Maria Carolina" },
                                { r: "Recepção / Adm", n: "Ingrid e Rafaela" }
                            ]
                        },
                        {
                            title: "CORPO PEDAGÓGICO",
                            members: [
                                { r: "Auxiliares", n: "Tia Dani, Tia Gabi, Tia Ana Julia" },
                                { r: "Auxiliares", n: "Tia Maria Clara, Tia Isadhora, Tio João" },
                                { r: "Estagiário", n: "Tio Bruno (Correção)" }
                            ]
                        }
                    ]
                },
                {
                    id: 8,
                    title: "ESTRUTURA PEDAGÓGICA",
                    type: "table",
                    rows: [
                        { d: "PORTUGUÊS", ini: "7A ao CII", ava: "DI ao L" },
                        { d: "MATEMÁTICA", ini: "6A ao A", ava: "B ao F | G ao O" },
                        { d: "INGLÊS", ini: "7A ao C", ava: "D ao O" }
                    ]
                },
                {
                    id: 9,
                    title: "INDICADORES REAIS",
                    layout: "stats",
                    stats: [
                        { l: "ALUNOS ATIVOS", v: "364", c: "text-kumon-blue" },
                        { l: "ACIMA DA SÉRIE", v: "197", c: "text-kumon-orange" }
                    ]
                },
                {
                    id: 10,
                    title: "KUMON BABY",
                    items: [
                        "Atendimento a partir dos 6 meses de idade.",
                        "Estímulos essenciais na primeira infância.",
                        "Desenvolvimento motor e cognitivo.",
                        "Preparação para a alfabetização e raciocínio futuro.",
                        "Ambiente lúdico, seguro e acolhedor."
                    ],
                    icon: "👶"
                },
                {
                    id: 11,
                    type: "quote",
                    text: "Seus filhos vão herdar seus hábitos. Isso te preocupa ou te tranquiliza?",
                    author: "Reflexão para o Futuro",
                    bg: "bg-kumon-dark"
                },
                {
                    id: 12,
                    title: "COMPLEMENTO ESCOLAR",
                    items: [
                        "Resgate do interesse pelo aprendizado ativo.",
                        "Preenchimento de lacunas do ensino tradicional.",
                        "Fortalecimento da base e hábito de estudo diário.",
                        "Autonomia para desafios escolares e vestibulares.",
                        "Aumento da confiança e redução da ansiedade."
                    ]
                },
                {
                    id: 13,
                    title: "TDAH / TDA / DISLEXIA",
                    items: [
                        "Acompanhamento focado no desenvolvimento individual.",
                        "Respeito ao ritmo único de aprendizado.",
                        "Atuação da psicóloga Maria Carolina com a equipe.",
                        "Aumento gradual da capacidade de concentração.",
                        "Parceria Unidade, Escola e Família."
                    ]
                },
                {
                    id: 14,
                    title: "ALUNA DESTAQUE",
                    layout: "highlight",
                    data: {
                        name: "SOPHIA SANGOLETE",
                        info: "Início: 16/06/2016",
                        status: "Matemática Estágio M 111",
                        ach: "Concluinte de Português e Inglês",
                        res: "Aprovada em Enfermagem (8º Lugar FAMEMA / FAMERP)"
                    }
                },
                {
                    id: 15,
                    title: "KUMON CONNECT",
                    items: [
                        "Evolução digital do método tradicional.",
                        "Estudo em tablets com canetas interativas.",
                        "Correção ágil e acompanhamento em tempo real.",
                        "Sustentabilidade e tecnologia aliada ao aprendizado.",
                        "Maior engajamento para as novas gerações."
                    ]
                },
                {
                    id: 16,
                    title: "A TRÍADE DO SUCESSO",
                    grid: [
                        { t: "UNIDADE", d: "Planejamento, orientação e motivação constante.", i: "🏢" },
                        { t: "OS PAIS", d: "Acompanhamento, elogios e ambiente de estudo.", i: "👨‍👩‍👧" },
                        { t: "O ALUNO", d: "Protagonista, dedicação diária e autonomia.", i: "🎓" },
                        { t: "FUTURO", d: "Resultados que transformam a vida acadêmica.", i: "🚀" }
                    ]
                },
                {
                    id: 17,
                    title: "AVISOS IMPORTANTES",
                    items: [
                        "HORÁRIOS: Respeite o horário agendado (fluxo de alunos).",
                        "REPOSIÇÃO: Marcar com antecedência na recepção.",
                        "CONSISTÊNCIA: Estudo diário é o segredo do resultado.",
                        "CONTATO: Administrativo (Ingrid/Rafaela) disponível."
                    ]
                },
                {
                    id: 18,
                    type: "end",
                    title: "MUITO OBRIGADO!",
                    subtitle: "Unidade Kumon Rio Preto Shopping",
                    contact: "Tel: (17) 3227-0644"
                }
            ];

            const slide = slides[currentSlide];

            return (
                <div id="app-viewport" style={{ transform: `translate(-50%, -50%) scale(${scale})` }}>
                    <AnimatePresence mode="wait">
                        <motion.div 
                            key={currentSlide}
                            initial={{ opacity: 0, x: 50 }}
                            animate={{ opacity: 1, x: 0 }}
                            exit={{ opacity: 0, x: -50 }}
                            transition={{ duration: 0.5 }}
                            className={`w-full h-full flex flex-col p-20 ${slide.bg || 'bg-white'}`}
                        >
                            {/* CABEÇALHO PADRÃO (Exceto Capa e Fim) */}
                            {slide.type !== 'cover' && slide.type !== 'end' && (
                                <div className="flex justify-between items-center mb-16">
                                    <div className="flex items-center gap-8">
                                        <div className="bg-kumon-blue w-24 h-24 rounded-3xl flex items-center justify-center text-5xl shadow-lg">
                                            {slide.icon || "💎"}
                                        </div>
                                        <h2 className="text-7xl font-black text-kumon-dark uppercase tracking-tighter">{slide.title}</h2>
                                    </div>
                                    <div className="text-kumon-blue font-black text-4xl">KUMON 2026</div>
                                </div>
                            )}

                            {/* ÁREA DE CONTEÚDO DINÂMICO */}
                            <div className="flex-grow flex items-center justify-center">
                                
                                {slide.type === 'cover' && (
                                    <div className="text-center text-white space-y-12">
                                        <h1 className="text-[160px] font-black leading-none drop-shadow-2xl">{slide.title}</h1>
                                        <div className="h-4 w-64 bg-kumon-orange mx-auto rounded-full"></div>
                                        <p className="text-6xl font-light tracking-[0.4em] opacity-90">{slide.subtitle}</p>
                                        <div className="bg-white/10 backdrop-blur-xl border border-white/20 px-16 py-8 rounded-[40px] inline-block mt-10">
                                            <p className="text-4xl font-bold uppercase tracking-[0.5em]">{slide.unit}</p>
                                        </div>
                                    </div>
                                )}

                                {slide.type === 'quote' && (
                                    <div className="max-w-7xl text-center text-white p-20 space-y-16">
                                        <h2 className="text-8xl font-bold italic leading-tight">"{slide.text}"</h2>
                                        <div className="flex items-center justify-center gap-10">
                                            <div className="h-1 w-32 bg-white/30"></div>
                                            <cite className="text-5xl font-black not-italic uppercase tracking-widest">— {slide.author}</cite>
                                            <div className="h-1 w-32 bg-white/30"></div>
                                        </div>
                                    </div>
                                )}

                                {slide.items && (
                                    <div className="w-full max-w-6xl space-y-8">
                                        {slide.items.map((item, i) => (
                                            <div key={i} className="bg-slate-50 p-10 rounded-[40px] shadow-xl flex items-center gap-10 border-l-[30px] border-kumon-blue">
                                                <div className="text-5xl text-kumon-blue">➜</div>
                                                <p className="text-5xl font-bold text-slate-700 leading-tight">{item}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {slide.grid && (
                                    <div className="grid grid-cols-2 gap-12 w-full max-w-7xl">
                                        {slide.grid.map((item, i) => (
                                            <div key={i} className="bg-slate-50 p-16 rounded-[60px] shadow-xl text-center space-y-8 border-b-[20px] border-kumon-orange">
                                                <div className="text-9xl mb-4">{item.i}</div>
                                                <h3 className="text-5xl font-black text-kumon-dark uppercase">{item.t}</h3>
                                                <p className="text-3xl text-slate-500 font-bold leading-relaxed">{item.d}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {slide.layout === 'team' && (
                                    <div className="grid grid-cols-2 gap-24 w-full max-w-7xl">
                                        {slide.groups.map((group, i) => (
                                            <div key={i} className="space-y-12">
                                                <h3 className="text-5xl font-black text-white bg-kumon-dark p-8 rounded-3xl uppercase text-center shadow-xl">{group.title}</h3>
                                                <div className="space-y-6">
                                                    {group.members.map((m, j) => (
                                                        <div key={j} className="bg-slate-50 p-8 rounded-3xl shadow-lg flex justify-between items-center border-r-[20px] border-kumon-blue">
                                                            <span className="text-3xl font-bold text-slate-400 uppercase tracking-tighter">{m.r}</span>
                                                            <span className="text-4xl font-black text-kumon-dark">{m.n}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {slide.type === 'table' && (
                                    <div className="w-full max-w-7xl overflow-hidden rounded-[80px] shadow-2xl bg-white border border-slate-100">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="bg-kumon-dark text-white text-5xl">
                                                <tr>
                                                    <th className="p-16 font-black uppercase">Disciplina</th>
                                                    <th className="p-16 font-black uppercase">Inicial</th>
                                                    <th className="p-16 font-black uppercase text-kumon-orange">Avançada</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-5xl font-bold text-slate-600">
                                                {slide.rows.map((row, i) => (
                                                    <tr key={i} className={i % 2 === 0 ? "bg-white" : "bg-slate-50"}>
                                                        <td className="p-16 border-b border-slate-100">{row.label || row.d}</td>
                                                        <td className="p-16 border-b border-slate-100">{row.ini}</td>
                                                        <td className="p-16 border-b border-slate-100 text-kumon-orange font-black">{row.ava}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {slide.layout === 'stats' && (
                                    <div className="flex gap-24 w-full max-w-7xl">
                                        {slide.stats.map((stat, i) => (
                                            <div key={i} className="flex-1 bg-slate-50 p-24 rounded-[120px] shadow-2xl text-center border-t-[40px] border-kumon-blue">
                                                <div className={`text-[280px] font-black leading-none mb-10 ${stat.c}`}>{stat.v}</div>
                                                <div className="text-7xl font-black text-slate-300 uppercase tracking-[0.2em]">{stat.l}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {slide.layout === 'highlight' && (
                                    <div className="bg-slate-50 p-24 rounded-[120px] shadow-2xl w-full max-w-7xl border-l-[60px] border-kumon-blue flex flex-col justify-center">
                                        <div className="inline-block bg-kumon-orange text-white px-16 py-6 rounded-full font-black text-4xl mb-16 shadow-lg self-start uppercase">
                                            ⭐ ALUNA DESTAQUE
                                        </div>
                                        <h3 className="text-[140px] font-black text-kumon-dark tracking-tighter leading-none mb-16">{slide.data.name}</h3>
                                        <div className="grid grid-cols-1 gap-10">
                                            <div className="flex items-center gap-10 text-5xl text-slate-500 font-bold">
                                                <span className="text-kumon-blue text-7xl">✔</span> {slide.data.info}
                                            </div>
                                            <div className="flex items-center gap-10 text-5xl text-slate-500 font-bold">
                                                <span className="text-kumon-blue text-7xl">✔</span> {slide.data.status}
                                            </div>
                                            <div className="flex items-center gap-10 text-5xl text-slate-500 font-bold">
                                                <span className="text-kumon-blue text-7xl">✔</span> {slide.data.ach}
                                            </div>
                                            <div className="mt-16 bg-kumon-dark text-white p-16 rounded-[60px] text-7xl font-black shadow-2xl text-center italic">
                                                {slide.data.res}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {slide.type === 'end' && (
                                    <div className="text-center space-y-24">
                                        <div className="text-[250px] animate-bounce">👋</div>
                                        <h2 className="text-[180px] font-black text-kumon-dark uppercase leading-none tracking-tighter">{slide.title}</h2>
                                        <div className="space-y-12">
                                            <p className="text-7xl font-black text-kumon-blue uppercase tracking-widest">{slide.subtitle}</p>
                                            <div className="bg-kumon-dark text-white px-24 py-12 rounded-full text-8xl font-black shadow-2xl inline-block">
                                                {slide.contact}
                                            </div>
                                        </div>
                                    </div>
                                )}

                            </div>

                            {/* RODAPÉ FIXO (ASSINATURA) */}
                            <footer className="mt-16 flex justify-between items-end">
                                <div className="flex gap-10">
                                    <button 
                                        onClick={() => setCurrentSlide(prev => Math.max(prev - 1, 0))}
                                        className="bg-slate-100 w-24 h-24 rounded-full flex items-center justify-center text-5xl shadow-lg hover:bg-kumon-blue hover:text-white transition-all"
                                    > ⬅ </button>
                                    <button 
                                        onClick={() => setCurrentSlide(prev => Math.min(prev + 1, slides.length - 1))}
                                        className="bg-slate-100 w-24 h-24 rounded-full flex items-center justify-center text-5xl shadow-lg hover:bg-kumon-blue hover:text-white transition-all"
                                    > ➡ </button>
                                </div>
                                <div className="text-right space-y-4">
                                    <div className="text-slate-200 text-3xl font-black uppercase tracking-[0.5em]">Reunião 2026</div>
                                    <div className="bg-kumon-dark text-white px-16 py-8 rounded-[40px] text-4xl font-black shadow-2xl border-b-[12px] border-black/30">
                                        powered by thIAguinho Soluções
                                    </div>
                                </div>
                            </footer>
                        </motion.div>
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
