<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reunião de Pais 2026 - Kumon Rio Preto Shopping</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Script Oficial Cloudinary -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <!-- FIREBASE COMPAT - REALTIME DATABASE -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <!-- TENSORFLOW & MOVENET (Pacote consolidado) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        /* =========================================================================
           1. RESET E BLOQUEIO DA PÁGINA
           ========================================================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100vw; height: 100vh;
            overflow: hidden; 
            background-color: #0b0f19; /* Dark Mode Premium */
            font-family: 'Poppins', sans-serif;
            touch-action: none;
        }

        #app-container {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            background-color: transparent; position: relative;
        }

        .bg-blobs::before {
            content: ''; position: absolute; top: -10vh; right: -5vw; width: 40vmin; height: 40vmin;
            background: radial-gradient(circle, rgba(0, 174, 239, 0.15) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }
        .bg-blobs::after {
            content: ''; position: absolute; bottom: -10vh; left: -5vw; width: 50vmin; height: 50vmin;
            background: radial-gradient(circle, rgba(243, 146, 0, 0.1) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }

        :root {
            --k-blue: #00AEEF;
            --k-dark: #004578;
            --k-orange: #F39200;
            --k-yellow: #FFB703;
            --txt-main: #ffffff; 
            --txt-muted: #cbd5e1;
            --bg-card: #1e293b; 
            --border-card: rgba(255, 255, 255, 0.1);
        }

        /* =========================================================================
           2. TIPOGRAFIA MATEMÁTICA - GIGANTE (RESTAURADA)
           ========================================================================= */
        .txt-mega { font-family: 'Nunito', sans-serif; font-size: 8vmin; font-weight: 900; line-height: 1.1; color: white; text-transform: uppercase; }
        .txt-title { font-family: 'Nunito', sans-serif; font-size: 5vmin; font-weight: 900; color: white; text-transform: uppercase; }
        .txt-sub { font-size: 3.5vmin; font-weight: 700; letter-spacing: 0.2vmin; color: var(--k-blue); text-transform: uppercase; }
        .txt-body { font-size: 2.8vmin; font-weight: 600; color: var(--txt-main); line-height: 1.4; }
        .txt-small { font-size: 1.8vmin; font-weight: 700; color: var(--txt-muted); text-transform: uppercase; letter-spacing: 0.1vmin; }
        
        .icon-xl { font-size: 12vmin; }
        .icon-lg { font-size: 7vmin; }
        .icon-md { font-size: 4vmin; }

        /* =========================================================================
           3. ÁREAS DA TELA
           ========================================================================= */
        .progress-bar { 
            position: absolute; top: 0; left: 0; height: 1vh; width: 0%; 
            background: linear-gradient(90deg, var(--k-yellow), var(--k-orange)); transition: width 0.3s ease; z-index: 1000; 
        }
        
        .header-area {
            height: 12vh; width: 100%; display: flex; align-items: center;
            padding: 0 5vw; border-bottom: 0.2vh solid rgba(255,255,255,0.05); z-index: 100;
            background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(10px);
        }
        
        .main-area {
            height: 76vh; width: 100%; display: flex; flex-direction: column;
            justify-content: center; padding: 2vh 5vw; z-index: 10; position: relative;
        }
        
        .footer-area {
            height: 12vh; width: 100%; display: flex; align-items: center; justify-content: space-between;
            padding: 0 5vw; border-top: 0.2vh solid rgba(255,255,255,0.05); z-index: 100; background: rgba(11, 15, 25, 0.95);
        }

        /* =========================================================================
           4. LAYOUTS INTERNOS (Blindados)
           ========================================================================= */
        .slide { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; }
        .slide.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .flex-row-locked { display: flex; flex-direction: row; gap: 3vw; height: 100%; align-items: center; justify-content: center; }
        .flex-col-locked { display: flex; flex-direction: column; gap: 2vh; height: 100%; justify-content: center; }
        
        .grid-locked { display: grid; gap: 2vmin; height: 100%; width: 100%; }
        .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1.5vw; }

        .card-box {
            background: var(--bg-card); padding: 2.5vmin; border-radius: 2vmin;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.5); border-left: 1vmin solid var(--k-blue);
            border-top: 0.1vmin solid var(--border-card); border-right: 0.1vmin solid var(--border-card); border-bottom: 0.1vmin solid var(--border-card);
            display: flex; align-items: center; gap: 2vmin; flex: 1 1 0; min-width: 0; min-height: 0;
        }
        
        .grid-card {
            background: var(--bg-card); padding: 3vmin 2vmin; border-radius: 2vmin;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.5); border-bottom: 1vmin solid var(--k-orange);
            border-top: 0.1vmin solid var(--border-card); border-left: 0.1vmin solid var(--border-card); border-right: 0.1vmin solid var(--border-card);
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; flex: 1 1 0; min-width: 0; min-height: 0;
        }

        /* -------------------------------------------------------------------------
           V177: CORREÇÕES ISOLADAS PARA "O QUE É O KUMON" E "TRÍADE" 
           Garante que as palavras compridas quebram e cabem perfeitamente.
           ------------------------------------------------------------------------- */
        .layout-is-grid-4 .txt-title { font-size: 3vmin !important; word-wrap: break-word; hyphens: auto; }
        .layout-is-grid-4 .txt-body { font-size: 1.8vmin !important; word-wrap: break-word; line-height: 1.3; }
        .layout-is-grid-4 .grid-card { padding: 1.5vmin; }
        
        .layout-is-team .txt-title { font-size: 3.5vmin !important; }
        .layout-is-team .txt-body { font-size: 2vmin !important; }
        .layout-is-team .card-box { padding: 1.5vmin; }

        /* MÍDIA BOX E ESCUDO DE CLIQUE (BLINDA OS VÍDEOS PARA EDIÇÃO ADMIN) */
        .media-box {
            background: #000; border-radius: 2vmin; overflow: hidden;
            width: 100%; height: 100%; border: 0.4vmin solid rgba(255,255,255,0.2); box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.8);
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .media-box img { width: 100%; height: 100%; object-fit: cover; } 
        .media-box video, .media-box iframe { width: 100%; height: 100%; object-fit: contain; border: none; background: black; } 

        .admin-click-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 99; cursor: pointer; display: none; }
        .admin-mode .admin-click-shield { display: block; }

        /* TABELA PREMIUM ESCURA */
        .table-container { width: 100%; max-width: 90vw; background: var(--bg-card); border-radius: 2vmin; overflow: hidden; box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.5); border: 0.1vmin solid var(--border-card); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: rgba(0, 174, 239, 0.2); color: var(--k-blue); padding: 2.5vmin; font-size: 2.8vmin; font-family: 'Nunito', sans-serif; text-transform: uppercase; }
        td { padding: 2.5vmin; text-align: center; font-size: 2.5vmin; font-weight: 600; color: var(--txt-main); border-bottom: 0.1vmin solid rgba(255,255,255,0.05); word-wrap: break-word; }
        td:first-child { background: rgba(255,255,255,0.05); text-align: left; color: white; font-weight: 800; }

        /* =========================================================================
           5. BOTÕES DO RODAPÉ E MODO CINEMA
           ========================================================================= */
        .nav-controls { display: flex; gap: 2vw; align-items: center; }

        .btn-nav {
            height: 7vh; width: 7vh; border-radius: 50%; background: rgba(255,255,255,0.1); color: white;
            display: flex; align-items: center; justify-content: center; font-size: 3vh; 
            cursor: pointer; border: 0.2vh solid rgba(255,255,255,0.2); transition: 0.2s;
        }
        .btn-nav:hover { background: var(--k-blue); border-color: var(--k-blue); }
        .btn-nav:active { transform: scale(0.9); }
        
        .btn-logo {
            height: 9vh; width: 9vh; border-radius: 50%; background: linear-gradient(135deg, var(--k-blue), var(--k-dark)); color: white;
            display: flex; align-items: center; justify-content: center; font-size: 4vh; 
            font-weight: 900; cursor: pointer; border: none; box-shadow: 0 1vh 2vh rgba(0,174,239,0.3); transition: 0.2s;
        }

        .btn-extras {
            background: none; border: none; color: var(--txt-muted); cursor: pointer;
            font-size: 3.5vh; margin-right: 1.5vw; transition: 0.3s;
        }
        .btn-extras:hover, .btn-extras.active-ar { color: var(--k-blue); }
        .btn-extras.active-ar { color: #00ff66; text-shadow: 0 0 1vh #00ff66; }

        /* MODO CINEMA: ESCONDE BOTÕES EM TELA CHEIA NA TV */
        :fullscreen .nav-controls, :fullscreen .btn-extras { display: none !important; }
        :-webkit-full-screen .nav-controls, :-webkit-full-screen .btn-extras { display: none !important; }
        :-ms-fullscreen .nav-controls, :-ms-fullscreen .btn-extras { display: none !important; }

        /* =========================================================================
           6. MODO GESTOR TÁTIL E MODAIS
           ========================================================================= */
        .admin-mode .editable { outline: 0.4vmin dashed var(--k-orange); position: relative; cursor: pointer; border-radius: 1vmin; transition: background 0.2s; }
        .admin-mode .editable:hover { background: rgba(243, 146, 0, 0.2); }
        .admin-mode .editable::before { content: '🔗 LINK'; position: absolute; top: -3vmin; left: 0; background: var(--k-orange); color: white; font-size: 2vmin; font-weight: bold; padding: 0.5vmin 1.5vmin; border-radius: 0.5vmin; z-index: 100; }
        
        .admin-mode .editable-media { outline: 0.5vmin dashed var(--k-blue); cursor: pointer; position: relative; }
        .admin-mode .editable-media::after { content: '📸 ALTERAR MÍDIA'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,174,239,0.95); color: white; padding: 2vmin 4vmin; border-radius: 1vmin; font-size: 3vmin; font-weight: bold; pointer-events: none; z-index: 100;}
        .has-link:not(.editable) { cursor: pointer; border-bottom: 0.4vmin solid var(--k-blue); }

        /* BARRA FLUTUANTE DE AÇÕES DO ADMIN */
        #admin-actions-bar {
            position: fixed; bottom: 15vh; left: 50%; transform: translateX(-50%);
            display: none; align-items: center; gap: 3vw; z-index: 9995;
            background: rgba(0,0,0,0.85); padding: 2vmin 4vmin; border-radius: 4vmin;
            border: 0.2vmin solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.5);
        }

        #admin-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9);
            z-index: 999999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .admin-modal-content {
            background: #1e293b; padding: 5vmin; border-radius: 3vmin; width: 85vw; max-width: 600px;
            box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }
        .admin-input { width: 100%; padding: 2vmin; border: 0.2vmin solid #334155; border-radius: 1vmin; font-size: 2.5vmin; margin-bottom: 3vmin; font-family: 'Poppins', sans-serif; background: #0f172a; color: white; }
        .admin-btn { padding: 2vmin 3.5vmin; border: none; border-radius: 1vmin; font-weight: 700; font-size: 2.5vmin; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--k-blue); color: white; }
        .btn-secondary { background: #334155; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-upload { background: var(--k-orange); color: white; width: 100%; margin-bottom: 3vmin; font-size: 2.5vmin; padding: 2.5vmin;}
        
        .status-warning {
            position: fixed; top: 2vh; right: 2vw; background: #22c55e; color: white;
            padding: 1.5vmin 3vmin; border-radius: 1vmin; font-size: 2vmin; font-weight: bold;
            z-index: 9999; display: none; box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.5);
        }
        .fade-out { animation: fadeOut 5s forwards; animation-delay: 3s; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; display: none; } }
        .pulse { animation: pulse 1.5s infinite; background: #f59e0b; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* =========================================================================
           7. PAINEL DE CONTROLE AR (MINORITY REPORT DASHBOARD)
           ========================================================================= */
        #ar-dashboard {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #020617; z-index: 9990; display: none; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 5vh;
        }
        
        #ar-main-buttons { display: flex; flex-direction: column; width: 90vw; gap: 4vh; align-items: center; margin-top: 8vh; }
        .ar-row-buttons { display: flex; width: 100%; justify-content: space-between; height: 25vh; }
        #ar-confirm-buttons { display: none; flex-direction: column; width: 90vw; height: 60vh; justify-content: space-between; align-items: center; margin-top: 5vh; }

        .ar-control-btn {
            background: rgba(0, 174, 239, 0.05); border: 0.5vmin solid rgba(0, 174, 239, 0.4);
            border-radius: 4vmin; color: white; font-size: 4.5vmin; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2vmin;
            transition: 0.3s; box-shadow: 0 0 4vmin rgba(0, 174, 239, 0.1) inset; cursor: none;
            width: 40vw; 
        }
        .ar-control-btn i { font-size: 9vmin; color: var(--k-blue); }
        .ar-control-btn.orange { border-color: rgba(243, 146, 0, 0.4); box-shadow: 0 0 4vmin rgba(243, 146, 0, 0.1) inset; }
        .ar-control-btn.orange i { color: var(--k-orange); }
        
        .ar-control-btn.green { border-color: rgba(0, 255, 102, 0.5); box-shadow: 0 0 5vmin rgba(0, 255, 102, 0.2) inset; width: 85vw; height: 22vh; flex-direction: row; gap: 4vw;}
        .ar-control-btn.green i { color: #00ff66; }
        .ar-control-btn.red { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 5vmin rgba(239, 68, 68, 0.2) inset; width: 85vw; height: 20vh; flex-direction: row; gap: 4vw;}
        .ar-control-btn.red i { color: #ef4444; }

        #ar-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9998; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="progress-bar" id="progress-bar"></div>
        <div id="firebase-warning" class="status-warning fade-out"><i class="fa-solid fa-cloud-check"></i> BD Sincronizado</div>
        <div id="ar-status-warning" class="status-warning pulse"><i class="fa-solid fa-camera"></i> A Carregar IA Holográfica...</div>

        <!-- CÂMERA ESCONDIDA E MUTADA -->
        <video id="ar-video" playsinline autoplay muted style="display: none;"></video>
        <canvas id="ar-canvas"></canvas>

        <!-- BARRA DE ADMIN FLUTUANTE V177 -->
        <div id="admin-actions-bar">
            <button id="btn-ar-toggle" onclick="window.ARController.toggle()" style="background: var(--k-dark); color: #00ff66; border: 0.3vmin solid #00ff66; padding: 1.5vmin 3vmin; border-radius: 4vmin; font-weight: 800; font-size: 2.2vmin; cursor: pointer; box-shadow: 0 0.5vmin 1.5vmin rgba(0, 255, 102, 0.2);">
                <i class="fa-solid fa-hand-sparkles"></i> MODO AR
            </button>
            <button id="btn-config-cloudinary" style="background: var(--k-orange); color: white; border: none; padding: 1.5vmin 3vmin; border-radius: 4vmin; font-weight: 800; font-size: 2.2vmin; cursor: pointer; box-shadow: 0 0.5vmin 1.5vmin rgba(243, 146, 0, 0.4);">
                <i class="fa-solid fa-gear"></i> CONFIG CLOUDINARY
            </button>
        </div>

        <!-- PAINEL DE CONTROLE AR EXCLUSIVO DO ADMIN -->
        <div id="ar-dashboard">
            <div style="color: #00AEEF; font-size: 4.5vmin; font-weight: 900; letter-spacing: 0.3vmin; text-align: center;">
                PAINEL HOLOGRÁFICO
            </div>
            <div style="color: white; font-size: 3vmin; font-weight: 600; margin-top: 1vh; text-align: center;">
                EXIBINDO NO TELÃO:<br>
                <span id="ar-dash-slide-name" style="color: #00ff66; font-size: 5.5vmin; text-shadow: 0 0 2vmin #00ff66;">A CARREGAR...</span>
            </div>

            <div id="ar-main-buttons">
                <div class="ar-row-buttons">
                    <button id="ar-btn-prev" class="ar-control-btn admin-btn-target" onclick="window.triggerARConfirm('prev')">
                        <i class="fa-solid fa-chevron-left"></i> VOLTAR
                    </button>
                    <button id="ar-btn-next" class="ar-control-btn orange admin-btn-target" onclick="window.triggerARConfirm('next')">
                        AVANÇAR <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                
                <button id="ar-btn-action" class="ar-control-btn admin-btn-target" onclick="window.triggerARConfirm('action')" style="display: none; width: 90vw; height: 20vh; flex-direction: row; gap: 4vw; border-color: rgba(0, 255, 102, 0.4); box-shadow: 0 0 4vmin rgba(0, 255, 102, 0.15) inset;">
                    <i class="fa-solid fa-play" style="color: #00ff66;"></i> 
                    <span style="color: #00ff66;">PLAY / ABRIR</span>
                </button>
            </div>

            <div id="ar-confirm-buttons">
                <button id="ar-btn-ok" class="ar-control-btn green admin-btn-target" onclick="window.executeARConfirm()">
                    <i class="fa-solid fa-check"></i> CONFIRMAR AÇÃO
                </button>
                <div style="color: var(--txt-muted); font-size: 3.5vmin; font-weight: bold; text-align: center;">MANTENHA A MÃO NO BOTÃO VERDE</div>
                <button id="ar-btn-cancel" class="ar-control-btn red admin-btn-target" onclick="window.cancelARConfirm()">
                    <i class="fa-solid fa-xmark"></i> CANCELAR
                </button>
            </div>
            
            <button id="btn-ar-close" class="admin-btn-target" onclick="window.ARController.toggle()" style="position: absolute; bottom: 3vh; background: #ef4444; color: white; border: none; padding: 2vmin 4vmin; border-radius: 5vmin; font-size: 3vmin; font-weight: bold; cursor: pointer; z-index: 9991; box-shadow: 0 1vmin 2vmin rgba(239, 68, 68, 0.3);">
                <i class="fa-solid fa-power-off"></i> Desligar Painel AR
            </button>
        </div>

        <!-- CONTEÚDO PRINCIPAL DA APRESENTAÇÃO (TELÃO) -->
        <header class="header-area" id="main-header">
            <div style="display: flex; align-items: center; gap: 3vmin; width: 100%;">
                <div id="slide-icon" style="width: 9vmin; height: 9vmin; background: linear-gradient(135deg, var(--k-blue), var(--k-dark)); color: white; border-radius: 2vmin; display: flex; align-items: center; justify-content: center; font-size: 4.5vmin; flex-shrink: 0; box-shadow: 0 0.5vmin 1.5vmin rgba(0,174,239,0.3);">
                    <i class="fa-solid fa-star"></i>
                </div>
                <h2 id="slide-title" class="txt-title" data-id="global_title">Título Padrão</h2>
            </div>
        </header>

        <main class="main-area bg-blobs" id="main-content">
            <!-- Os slides são injetados aqui -->
        </main>

        <footer class="footer-area">
            <div class="nav-controls">
                <button id="btn-prev" class="btn-nav"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="logo-btn" class="btn-logo" title="Gestor: 3 Cliques">K</button>
                <button id="btn-next" class="btn-nav"><i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <div style="display: flex; align-items: center;">
                <button class="btn-extras" onclick="window.toggleFullScreen()" title="Tela Cheia (F)">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <div style="display: flex; flex-direction: column; align-items: flex-end;">
                    <span class="txt-small" style="color: white;">Reunião 2026</span>
                    <span class="txt-small" style="text-transform: none; color: var(--txt-muted);">powered by <strong style="color: var(--k-blue);">thIAguinho Soluções</strong></span>
                </div>
            </div>
        </footer>
    </div>

    <div id="admin-modal-overlay"></div>

    <script>
        // =====================================================================
        // CHAVES DO FIREBASE E INICIALIZAÇÃO
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCaFH2nn5VD9eTAdCcdkduDxfg8BbU-dM8",
            authDomain: "reuniaokumon.firebaseapp.com",
            projectId: "reuniaokumon",
            storageBucket: "reuniaokumon.firebasestorage.app",
            messagingSenderId: "672456540538",
            appId: "1:672456540538:web:ffcb6eeb8338bb13d796c3",
            databaseURL: "https://reuniaokumon-default-rtdb.firebaseio.com"
        };
        window.firebaseCfg = firebaseConfig;

        function safeParseJSON(key, defaultObj) {
            try { return localStorage.getItem(key) ? JSON.parse(localStorage.getItem(key)) : defaultObj; } catch (e) { return defaultObj; }
        }

        window.isAdmin = false; window.adminClicks = 0; window.currentEditingId = null;
        window.arPendingAction = null; window.arConfirmTimeout = null;
        window.arCooldown = false; 
        
        window.savedSlideIndex = parseInt(localStorage.getItem('kumon_v177_slide')) || 0;
        window.currentIndex = window.savedSlideIndex;

            const activeSlide = document.querySelector('.slide.active');
            if (!activeSlide) return;

            const video = activeSlide.querySelector('video.slide-video');
            if (video) {
                if (video.paused) { video.play().catch(e => console.warn("Autoplay bloqueado.", e)); } 
                else { video.pause(); }
                return;
            }

            const iframe = activeSlide.querySelector('iframe');
            if (iframe) {
                window.ytState = !window.ytState;
                const cmd = window.ytState ? 'playVideo' : 'pauseVideo';
                iframe.contentWindow.postMessage(JSON.stringify({event: 'command', func: cmd, args: ''}), '*');
                return;
            }

            const linkEl = activeSlide.querySelector('.has-link');
            if (linkEl && linkEl.dataset.id && window.savedLinks[linkEl.dataset.id]) {
                window.open(window.savedLinks[linkEl.dataset.id], '_blank');
            }
        };

        window.nextSlide = function() { if (window.currentIndex < slidesData.length - 1) { window.currentIndex++; window.syncSlideState(); window.renderSlide(); } };
        window.prevSlide = function() { if (window.currentIndex > 0) { window.currentIndex--; window.syncSlideState(); window.renderSlide(); } };

        document.getElementById('btn-next').addEventListener('click', window.nextSlide);
        document.getElementById('btn-prev').addEventListener('click', window.prevSlide);

        window.toggleFullScreen = function() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => console.log(e)); } 
            else { if (document.exitFullscreen) document.exitFullscreen(); }
        };

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (['Space', ' ', 'ArrowDown', 'ArrowUp', 'PageDown', 'PageUp'].includes(e.key)) e.preventDefault();

            if (e.key === ' ' || e.key === 'Enter') { window.executeMediaAction(); return; }
            if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === 'ArrowDown') window.nextSlide();
            if (e.key === 'ArrowLeft' || e.key === 'PageUp' || e.key === 'ArrowUp' || e.key === 'Backspace') window.prevSlide();
            if (e.key === 'f' || e.key === 'F') window.toggleFullScreen();
        });

        // GESTOR MANUAL E CLOUDINARY
        document.getElementById('logo-btn').addEventListener('click', () => {
            window.adminClicks++;
            if (window.adminClicks === 3) {
                const pass = prompt("SISTEMA GESTOR (*177). SENHA:");
                if (pass === "*177") {
                    window.isAdmin = true; document.body.classList.add('admin-mode');
                    document.getElementById('admin-actions-bar').style.display = 'flex';
                    window.renderSlide(true); 
                } else { alert("Senha Incorreta."); }
                window.adminClicks = 0;
            }
        });

        const overlay = document.getElementById('admin-modal-overlay');
        window.closeAdminModal = function() { overlay.style.display = 'none'; }
        overlay.addEventListener('click', function(e) { if (e.target === this) window.closeAdminModal(); });

        window.openLinkModal = function(linkId) {
            window.currentEditingId = linkId;
            const currentUrl = (window.savedLinks[linkId]||"").replace(/"/g, '&quot;');
            overlay.innerHTML = `
                <div class="admin-modal-content">
                    <h3 style="font-size: 3vmin; font-weight: 800; margin-bottom: 2vh; color: white; text-align: center;">🔗 Editar Redirecionamento</h3>
                    <button class="admin-btn btn-upload" id="btn-upload-link" style="background: var(--k-orange); color: white; width: 100%; margin-bottom: 3vmin; font-size: 2.5vmin; padding: 2.5vmin; border: none; border-radius: 1vmin; cursor: pointer; font-weight: bold;"><i class="fa-solid fa-cloud-arrow-up"></i> ENVIAR ARQUIVO PARA GALERIA</button>
                    <input type="text" id="link-input" class="admin-input" value="${currentUrl}" placeholder="Ou cole o link (Ex: https://wa.me/...)">
                    <div style="display: flex; gap: 2vw; justify-content: center; margin-top: 2vh;">
                        <button class="admin-btn btn-secondary" onclick="window.closeAdminModal()">Cancelar</button>
                        <button class="admin-btn btn-danger" onclick="delete window.savedLinks[window.currentEditingId]; window.saveData(); window.closeAdminModal(); window.renderSlide(true);">Remover</button>
                        <button class="admin-btn btn-primary" onclick="const v=document.getElementById('link-input').value.trim(); if(v==='') delete window.savedLinks[window.currentEditingId]; else window.savedLinks[window.currentEditingId]=v; window.saveData(); window.closeAdminModal(); window.renderSlide(true);">Salvar</button>
                    </div>
                </div>`;
            overlay.style.display = 'flex';

            document.getElementById('btn-upload-link').addEventListener('click', () => {
                if(typeof cloudinary === 'undefined') { alert("Cloudinary não carregou."); return; }
                if(!window.cloudinaryConfig.cloudName || !window.cloudinaryConfig.preset) { alert("Configure o Cloudinary no botão inferior primeiro!"); return; }
                cloudinary.createUploadWidget({ cloudName: window.cloudinaryConfig.cloudName, uploadPreset: window.cloudinaryConfig.preset, sources: ['local', 'url', 'camera'], multiple: false }, (error, result) => {
                    if (!error && result && result.event === "success") { document.getElementById('link-input').value = result.info.secure_url; }
                }).open();
            });
        }

        window.openMediaModal = function(mediaId) {
            window.currentEditingId = mediaId;
            const currentUrl = (window.savedMedia[mediaId]||"").replace(/"/g, '&quot;');
            overlay.innerHTML = `
                <div class="admin-modal-content">
                    <h3 style="font-size: 3.5vmin; font-weight: 900; margin-bottom: 1.5vh; color: var(--k-blue); text-align: center;">📸 Enviar ou Alterar Mídia</h3>
                    <button class="admin-btn btn-upload" id="btn-upload-media" style="background: var(--k-orange); color: white; width: 100%; margin-bottom: 3vmin; font-size: 2.5vmin; padding: 2.5vmin; border: none; border-radius: 1vmin; cursor: pointer; font-weight: bold;"><i class="fa-solid fa-cloud-arrow-up"></i> ENVIAR ARQUIVO PARA GALERIA</button>
                    <input type="text" id="media-link-input" class="admin-input" value="${currentUrl}" placeholder="Ou cole o link (YouTube/MP4)">
                    <div style="display: flex; gap: 2vw; justify-content: center; margin-top: 2vh;">
                        <button class="admin-btn btn-secondary" onclick="window.closeAdminModal()">Cancelar</button>
                        <button class="admin-btn btn-danger" onclick="delete window.savedMedia[window.currentEditingId]; window.saveData(); window.closeAdminModal(); window.renderSlide(true);">Restaurar</button>
                        <button class="admin-btn btn-primary" onclick="const v=document.getElementById('media-link-input').value.trim(); if(v==='') delete window.savedMedia[window.currentEditingId]; else window.savedMedia[window.currentEditingId]=v; window.saveData(); window.closeAdminModal(); window.renderSlide(true);">Salvar</button>
                    </div>
                </div>`;
            overlay.style.display = 'flex';

            document.getElementById('btn-upload-media').addEventListener('click', () => {
                if(typeof cloudinary === 'undefined') { alert("Cloudinary não carregou."); return; }
                if(!window.cloudinaryConfig.cloudName || !window.cloudinaryConfig.preset) { alert("Configure o Cloudinary no botão inferior primeiro!"); return; }
                cloudinary.createUploadWidget({ cloudName: window.cloudinaryConfig.cloudName, uploadPreset: window.cloudinaryConfig.preset, sources: ['local', 'url', 'camera'], multiple: false }, (error, result) => {
                    if (!error && result && result.event === "success") { document.getElementById('media-link-input').value = result.info.secure_url; }
                }).open();
            });
        }

        window.setupGestor = function() {
            document.querySelectorAll('.editable').forEach(el => {
                if (window.savedLinks[el.dataset.id]) el.classList.add('has-link'); else el.classList.remove('has-link');
                el.onclick = (e) => {
                    if (window.isAdmin) { e.stopPropagation(); e.preventDefault(); window.openLinkModal(el.dataset.id); } 
                    else if (window.savedLinks[el.dataset.id]) { e.stopPropagation(); e.preventDefault(); window.open(window.savedLinks[el.dataset.id], '_blank'); }
                };
            });
            if (window.isAdmin) {
                document.querySelectorAll('.editable-media').forEach(box => {
                    box.onclick = (e) => { e.stopPropagation(); e.preventDefault(); window.openMediaModal(box.dataset.mediaId); };
                });
            }
        }

        document.getElementById('btn-config-cloudinary').addEventListener('click', () => {
            const cName = window.cloudinaryConfig.cloudName;
            const cPreset = window.cloudinaryConfig.preset;
            overlay.innerHTML = `
                <div class="admin-modal-content">
                    <h3 style="font-size: 3vmin; font-weight: 800; margin-bottom: 2vh; color: white;">⚙️ Configuração Cloudinary</h3>
                    <input type="text" id="cfg-cloudname" class="admin-input" value="${cName}" placeholder="Cloud Name">
                    <input type="text" id="cfg-preset" class="admin-input" value="${cPreset}" placeholder="Upload Preset">
                    <div style="display: flex; gap: 2vw; justify-content: flex-end; margin-top: 2vh;">
                        <button class="admin-btn btn-secondary" onclick="window.closeAdminModal()">Cancelar</button>
                        <button class="admin-btn btn-primary" onclick="window.cloudinaryConfig.cloudName=document.getElementById('cfg-cloudname').value.trim(); window.cloudinaryConfig.preset=document.getElementById('cfg-preset').value.trim(); window.saveData(); window.closeAdminModal();">Guardar</button>
                    </div>
                </div>`;
            overlay.style.display = 'flex';
        });

        // =========================================================================
        // MÓDULO AR V177: TWO-STEP VERIFICATION & KINETIC MAPPING
        // =========================================================================
        
        window.triggerARConfirm = function(actionType) {
            if (window.arCooldown) return; 
            
            if (actionType === 'next') window.arPendingAction = () => window.nextSlide();
            if (actionType === 'prev') window.arPendingAction = () => window.prevSlide();
            if (actionType === 'action') window.arPendingAction = () => window.triggerRemoteAction();

            document.getElementById('ar-main-buttons').style.display = 'none';
            document.getElementById('ar-confirm-buttons').style.display = 'flex';
            
            if(window.arConfirmTimeout) clearTimeout(window.arConfirmTimeout);
            window.arConfirmTimeout = setTimeout(() => {
                window.cancelARConfirm();
            }, 6000);
        };

        window.executeARConfirm = function() {
            if (window.arPendingAction) window.arPendingAction();
            window.cancelARConfirm(); 
            
            window.arCooldown = true;
            setTimeout(() => { window.arCooldown = false; }, 2000);
        };

        window.cancelARConfirm = function() {
            if(window.arConfirmTimeout) clearTimeout(window.arConfirmTimeout);
            window.arPendingAction = null;
            document.getElementById('ar-confirm-buttons').style.display = 'none';
            document.getElementById('ar-main-buttons').style.display = 'flex';
        };

        window.ARController = {
            isActive: false, video: null, canvas: null, ctx: null, detector: null, lastTime: 0,
            cursor: { x: 0, y: 0, active: false }, hoverTime: 0, hoveredElement: null,

            async toggle() {
                if (this.isActive) { 
                    this.stop(); 
                } else { 
                    document.getElementById('ar-status-warning').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Iniciando Motor Holográfico...';
                    document.getElementById('ar-status-warning').style.display = 'block';
                    await this.start(); 
                }
            },

            async start() {
                try {
                    if (typeof tf === 'undefined' || typeof poseDetection === 'undefined') {
                        alert("As bibliotecas de IA estão a carregar. Verifique a internet.");
                        document.getElementById('ar-status-warning').style.display = 'none';
                        return;
                    }

                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        alert("Câmera bloqueada. O link precisa ser https://");
                        document.getElementById('ar-status-warning').style.display = 'none';
                        return;
                    }

                    this.video = document.getElementById('ar-video');
                    this.canvas = document.getElementById('ar-canvas');
                    this.ctx = this.canvas.getContext('2d');

                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    this.video.srcObject = stream;
                    
                    await new Promise((resolve) => {
                        this.video.onloadedmetadata = () => resolve();
                    });
                    
                    try { await this.video.play(); } catch(e) { console.warn(e); }

                    const w = this.canvas.width = window.innerWidth;
                    const h = this.canvas.height = window.innerHeight;

                    if (!this.detector) {
                        document.getElementById('ar-status-warning').innerHTML = '<i class="fa-solid fa-brain"></i> A calibrar IA Holográfica...';
                        const model = poseDetection.SupportedModels.MoveNet;
                        this.detector = await poseDetection.createDetector(model, { enableSmoothing: true });
                    }

                    this.isActive = true;
                    this.lastTime = performance.now();
                    document.getElementById('ar-status-warning').style.display = 'none';
                    
                    document.getElementById('ar-dashboard').style.display = 'flex';
                    window.cancelARConfirm();
                    window.renderSlide(true); 
                    
                    this.loop();
                } catch(e) {
                    console.error("Erro no AR:", e);
                    alert("Falha ao ativar a Magia AR: " + e.message);
                    document.getElementById('ar-status-warning').style.display = 'none';
                }
            },

            stop() {
                this.isActive = false;
                if (this.video && this.video.srcObject) { this.video.srcObject.getTracks().forEach(t => t.stop()); }
                if (this.ctx) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                document.getElementById('ar-dashboard').style.display = 'none';
            },

            async loop() {
                if (!this.isActive) return;

                const now = performance.now();
                let dt = (now - this.lastTime) / 1000;
                if(dt > 0.1) dt = 0.016;
                this.lastTime = now;

                const w = this.canvas.width = window.innerWidth;
                const h = this.canvas.height = window.innerHeight;
                this.ctx.clearRect(0, 0, w, h);

                let poses = [];
                try { poses = await this.detector.estimatePoses(this.video, { flipHorizontal: false }); } catch(e) {}

                this.cursor.active = false;

                if (poses.length > 0 && !window.arCooldown) {
                    const kps = poses[0].keypoints;
                    const vW = this.video.videoWidth; const vH = this.video.videoHeight;

                    const mapKpx = (valX) => w - (valX / vW) * w;
                    const mapKpy = (valY) => (valY / vH) * h;

                    this.ctx.lineWidth = 6;
                    this.ctx.strokeStyle = "rgba(0, 255, 255, 0.4)";
                    this.ctx.fillStyle = "#fff";

                    const drawBone = (p1Name, p2Name) => {
                        const kp1 = kps.find(k => k.name === p1Name);
                        const kp2 = kps.find(k => k.name === p2Name);
                        if (kp1 && kp2 && kp1.score > 0.3 && kp2.score > 0.3) {
                            const x1 = mapKpx(kp1.x); const y1 = mapKpy(kp1.y);
                            const x2 = mapKpx(kp2.x); const y2 = mapKpy(kp2.y);
                            this.ctx.beginPath(); this.ctx.moveTo(x1, y1); this.ctx.lineTo(x2, y2); this.ctx.stroke();
                            this.ctx.beginPath(); this.ctx.arc(x1, y1, 5, 0, Math.PI*2); this.ctx.fill();
                            this.ctx.beginPath(); this.ctx.arc(x2, y2, 5, 0, Math.PI*2); this.ctx.fill();
                        }
                    };

                    drawBone('left_shoulder', 'right_shoulder'); 
                    drawBone('left_shoulder', 'left_elbow'); drawBone('left_elbow', 'left_wrist');
                    drawBone('right_shoulder', 'right_elbow'); drawBone('right_elbow', 'right_wrist');

                    const rw = kps.find(k => k.name === 'right_wrist');
                    const lw = kps.find(k => k.name === 'left_wrist');
                    const rs = kps.find(k => k.name === 'right_shoulder');
                    const ls = kps.find(k => k.name === 'left_shoulder');

                    let domWrist = null;
                    if (rw && rw.score > 0.4 && lw && lw.score > 0.4) domWrist = rw.y < lw.y ? rw : lw;
                    else if (rw && rw.score > 0.4) domWrist = rw; 
                    else if (lw && lw.score > 0.4) domWrist = lw;

                    if (domWrist) {
                        let isHandRaised = true;
                        let shoulderY = (rs && ls) ? (rs.y + ls.y) / 2 : (vH * 0.5);
                        
                        if (rs && ls && domWrist.y > shoulderY + (vH * 0.15)) {
                            isHandRaised = false; 
                        } else if (domWrist.y > vH * 0.7) {
                            isHandRaised = false; 
                        }

                        if (isHandRaised) {
                            this.cursor.x = mapKpx(domWrist.x);
                            this.cursor.y = mapKpy(domWrist.y);
                            this.cursor.active = true;
                        }
                    }
                }

                let foundClickable = null;
                
                if (this.cursor.active && !window.arCooldown) {
                    const elementsUnderCursor = document.elementsFromPoint(this.cursor.x, this.cursor.y);
                    for (let el of elementsUnderCursor) {
                        if (el.classList.contains('admin-btn-target')) {
                            foundClickable = el;
                            break;
                        }
                    }

                    if (foundClickable) {
                        if (this.hoveredElement !== foundClickable) {
                            this.hoveredElement = foundClickable;
                            this.hoverTime = 0;
                        }
                        this.hoverTime += dt;

                        this.ctx.strokeStyle = "#00ff66";
                        this.ctx.lineWidth = 10;
                        this.ctx.beginPath();
                        this.ctx.arc(this.cursor.x, this.cursor.y, 45, -Math.PI/2, -Math.PI/2 + (this.hoverTime/1.5) * (Math.PI*2));
                        this.ctx.stroke();

                        if (this.hoverTime >= 1.5) {
                            foundClickable.click();
                            this.hoverTime = 0;
                            this.hoveredElement = null; 
                            
                            this.ctx.fillStyle = "rgba(0, 255, 102, 0.8)";
                            this.ctx.beginPath();
                            this.ctx.arc(this.cursor.x, this.cursor.y, 80, 0, Math.PI*2);
                            this.ctx.fill();
                        }
                    } else {
                        this.hoveredElement = null;
                        this.hoverTime = 0;
                    }

                    this.ctx.fillStyle = "rgba(0, 255, 255, 0.9)";
                    this.ctx.beginPath();
                    this.ctx.arc(this.cursor.x, this.cursor.y, 18, 0, Math.PI*2);
                    this.ctx.fill();
                }

                requestAnimationFrame(() => this.loop());
            }
        };

        window.onload = function() { window.renderSlide(true); };
    </script>
</body>
</html>
