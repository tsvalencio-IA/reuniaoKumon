<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA GESTOR - Kumon Rio Preto Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; 
        }
        
        #app-root {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* O Stage fixo que será escalonado */
        #slide-stage {
            width: 1920px;
            height: 1080px;
            background: white;
            position: absolute;
            transform-origin: center center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-kumon-blue { background-color: #00AEEF; }
        .bg-kumon-dark { background-color: #004578; }
        .bg-kumon-orange { background-color: #F39200; }
        .text-kumon-blue { color: #00AEEF; }
        .text-kumon-dark { color: #004578; }

        .slide-transition { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .admin-link-indicator { border: 2px dashed #F39200 !important; cursor: pointer !important; }
        .active-link { cursor: pointer; transition: transform 0.2s; }
        .active-link:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>
    <div id="app-root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [isAdmin, setIsAdmin] = useState(false);
            const [links, setLinks] = useState({});
            const [scale, setScale] = useState(1);
            const logoClicks = useRef(0);

            // Cálculo de Escala Perfeita para Smart TV / Mobile / PC
            useEffect(() => {
                const resize = () => {
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    const scaleW = w / 1920;
                    const scaleH = h / 1080;
                    setScale(Math.min(scaleW, scaleH));
                };
                window.addEventListener('resize', resize);
                resize();
                return () => window.removeEventListener('resize', resize);
            }, []);

            const handleSecretMode = () => {
                logoClicks.current += 1;
                if (logoClicks.current === 3) {
                    const pass = prompt("MODO GESTOR ATIVADO (*177). INSIRA A SENHA:");
                    if (pass === "*177") {
                        setIsAdmin(true);
                        alert("Modo Edição Ativado. Clique nos elementos para vincular links.");
                    }
                    logoClicks.current = 0;
                }
            };

            const handleInteractiveElement = (id) => {
                if (isAdmin) {
                    const url = prompt(`Definir URL para o botão [${id}]:`, links[id] || "");
                    if (url !== null) setLinks({...links, [id]: url});
                } else if (links[id]) {
                    window.open(links[id], '_blank');
                }
            };

            const slides = [
                {
                    id: "capa",
                    type: "cover",
                    title: "REUNIÃO DE PAIS 2026",
                    subtitle: "KUMON RIO PRETO SHOPPING",
                    footer: "Unidade Tia Fernanda",
                    bg: "bg-gradient-to-br from-[#00AEEF] via-[#004578] to-[#010b1a]"
                },
                {
                    id: "toru",
                    title: "TORU KUMON: A ORIGEM",
                    icon: "⭐",
                    points: [
                        "Metodologia nascida da extrema dedicação de um pai.",
                        "Foco total no desenvolvimento pleno da autonomia.",
                        "Baseado no encorajamento e na consistência diária.",
                        "Uma filosofia que transforma vidas além da escola."
                    ]
                },
                {
                    id: "quote",
                    type: "quote",
                    text: "Obter máximo resultado com o mínimo de esforço. Produzir os melhores resultados no menor espaço de tempo é possível.",
                    author: "Toru Kumon",
                    bg: "bg-kumon-orange"
                },
                {
                    id: "oque",
                    title: "O QUE É O KUMON?",
                    grid: [
                        { id: "auto", t: "AUTODIDATISMO", d: "Capacidade de aprender por si, buscando o conhecimento de forma ativa.", i: "🧠" },
                        { id: "mat", t: "MATERIAL DIDÁTICO", d: "Estruturado e autoinstrutivo, evoluindo em pequenos passos.", i: "📚" },
                        { id: "ind", t: "INDIVIDUALIZAÇÃO", d: "Ensino focado no ritmo e na capacidade única de cada aluno.", i: "🎯" },
                        { id: "orient", t: "ORIENTADOR", d: "Guia o aluno a descobrir e alcançar seu próprio potencial máximo.", i: "👨‍🏫" }
                    ]
                },
                {
                    id: "equipe",
                    title: "EQUIPE DA UNIDADE",
                    layout: "team",
                    groups: [
                        {
                            title: "LIDERANÇA E APOIO",
                            members: [
                                { r: "Orientadora", n: "Maria Flavia" },
                                { r: "Gerente Geral", n: "Thamis" },
                                { r: "Psicóloga", n: "Maria Carolina" },
                                { r: "Recepção / Adm", n: "Ingrid e Rafaela" }
                            ]
                        },
                        {
                            title: "CORPO PEDAGÓGICO",
                            members: [
                                { r: "Auxiliares", n: "Tia Dani, Tia Gabi, Tia Ana Julia" },
                                { r: "Auxiliares", n: "Tia Maria Clara, Tia Isadhora, Tio João" },
                                { r: "Estagiário", n: "Tio Bruno (Correção)" }
                            ]
                        }
                    ]
                },
                {
                    id: "pedagogico",
                    title: "ESTRUTURA PEDAGÓGICA",
                    type: "table",
                    rows: [
                        { d: "PORTUGUÊS", ini: "7A ao CII", ava: "DI ao L" },
                        { d: "MATEMÁTICA", ini: "6A ao A", ava: "B ao F | G ao O" },
                        { d: "INGLÊS", ini: "7A ao C", ava: "D ao O" }
                    ]
                },
                {
                    id: "indicadores",
                    title: "INDICADORES REAIS",
                    layout: "stats",
                    stats: [
                        { l: "ALUNOS ATIVOS", v: "364", c: "text-kumon-blue" },
                        { l: "ACIMA DA SÉRIE", v: "197", c: "text-kumon-orange" }
                    ]
                },
                {
                    id: "baby",
                    title: "KUMON BABY",
                    points: [
                        "Atendimento a partir dos 6 meses de idade (estímulos).",
                        "Desenvolvimento motor e cognitivo precoce.",
                        "Preparação para o aprendizado e alfabetização futura.",
                        "Ambiente lúdico, seguro e acolhedor."
                    ],
                    icon: "👶"
                },
                {
                    id: "habitos",
                    type: "quote",
                    text: "Seus filhos vão herdar seus hábitos. Isso te preocupa ou te tranquiliza?",
                    author: "Reflexão para o Futuro",
                    bg: "bg-kumon-dark"
                },
                {
                    id: "sophia",
                    title: "ALUNA DESTAQUE",
                    layout: "video",
                    data: {
                        name: "SOPHIA SANGOLETE",
                        details: [
                            "Início: 16/06/2016",
                            "Matemática Estágio M 111",
                            "Concluinte de Português e Inglês",
                            "Aprovada em Enfermagem (8º FAMEMA / FAMERP)"
                        ]
                    }
                },
                {
                    id: "futuro",
                    title: "A TRÍADE DO SUCESSO",
                    grid: [
                        { id: "unidade", t: "UNIDADE", d: "Planejamento e motivação.", i: "🏢" },
                        { id: "pais", t: "OS PAIS", d: "Acompanhamento e elogios.", i: "👨‍👩‍👧" },
                        { id: "aluno", t: "O ALUNO", d: "Dedicação e autonomia.", i: "🎓" },
                        { id: "futuro_btn", t: "FUTURO", d: "Resultados que transformam.", i: "🚀" }
                    ]
                },
                {
                    id: "fim",
                    type: "end",
                    title: "MUITO OBRIGADO!",
                    subtitle: "Unidade Kumon Rio Preto Shopping",
                    contact: "Tel: (17) 3227-0644"
                }
            ];

            const slide = slides[currentSlide];

            return (
                <div id="slide-stage" style={{ transform: `scale(${scale})` }}>
                    
                    {/* TOP BAR / LOGO */}
                    <div className="absolute top-10 left-10 flex items-center gap-4 z-50">
                        <div 
                            className="w-20 h-20 bg-kumon-blue rounded-full flex items-center justify-center text-white text-3xl font-black cursor-pointer shadow-lg"
                            onClick={handleSecretMode}
                        >K</div>
                        {isAdmin && <span className="bg-orange-500 text-white px-4 py-1 rounded-full text-sm font-bold animate-pulse">ADMIN MODE</span>}
                    </div>

                    <div className={`w-full h-full flex flex-col p-24 slide-transition ${slide.bg || 'bg-white'}`}>
                        
                        {/* HEADER PADRÃO */}
                        {slide.type !== 'cover' && slide.type !== 'end' && (
                            <div className="flex justify-between items-center mb-16 border-b-4 border-slate-50 pb-6">
                                <div className="flex items-center gap-8">
                                    <span className="text-8xl">{slide.icon || "📘"}</span>
                                    <h1 className="text-8xl font-black text-kumon-dark uppercase tracking-tighter">{slide.title}</h1>
                                </div>
                                <div className="text-kumon-blue font-black text-4xl tracking-widest">KUMON 2026</div>
                            </div>
                        )}

                        <div className="flex-grow flex items-center justify-center">
                            
                            {/* CAPA */}
                            {slide.type === 'cover' && (
                                <div className="text-center text-white space-y-12">
                                    <h1 className="text-[180px] font-black leading-none drop-shadow-2xl">{slide.title}</h1>
                                    <div className="h-4 w-96 bg-kumon-orange mx-auto rounded-full"></div>
                                    <p className="text-7xl font-light tracking-[0.5em] opacity-90">{slide.subtitle}</p>
                                    <div className="bg-white/10 backdrop-blur-xl border border-white/20 px-16 py-8 rounded-[40px] inline-block mt-12 shadow-2xl">
                                        <p className="text-4xl font-bold uppercase tracking-[0.5em]">{slide.footer}</p>
                                    </div>
                                </div>
                            )}

                            {/* CITAÇÃO */}
                            {slide.type === 'quote' && (
                                <div className="max-w-[1500px] text-center text-white space-y-20 p-20 bg-black/10 rounded-[80px]">
                                    <h2 className="text-[100px] font-bold italic leading-tight drop-shadow-lg">"{slide.text}"</h2>
                                    <cite className="text-6xl font-black not-italic uppercase tracking-widest block opacity-60">— {slide.author}</cite>
                                </div>
                            )}

                            {/* LISTA DE PONTOS */}
                            {slide.points && (
                                <div className="w-full max-w-[1400px] space-y-10">
                                    {slide.points.map((p, i) => (
                                        <div key={i} className="bg-slate-50 p-12 rounded-[50px] shadow-xl flex items-center gap-12 border-l-[40px] border-kumon-blue">
                                            <div className="text-6xl text-kumon-blue">➜</div>
                                            <p className="text-6xl font-bold text-slate-700 leading-tight">{p}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* GRID INTERATIVO */}
                            {slide.grid && (
                                <div className="grid grid-cols-2 gap-16 w-full max-w-[1600px]">
                                    {slide.grid.map((g, i) => (
                                        <div 
                                            key={i} 
                                            onClick={() => handleInteractiveElement(g.id)}
                                            className={`bg-slate-50 p-16 rounded-[80px] shadow-2xl text-center space-y-10 border-b-[30px] border-kumon-orange transition-all 
                                            ${links[g.id] ? 'active-link' : ''} ${isAdmin ? 'admin-link-indicator' : ''}`}
                                        >
                                            <div className="text-[120px]">{g.i}</div>
                                            <h3 className="text-6xl font-black text-kumon-dark uppercase">{g.t}</h3>
                                            <p className="text-4xl text-slate-400 font-bold leading-relaxed">{g.d}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* EQUIPE */}
                            {slide.layout === 'team' && (
                                <div className="grid grid-cols-2 gap-24 w-full max-w-[1600px]">
                                    {slide.groups.map((group, i) => (
                                        <div key={i} className="space-y-12">
                                            <h3 className="text-6xl font-black text-white bg-kumon-dark p-10 rounded-[40px] uppercase text-center shadow-2xl tracking-tighter">{group.title}</h3>
                                            <div className="space-y-6">
                                                {group.members.map((m, j) => (
                                                    <div key={j} className="bg-slate-50 p-10 rounded-3xl flex justify-between items-center border-r-[25px] border-kumon-blue shadow-lg">
                                                        <span className="text-3xl font-bold text-slate-400 uppercase tracking-widest">{m.r}</span>
                                                        <span className="text-5xl font-black text-kumon-dark">{m.n}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* TABELA */}
                            {slide.type === 'table' && (
                                <div className="w-full max-w-[1600px] rounded-[100px] overflow-hidden shadow-2xl border-8 border-slate-50">
                                    <table className="w-full text-left">
                                        <thead className="bg-kumon-dark text-white text-6xl">
                                            <tr>
                                                <th className="p-20 font-black uppercase">Disciplina</th>
                                                <th className="p-20 font-black uppercase text-center">Inicial</th>
                                                <th className="p-20 font-black uppercase text-kumon-orange text-center">Avançada</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-6xl font-bold text-slate-600">
                                            {slide.rows.map((r, i) => (
                                                <tr key={i} className={i % 2 === 0 ? "bg-white" : "bg-slate-50"}>
                                                    <td className="p-20 border-b border-slate-100">{r.d}</td>
                                                    <td className="p-20 text-center border-b border-slate-100">{r.ini}</td>
                                                    <td className="p-20 text-center border-b border-slate-100 text-kumon-orange font-black">{r.ava}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {/* STATS */}
                            {slide.layout === 'stats' && (
                                <div className="flex gap-24 w-full max-w-[1500px]">
                                    {slide.stats.map((s, i) => (
                                        <div key={i} className="flex-1 bg-slate-50 p-24 rounded-[120px] shadow-2xl text-center border-t-[50px] border-kumon-blue transform hover:scale-105 transition-all">
                                            <div className={`text-[350px] font-black leading-none mb-10 ${s.c}`}>{s.v}</div>
                                            <div className="text-8xl font-black text-slate-300 uppercase tracking-[0.3em]">{s.l}</div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* VÍDEO SOPHIA */}
                            {slide.layout === 'video' && (
                                <div className="bg-slate-50 p-20 rounded-[100px] shadow-2xl w-full max-w-[1700px] border-l-[80px] border-kumon-blue flex items-center gap-20">
                                    <div className="flex-1 space-y-12">
                                        <div className="inline-block bg-kumon-orange text-white px-12 py-4 rounded-full font-black text-4xl uppercase shadow-lg">⭐ Estrela da Unidade</div>
                                        <h3 className="text-[150px] font-black text-kumon-dark leading-none tracking-tighter">{slide.data.name}</h3>
                                        <div className="space-y-6">
                                            {slide.data.details.map((d, i) => (
                                                <div key={i} className="flex items-center gap-8 text-5xl font-bold text-slate-500">
                                                    <span className="text-kumon-blue text-6xl font-black">✔</span> {d}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="w-[800px] aspect-video bg-black rounded-[60px] overflow-hidden shadow-2xl border-[15px] border-white relative group">
                                        <video className="w-full h-full object-cover" controls autoPlay loop muted>
                                            <source src="video_sophia.mp4" type="video/mp4" />
                                            [Player de Vídeo Indisponível]
                                        </video>
                                        <div className="absolute inset-0 bg-kumon-blue/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white text-3xl font-bold">REPRODUZINDO DESTAQUE</div>
                                    </div>
                                </div>
                            )}

                            {/* FIM */}
                            {slide.type === 'end' && (
                                <div className="text-center space-y-24">
                                    <div className="text-[300px] animate-bounce">🤝</div>
                                    <h2 className="text-[200px] font-black text-kumon-dark leading-none tracking-tighter">{slide.title}</h2>
                                    <div className="space-y-8">
                                        <p className="text-8xl font-black text-kumon-blue tracking-widest">{slide.subtitle}</p>
                                        <div className="bg-kumon-dark text-white px-24 py-12 rounded-full text-8xl font-black shadow-2xl inline-block mt-12">{slide.contact}</div>
                                    </div>
                                </div>
                            )}

                        </div>

                        {/* CONTROLES E ASSINATURA */}
                        <footer className="mt-auto flex justify-between items-end border-t-8 border-slate-50 pt-10">
                            <div className="flex gap-10">
                                <button onClick={() => setCurrentSlide(p => Math.max(0, p-1))} className="bg-slate-100 h-24 w-24 rounded-full flex items-center justify-center text-6xl shadow-xl hover:bg-kumon-blue hover:text-white transition-all transform active:scale-90">⬅</button>
                                <button onClick={() => setCurrentSlide(p => Math.min(slides.length-1, p+1))} className="bg-slate-100 h-24 w-24 rounded-full flex items-center justify-center text-6xl shadow-xl hover:bg-kumon-blue hover:text-white transition-all transform active:scale-90">➡</button>
                            </div>
                            <div className="text-right">
                                <div className="text-slate-200 text-4xl font-black uppercase tracking-[0.5em] mb-4">REUNIÃO 2026</div>
                                <div className="text-slate-300 text-xl font-bold italic opacity-80">
                                    powered by <span className="text-kumon-dark font-black">thIAguinho Soluções</span>
                                </div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app-root'));
        root.render(<App />);
    </script>
</body>
</html>
