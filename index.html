<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reunião de Pais 2026 - Kumon Rio Preto Shopping</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Script Oficial Cloudinary -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <!-- FIREBASE COMPAT - REALTIME DATABASE -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <!-- TENSORFLOW & MOVENET (Pacote consolidado) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        /* =========================================================================
           1. RESET E BLOQUEIO DE BOUNCE DA PÁGINA
           ========================================================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #f8fafc; 
            font-family: 'Poppins', sans-serif;
            touch-action: pan-y;
        }

        /* =========================================================================
           2. ARQUITETURA RESPONSIVA (FLEXBOX) - FOCO EM TELÃO (VIVO)
           ========================================================================= */
        #app-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            background-color: transparent; position: relative;
        }

        .bg-blobs::before {
            content: ''; position: fixed; top: -15vh; right: -10vw; width: 60vmin; height: 60vmin;
            background: radial-gradient(circle, rgba(0, 174, 239, 0.12) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }
        .bg-blobs::after {
            content: ''; position: fixed; bottom: -20vh; left: -10vw; width: 80vmin; height: 80vmin;
            background: radial-gradient(circle, rgba(243, 146, 0, 0.08) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }

        :root {
            --k-blue: #00AEEF;
            --k-dark: #004578;
            --k-orange: #F39200;
            --k-yellow: #FFB703;
            --txt-main: #1e293b;
            --txt-muted: #64748b;
        }

        /* =========================================================================
           3. TIPOGRAFIA FLUIDA (Aprimorada para Leitura no Telão)
           ========================================================================= */
        .txt-mega { font-family: 'Nunito', sans-serif; font-size: clamp(3rem, 7vw, 6rem); font-weight: 900; line-height: 1.1; color: var(--k-dark); text-transform: uppercase; letter-spacing: -1px; }
        .txt-title { font-family: 'Nunito', sans-serif; font-size: clamp(2rem, 4.5vw, 4rem); font-weight: 900; color: var(--k-dark); text-transform: uppercase; letter-spacing: -0.5px; }
        .txt-sub { font-size: clamp(1.4rem, 2.8vw, 2.2rem); font-weight: 700; letter-spacing: 0.1em; color: var(--k-blue); text-transform: uppercase; }
        .txt-body { font-size: clamp(1.1rem, 2.2vw, 1.6rem); font-weight: 600; color: var(--txt-main); line-height: 1.5; }
        .txt-small { font-size: clamp(0.8rem, 1.4vw, 1.1rem); font-weight: 700; color: var(--txt-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        
        .icon-xl { font-size: clamp(5rem, 12vw, 9rem); }
        .icon-lg { font-size: clamp(3rem, 6vw, 4.5rem); }
        .icon-md { font-size: clamp(1.8rem, 3.5vw, 2.8rem); }

        /* =========================================================================
           4. ÁREAS DA TELA
           ========================================================================= */
        .progress-bar { 
            position: absolute; top: 0; left: 0; height: 8px; width: 0%; 
            background: linear-gradient(90deg, var(--k-yellow), var(--k-orange)); transition: width 0.4s ease; z-index: 1000; 
        }
        
        .header-area {
            flex: 0 0 auto; padding: 2vh 5vw; border-bottom: 1px solid rgba(0,0,0,0.05); 
            display: flex; align-items: center; z-index: 100;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
        }
        
        .main-area {
            flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
            padding: 5vh 5vw; display: flex; flex-direction: column; position: relative; z-index: 10;
        }
        
        .footer-area {
            flex: 0 0 auto; padding: 2vh 5vw; border-top: 1px solid rgba(0,0,0,0.05); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.95); z-index: 100; box-shadow: 0 -10px 30px rgba(0,0,0,0.03); position: relative;
        }

        /* =========================================================================
           5. LAYOUTS INTERNOS DOS SLIDES (MAIS VIVOS E MODERNOS)
           ========================================================================= */
        .slide { display: none; width: 100%; min-height: 100%; flex-direction: column; justify-content: center; }
        .slide.active { display: flex; animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .layout-row { display: flex; flex-direction: row; flex-wrap: wrap; gap: 30px; width: 100%; align-items: stretch; justify-content: center; }
        .layout-col { display: flex; flex-direction: column; gap: 20px; flex: 1 1 350px; justify-content: center; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; width: 100%; }

        .card-box {
            background: white; padding: 25px 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); border-left: 8px solid var(--k-blue);
            display: flex; align-items: center; gap: 25px; flex: 1;
            transition: transform 0.3s;
        }
        .card-box:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        
        .grid-card {
            background: white; padding: 40px 30px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); border-bottom: 8px solid var(--k-orange);
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            transition: transform 0.3s;
        }
        .grid-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.1); }

        /* V177: MEDIA BOX IMPECÁVEL (Fim dos cortes e distorções) */
        .media-box {
            background: #ffffff; border-radius: 20px; 
            overflow: hidden; width: 100%; aspect-ratio: 16/9; max-height: 60vh;
            border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .slide-sophia .media-box { aspect-ratio: auto; height: 100%; min-height: 450px; }
        .media-box img, .media-box video, .media-box iframe { 
            width: 100%; height: 100%; 
            object-fit: contain; /* NUNCA CORTA A IMAGEM */
            border: none; outline: none; border-radius: 16px; 
        }
        .media-box video, .media-box iframe { background: black; }
        .media-box img { background: transparent; padding: 5px; }

        /* =========================================================================
           6. BOTÕES DO RODAPÉ
           ========================================================================= */
        .btn-nav {
            height: clamp(50px, 7vh, 65px); width: clamp(50px, 7vh, 65px); 
            border-radius: 50%; background: white; color: var(--k-dark);
            display: flex; align-items: center; justify-content: center; font-size: clamp(20px, 3.5vh, 26px); 
            cursor: pointer; border: 2px solid #e2e8f0; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; z-index: 10;
        }
        .btn-nav:hover { background: var(--k-blue); color: white; border-color: var(--k-blue); }
        .btn-nav:active { transform: scale(0.9); }
        
        .btn-logo {
            height: clamp(60px, 8.5vh, 75px); width: clamp(60px, 8.5vh, 75px); 
            border-radius: 50%; background: linear-gradient(135deg, var(--k-blue), var(--k-dark)); color: white;
            display: flex; align-items: center; justify-content: center; font-size: clamp(26px, 4.5vh, 34px); 
            font-weight: 900; cursor: pointer; border: none; box-shadow: 0 8px 20px rgba(0,174,239,0.4); transition: 0.2s; position: relative; z-index: 10;
        }

        .btn-extras {
            background: none; border: none; color: var(--k-dark); cursor: pointer;
            font-size: clamp(22px, 4vmin, 32px); margin-right: 20px; opacity: 0.5; transition: 0.3s; position: relative; z-index: 10;
        }
        .btn-extras:hover, .btn-extras.active-ar { opacity: 1; color: var(--k-blue); }
        .btn-extras.active-ar { color: #00ff66; text-shadow: 0 0 10px #00ff66; }

        /* V177: ESCONDER BOTÕES EM TELA CHEIA (CINEMA MODE) */
        :fullscreen #nav-controls { display: none !important; }
        :-webkit-full-screen #nav-controls { display: none !important; }
        :-ms-fullscreen #nav-controls { display: none !important; }

        /* =========================================================================
           7. MODO GESTOR E MODAIS
           ========================================================================= */
        .admin-mode .editable { outline: 3px dashed var(--k-orange); position: relative; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        .admin-mode .editable:hover { background: rgba(243, 146, 0, 0.1); }
        .admin-mode .editable::before { content: '🔗 LINK'; position: absolute; top: -25px; left: 0; background: var(--k-orange); color: white; font-size: 12px; font-weight: bold; padding: 2px 8px; border-radius: 4px; z-index: 100; }
        .admin-mode .editable-media { outline: 4px dashed var(--k-blue); cursor: pointer; position: relative; }
        .admin-mode .editable-media::after { content: '📸 ALTERAR MÍDIA'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,174,239,0.95); color: white; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; pointer-events: none; }
        .admin-mode .editable-media > * { pointer-events: none !important; }
        .has-link:not(.editable) { cursor: pointer; border-bottom: 3px solid var(--k-blue); }

        /* Tabela Responsiva */
        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        table { width: 100%; min-width: 600px; border-collapse: collapse; background: white; }
        th { background: var(--k-dark); color: white; padding: 20px; font-size: clamp(1.1rem, 2.2vw, 1.4rem); text-align: center; }
        td { padding: 20px; text-align: center; font-size: clamp(1rem, 2vw, 1.3rem); font-weight: 600; color: var(--txt-main); border-bottom: 2px solid #f1f5f9; }
        td:first-child { background: #f8fafc; text-align: left; color: var(--k-dark); font-weight: 800; }

        /* MODAIS CUSTOMIZADOS */
        #admin-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8);
            z-index: 999999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .admin-modal-content {
            background: white; padding: 30px; border-radius: 15px; width: 90vw; max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-family: 'Poppins', sans-serif; max-height: 90vh; overflow-y: auto;
        }
        .admin-input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-bottom: 15px; font-family: 'Poppins', sans-serif; color: #1e293b; }
        .admin-input:focus { outline: none; border-color: var(--k-blue); }
        .admin-btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--k-blue); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--txt-main); }
        .btn-upload { background: var(--k-orange); color: white; width: 100%; margin-bottom: 20px; font-size: 18px !important; padding: 15px !important;}
        .btn-danger { background: #ef4444; color: white; }
        
        .status-warning {
            position: fixed; top: 20px; right: 20px; background: #22c55e; color: white;
            padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: bold;
            z-index: 9999; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .fade-out { animation: fadeOut 5s forwards; animation-delay: 3s; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; display: none; } }
        .pulse { animation: pulse 1.5s infinite; background: #f59e0b; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* =========================================================================
           8. PAINEL DE CONTROLE AR (MINORITY REPORT DASHBOARD)
           ========================================================================= */
        #ar-dashboard {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            z-index: 9990; display: none; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 5vh;
        }
        
        #ar-main-buttons {
            display: flex; flex-direction: column; width: 90vw; gap: 4vh; align-items: center; margin-top: 5vh;
        }
        .ar-row-buttons {
            display: flex; width: 100%; justify-content: space-between; gap: 6vw; height: 25vh;
        }
        
        #ar-confirm-buttons {
            display: none; flex-direction: column; width: 90vw; height: 60vh; 
            justify-content: center; align-items: center; gap: 4vh; margin-top: 2vh;
        }

        .ar-control-btn {
            flex: 1; background: rgba(0, 174, 239, 0.05); border: 4px solid rgba(0, 174, 239, 0.4);
            border-radius: 30px; color: white; font-size: 4.5vmin; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5vmin;
            transition: 0.3s; box-shadow: 0 0 30px rgba(0, 174, 239, 0.1) inset;
            cursor: pointer; outline: none;
        }
        .ar-control-btn i { font-size: 8vmin; color: var(--k-blue); }
        
        .ar-control-btn.orange { border-color: rgba(243, 146, 0, 0.4); box-shadow: 0 0 30px rgba(243, 146, 0, 0.1) inset; }
        .ar-control-btn.orange i { color: var(--k-orange); }
        
        .ar-control-btn.green { border-color: rgba(0, 255, 102, 0.5); box-shadow: 0 0 40px rgba(0, 255, 102, 0.2) inset; width: 80vw; flex: none; height: 20vh; flex-direction: row; gap: 4vw;}
        .ar-control-btn.green i { color: #00ff66; }

        .ar-control-btn.red { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 40px rgba(239, 68, 68, 0.2) inset; width: 80vw; flex: none; height: 20vh; flex-direction: row; gap: 4vw;}
        .ar-control-btn.red i { color: #ef4444; }

        #ar-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9998;
        }

        @media (max-width: 768px) {
            .hide-mobile { display: none !important; }
            .header-area { padding: 15px 20px; }
            .main-area { padding: 25px 5vw; }
            .footer-area { padding: 15px 5vw; }
            .ar-row-buttons { height: 22vh; gap: 4vw; }
            .ar-control-btn { font-size: 5vmin; border-radius: 20px; }
            .ar-control-btn.green, .ar-control-btn.red { height: 15vh; width: 85vw; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="progress-bar" id="progress-bar"></div>
        <div id="firebase-warning" class="status-warning fade-out"><i class="fa-solid fa-cloud-check"></i> BD Sincronizado</div>
        <div id="ar-status-warning" class="status-warning pulse"><i class="fa-solid fa-camera"></i> A Carregar IA Holográfica...</div>

        <!-- CÂMERA ESCONDIDA -->
        <video id="ar-video" playsinline autoplay muted style="display: none;"></video>
        
        <!-- CANVAS DO ESQUELETO MÁGICO -->
        <canvas id="ar-canvas"></canvas>

        <!-- PAINEL DE CONTROLE AR EXCLUSIVO DO ADMIN (Minority Report View) -->
        <div id="ar-dashboard">
            <div style="color: #00AEEF; font-size: 4vmin; font-weight: 900; letter-spacing: 2px; margin-bottom: 1vh; text-align: center;">
                PAINEL HOLOGRÁFICO
            </div>
            
            <div style="color: white; font-size: 2.5vmin; font-weight: 600; margin-bottom: 2vh; text-align: center;">
                EXIBINDO NO TELÃO:<br>
                <span id="ar-dash-slide-name" style="color: #00ff66; font-size: 4.5vmin; text-shadow: 0 0 10px #00ff66;">A CARREGAR...</span>
            </div>

            <!-- Botões Principais (Passo 1) -->
            <div id="ar-main-buttons">
                <div class="ar-row-buttons">
                    <button id="ar-btn-prev" class="ar-control-btn admin-btn-target" onclick="window.triggerARConfirm('prev')">
                        <i class="fa-solid fa-chevron-left"></i> VOLTAR
                    </button>
                    <button id="ar-btn-next" class="ar-control-btn orange admin-btn-target" onclick="window.triggerARConfirm('next')">
                        AVANÇAR <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                
                <!-- Botão de Ação / Play -->
                <button id="ar-btn-action" class="ar-control-btn admin-btn-target" onclick="window.triggerARConfirm('action')" style="display: none; width: 100%; height: 18vh; flex-direction: row; gap: 4vw; border-color: rgba(0, 255, 102, 0.4); box-shadow: 0 0 40px rgba(0, 255, 102, 0.15) inset;">
                    <i class="fa-solid fa-play" style="color: #00ff66;"></i> 
                    <span style="color: #00ff66;">PLAY / ABRIR MÍDIA</span>
                </button>
            </div>

            <!-- Botões de Confirmação (Passo 2) -->
            <div id="ar-confirm-buttons">
                <div style="color: white; font-size: 4vmin; font-weight: bold; margin-bottom: 2vh; text-align: center;">CONFIRME A AÇÃO:</div>
                <button id="ar-btn-ok" class="ar-control-btn green admin-btn-target" onclick="window.executeARConfirm()">
                    <i class="fa-solid fa-check"></i> SIM, EXECUTAR
                </button>
                <button id="ar-btn-cancel" class="ar-control-btn red admin-btn-target" onclick="window.cancelARConfirm()">
                    <i class="fa-solid fa-xmark"></i> CANCELAR
                </button>
            </div>
            
            <button id="btn-ar-close" class="admin-btn-target" onclick="window.ARController.toggle()" style="position: absolute; bottom: 3vh; background: #ef4444; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 2.5vmin; font-weight: bold; cursor: pointer; z-index: 9991; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);">
                <i class="fa-solid fa-power-off"></i> Desligar Painel AR
            </button>
        </div>

        <!-- CONTEÚDO PRINCIPAL DA APRESENTAÇÃO (Visão dos Pais / Projetor) -->
        <header class="header-area" id="main-header">
            <div style="display: flex; align-items: center; gap: 20px; width: 100%;">
                <div id="slide-icon" style="width: 60px; height: 60px; background: linear-gradient(135deg, var(--k-blue), var(--k-dark)); color: white; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,174,239,0.3);">
                    <i class="fa-solid fa-star"></i>
                </div>
                <h2 id="slide-title" class="txt-title" data-id="global_title">Título Padrão</h2>
            </div>
        </header>

        <main class="main-area bg-blobs" id="main-content">
            <!-- Os slides são injetados aqui -->
        </main>

        <footer class="footer-area">
            <!-- V177: Agrupados para sumir na tela cheia -->
            <div id="nav-controls" style="display: flex; gap: 20px; align-items: center;">
                <button id="btn-prev" class="btn-nav"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="logo-btn" class="btn-logo" title="Gestor: 3 Cliques">K</button>
                <button id="btn-next" class="btn-nav"><i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <!-- CONTAINER PARA BOTÕES ADMIN OCULTOS -->
            <div id="admin-actions" style="display: none; position: absolute; left: 50%; transform: translateX(-50%); gap: 15px; z-index: 1000; align-items: center;">
                <button id="btn-ar-toggle" onclick="window.ARController.toggle()" class="btn-extras" style="background: var(--k-dark); color: #00ff66; border: 2px solid #00ff66; padding: 12px 25px; border-radius: 30px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 255, 102, 0.2); opacity: 1;" title="Abrir Painel AR">
                    <i class="fa-solid fa-hand-sparkles"></i> MODO APRESENTADOR (AR)
                </button>
                <button id="btn-config-cloudinary" style="background: var(--k-orange); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(243, 146, 0, 0.4);">
                    <i class="fa-solid fa-gear"></i> CONFIGURAÇÕES
                </button>
            </div>

            <div style="display: flex; align-items: center;">
                <button class="btn-extras hide-mobile" onclick="window.toggleFullScreen()" title="Tela Cheia">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <div class="hide-mobile" style="display: flex; flex-direction: column; align-items: flex-end;">
                    <span class="txt-small" style="color: var(--k-dark);">Reunião 2026</span>
                    <span class="txt-small" style="text-transform: none; color: var(--txt-muted);">powered by <strong style="color: var(--k-blue);">thIAguinho Soluções</strong></span>
                </div>
            </div>
        </footer>
    </div>

    <div id="admin-modal-overlay"></div>

    <script>
        // =====================================================================
        // CHAVES DO FIREBASE (Sincronização Ativa)
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCaFH2nn5VD9eTAdCcdkduDxfg8BbU-dM8",
            authDomain: "reuniaokumon.firebaseapp.com",
            projectId: "reuniaokumon",
            storageBucket: "reuniaokumon.firebasestorage.app",
            messagingSenderId: "672456540538",
            appId: "1:672456540538:web:ffcb6eeb8338bb13d796c3",
            databaseURL: "https://reuniaokumon-default-rtdb.firebaseio.com"
        };
        window.firebaseCfg = firebaseConfig;

        function safeParseJSON(key, defaultObj) {
            try { return localStorage.getItem(key) ? JSON.parse(localStorage.getItem(key)) : defaultObj; } catch (e) { return defaultObj; }
        }

        window.isAdmin = false; window.adminClicks = 0; window.currentEditingId = null;

        // V177: Variáveis de Confirmação AR
        window.arPendingAction = null;
        window.arConfirmTimeout = null;

            else { window.executeMediaAction(); }
        };

        // V177: EXECUÇÃO LOCAL APENAS NA TV (O admin não ouve áudio)
        window.executeMediaAction = function() {
            if (window.isAdmin) return;

            const activeSlide = document.querySelector('.slide.active');
            if (!activeSlide) return;

            const video = activeSlide.querySelector('video.slide-video');
            if (video) {
                if (video.paused) video.play(); else video.pause();
                return;
            }

            const iframe = activeSlide.querySelector('iframe');
            if (iframe) {
                window.ytState = !window.ytState;
                const cmd = window.ytState ? 'playVideo' : 'pauseVideo';
                iframe.contentWindow.postMessage(JSON.stringify({event: 'command', func: cmd, args: ''}), '*');
                return;
            }

            const linkEl = activeSlide.querySelector('.has-link');
            if (linkEl && linkEl.dataset.id && window.savedLinks[linkEl.dataset.id]) {
                window.open(window.savedLinks[linkEl.dataset.id], '_blank');
            }
        };

        window.nextSlide = function() { if (window.currentIndex < slidesData.length - 1) { window.currentIndex++; window.syncSlideState(); window.renderSlide(); } };
        window.prevSlide = function() { if (window.currentIndex > 0) { window.currentIndex--; window.syncSlideState(); window.renderSlide(); } };

        document.getElementById('btn-next').addEventListener('click', window.nextSlide);
        document.getElementById('btn-prev').addEventListener('click', window.prevSlide);

        window.toggleFullScreen = function() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => console.log(e)); } 
            else { if (document.exitFullscreen) document.exitFullscreen(); }
        };

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (['Space', ' ', 'ArrowDown', 'ArrowUp', 'PageDown', 'PageUp'].includes(e.key)) e.preventDefault();

            if (e.key === ' ' || e.key === 'Enter') { window.executeMediaAction(); return; }
            if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === 'ArrowDown') window.nextSlide();
            if (e.key === 'ArrowLeft' || e.key === 'PageUp' || e.key === 'ArrowUp' || e.key === 'Backspace') window.prevSlide();
            if (e.key === 'f' || e.key === 'F') window.toggleFullScreen();
        });

        // GESTOR MANUAL 
        document.getElementById('logo-btn').addEventListener('click', () => {
            window.adminClicks++;
            if (window.adminClicks === 3) {
                const pass = prompt("SISTEMA GESTOR (*177). SENHA:");
                if (pass === "*177") {
                    window.isAdmin = true; document.body.classList.add('admin-mode');
                    document.getElementById('admin-actions').style.display = 'flex';
                    window.renderSlide(); 
                } else { alert("Senha Incorreta."); }
                window.adminClicks = 0;
            }
        });

        const overlay = document.getElementById('admin-modal-overlay');
        window.closeAdminModal = function() { overlay.style.display = 'none'; }
        overlay.addEventListener('click', function(e) { if (e.target === this) window.closeAdminModal(); });

        window.openLinkModal = function(linkId) {
            window.currentEditingId = linkId;
            const currentUrl = (window.savedLinks[linkId]||"").replace(/"/g, '&quot;');
            overlay.innerHTML = '<div class="admin-modal-content"><h3 style="font-size: 24px; font-weight: 800; margin-bottom: 15px; color: var(--k-dark); text-align: center;">🔗 Editar Redirecionamento</h3><input type="text" id="link-input" class="admin-input" value="' + currentUrl + '" placeholder="Ex: https://wa.me/..."><div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap;"><button class="admin-btn btn-secondary" onclick="window.closeAdminModal()">Cancelar</button><button class="admin-btn btn-danger" onclick="delete window.savedLinks[window.currentEditingId]; window.saveData(); window.closeAdminModal(); window.renderSlide();">Remover</button><button class="admin-btn btn-primary" onclick="const v=document.getElementById(\'link-input\').value.trim(); if(v===\'\') delete window.savedLinks[window.currentEditingId]; else window.savedLinks[window.currentEditingId]=v; window.saveData(); window.closeAdminModal(); window.renderSlide();">Salvar</button></div></div>';
            overlay.style.display = 'flex';
        }

        window.openMediaModal = function(mediaId) {
            window.currentEditingId = mediaId;
            const currentUrl = (window.savedMedia[mediaId]||"").replace(/"/g, '&quot;');
            overlay.innerHTML = '<div class="admin-modal-content"><h3 style="font-size: 24px; font-weight: 900; margin-bottom: 10px; color: var(--k-blue); text-align: center;">📸 Enviar ou Alterar Mídia</h3><input type="text" id="media-link-input" class="admin-input" value="' + currentUrl + '" placeholder="Ex: https://youtu.be/... ou arquivo.mp4"><div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap;"><button class="admin-btn btn-secondary" onclick="window.closeAdminModal()">Cancelar</button><button class="admin-btn btn-danger" onclick="delete window.savedMedia[window.currentEditingId]; window.saveData(); window.closeAdminModal(); window.renderSlide();">Restaurar</button><button class="admin-btn btn-primary" onclick="const v=document.getElementById(\'media-link-input\').value.trim(); if(v===\'\') delete window.savedMedia[window.currentEditingId]; else window.savedMedia[window.currentEditingId]=v; window.saveData(); window.closeAdminModal(); window.renderSlide();">Salvar</button></div></div>';
            overlay.style.display = 'flex';
        }

        window.setupGestor = function() {
            document.querySelectorAll('.editable').forEach(el => {
                if (window.savedLinks[el.dataset.id]) el.classList.add('has-link'); else el.classList.remove('has-link');
                el.onclick = (e) => {
                    if (window.isAdmin) { e.stopPropagation(); e.preventDefault(); window.openLinkModal(el.dataset.id); } 
                    else if (window.savedLinks[el.dataset.id]) { e.stopPropagation(); e.preventDefault(); window.open(window.savedLinks[el.dataset.id], '_blank'); }
                };
            });
            if (window.isAdmin) {
                document.querySelectorAll('.editable-media').forEach(box => {
                    box.onclick = (e) => { e.stopPropagation(); e.preventDefault(); window.openMediaModal(box.dataset.mediaId); };
                });
            }
        }

        document.getElementById('btn-config-cloudinary').addEventListener('click', () => {
            const cName = window.cloudinaryConfig.cloudName;
            const cPreset = window.cloudinaryConfig.preset;
            overlay.innerHTML = '<div class="admin-modal-content"><h3 style="font-size: 24px; font-weight: 800; margin-bottom: 15px; color: var(--k-dark);">⚙️ Configuração Cloudinary</h3><input type="text" id="cfg-cloudname" class="admin-input" value="' + cName + '" placeholder="Cloud Name"><input type="text" id="cfg-preset" class="admin-input" value="' + cPreset + '" placeholder="Upload Preset"><div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px;"><button class="admin-btn btn-secondary" onclick="window.closeAdminModal()">Cancelar</button><button class="admin-btn btn-primary" onclick="window.cloudinaryConfig.cloudName=document.getElementById(\'cfg-cloudname\').value.trim(); window.cloudinaryConfig.preset=document.getElementById(\'cfg-preset\').value.trim(); window.saveData(); window.closeAdminModal();">Guardar</button></div></div>';
            overlay.style.display = 'flex';
        });

        // =========================================================================
        // MÓDULO AR V177: KINETIC MAPPING & TWO-STEP VERIFICATION
        // =========================================================================
        
        window.triggerARConfirm = function(actionType) {
            if (actionType === 'next') window.arPendingAction = () => window.nextSlide();
            if (actionType === 'prev') window.arPendingAction = () => window.prevSlide();
            if (actionType === 'action') window.arPendingAction = () => window.triggerRemoteAction();

            document.getElementById('ar-main-buttons').style.display = 'none';
            document.getElementById('ar-confirm-buttons').style.display = 'flex';
            
            if(window.arConfirmTimeout) clearTimeout(window.arConfirmTimeout);
            window.arConfirmTimeout = setTimeout(() => {
                window.cancelARConfirm();
            }, 6000);
        };

        window.executeARConfirm = function() {
            if (window.arPendingAction) {
                window.arPendingAction();
            }
            window.cancelARConfirm(); 
        };

        window.cancelARConfirm = function() {
            if(window.arConfirmTimeout) clearTimeout(window.arConfirmTimeout);
            window.arPendingAction = null;
            document.getElementById('ar-confirm-buttons').style.display = 'none';
            document.getElementById('ar-main-buttons').style.display = 'flex';
        };

        window.ARController = {
            isActive: false, video: null, canvas: null, ctx: null, detector: null, lastTime: 0,
            cursor: { x: 0, y: 0, active: false }, hoverTime: 0, hoveredElement: null,

            async toggle() {
                if (this.isActive) { 
                    this.stop(); 
                } else { 
                    document.getElementById('ar-status-warning').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Iniciando Motor Holográfico...';
                    document.getElementById('ar-status-warning').style.display = 'block';
                    await this.start(); 
                }
            },

            async start() {
                try {
                    if (typeof tf === 'undefined' || typeof poseDetection === 'undefined') {
                        alert("As bibliotecas de Inteligência Artificial ainda estão a carregar. Verifique a sua internet.");
                        document.getElementById('ar-status-warning').style.display = 'none';
                        return;
                    }

                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        alert("O seu navegador bloqueou o acesso à câmera. É obrigatório usar um link 'https://'.");
                        document.getElementById('ar-status-warning').style.display = 'none';
                        return;
                    }

                    this.video = document.getElementById('ar-video');
                    this.canvas = document.getElementById('ar-canvas');
                    this.ctx = this.canvas.getContext('2d');

                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    this.video.srcObject = stream;
                    
                    await new Promise((resolve) => {
                        this.video.onloadedmetadata = () => resolve();
                    });
                    
                    try { await this.video.play(); } catch(e) { console.warn(e); }

                    const w = this.canvas.width = window.innerWidth;
                    const h = this.canvas.height = window.innerHeight;

                    if (!this.detector) {
                        document.getElementById('ar-status-warning').innerHTML = '<i class="fa-solid fa-brain"></i> A calibrar IA Holográfica...';
                        const model = poseDetection.SupportedModels.MoveNet;
                        this.detector = await poseDetection.createDetector(model, { enableSmoothing: true });
                    }

                    this.isActive = true;
                    this.lastTime = performance.now();
                    document.getElementById('ar-status-warning').style.display = 'none';
                    
                    document.getElementById('ar-dashboard').style.display = 'flex';
                    window.cancelARConfirm();
                    window.renderSlide(); 
                    
                    this.loop();
                } catch(e) {
                    console.error("Erro no AR:", e);
                    alert("Falha ao ativar a Magia AR: " + e.message);
                    document.getElementById('ar-status-warning').style.display = 'none';
                }
            },

            stop() {
                this.isActive = false;
                if (this.video && this.video.srcObject) { this.video.srcObject.getTracks().forEach(t => t.stop()); }
                if (this.ctx) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                document.getElementById('ar-dashboard').style.display = 'none';
            },

            async loop() {
                if (!this.isActive) return;

                const now = performance.now();
                let dt = (now - this.lastTime) / 1000;
                if(dt > 0.1) dt = 0.016;
                this.lastTime = now;

                const w = this.canvas.width = window.innerWidth;
                const h = this.canvas.height = window.innerHeight;
                this.ctx.clearRect(0, 0, w, h);

                let poses = [];
                try { poses = await this.detector.estimatePoses(this.video, { flipHorizontal: false }); } catch(e) {}

                this.cursor.active = false;

                if (poses.length > 0) {
                    const kps = poses[0].keypoints;
                    const vW = this.video.videoWidth; const vH = this.video.videoHeight;

                    const mapKpx = (valX) => w - (valX / vW) * w;
                    const mapKpy = (valY) => (valY / vH) * h;

                    this.ctx.lineWidth = 6;
                    this.ctx.strokeStyle = "rgba(0, 255, 255, 0.4)";
                    this.ctx.fillStyle = "#fff";

                    const drawBone = (p1Name, p2Name) => {
                        const kp1 = kps.find(k => k.name === p1Name);
                        const kp2 = kps.find(k => k.name === p2Name);
                        if (kp1 && kp2 && kp1.score > 0.3 && kp2.score > 0.3) {
                            const x1 = mapKpx(kp1.x); const y1 = mapKpy(kp1.y);
                            const x2 = mapKpx(kp2.x); const y2 = mapKpy(kp2.y);
                            this.ctx.beginPath(); this.ctx.moveTo(x1, y1); this.ctx.lineTo(x2, y2); this.ctx.stroke();
                            this.ctx.beginPath(); this.ctx.arc(x1, y1, 5, 0, Math.PI*2); this.ctx.fill();
                            this.ctx.beginPath(); this.ctx.arc(x2, y2, 5, 0, Math.PI*2); this.ctx.fill();
                        }
                    };

                    drawBone('left_shoulder', 'right_shoulder'); 
                    drawBone('left_shoulder', 'left_elbow'); drawBone('left_elbow', 'left_wrist');
                    drawBone('right_shoulder', 'right_elbow'); drawBone('right_elbow', 'right_wrist');

                    const rw = kps.find(k => k.name === 'right_wrist');
                    const lw = kps.find(k => k.name === 'left_wrist');
                    const rs = kps.find(k => k.name === 'right_shoulder');
                    const ls = kps.find(k => k.name === 'left_shoulder');

                    let domWrist = null;
                    if (rw && rw.score > 0.4 && lw && lw.score > 0.4) domWrist = rw.y < lw.y ? rw : lw;
                    else if (rw && rw.score > 0.4) domWrist = rw; 
                    else if (lw && lw.score > 0.4) domWrist = lw;

                    if (domWrist) {
                        let isHandRaised = true;
                        let shoulderY = (rs && ls) ? (rs.y + ls.y) / 2 : (vH * 0.5);
                        
                        // IGNORA GESTOS ACIDENTAIS (Mão abaixo do peito)
                        if (rs && ls && domWrist.y > shoulderY + (vH * 0.15)) {
                            isHandRaised = false; 
                        } else if (domWrist.y > vH * 0.7) {
                            isHandRaised = false; 
                        }

                        if (isHandRaised) {
                            this.cursor.x = mapKpx(domWrist.x);
                            this.cursor.y = mapKpy(domWrist.y);
                            this.cursor.active = true;
                        }
                    }
                }

                let foundClickable = null;
                
                if (this.cursor.active) {
                    const elementsUnderCursor = document.elementsFromPoint(this.cursor.x, this.cursor.y);
                    for (let el of elementsUnderCursor) {
                        if (el.classList.contains('admin-btn-target')) {
                            foundClickable = el;
                            break;
                        }
                    }

                    if (foundClickable) {
                        if (this.hoveredElement !== foundClickable) {
                            this.hoveredElement = foundClickable;
                            this.hoverTime = 0;
                        }
                        this.hoverTime += dt;

                        this.ctx.strokeStyle = "#00ff66";
                        this.ctx.lineWidth = 10;
                        this.ctx.beginPath();
                        this.ctx.arc(this.cursor.x, this.cursor.y, 45, -Math.PI/2, -Math.PI/2 + (this.hoverTime/1.5) * (Math.PI*2));
                        this.ctx.stroke();

                        if (this.hoverTime >= 1.5) {
                            foundClickable.click();
                            this.hoverTime = 0;
                            this.hoveredElement = null; 
                            
                            this.ctx.fillStyle = "rgba(0, 255, 102, 0.8)";
                            this.ctx.beginPath();
                            this.ctx.arc(this.cursor.x, this.cursor.y, 80, 0, Math.PI*2);
                            this.ctx.fill();
                        }
                    } else {
                        this.hoveredElement = null;
                        this.hoverTime = 0;
                    }

                    this.ctx.fillStyle = "rgba(0, 255, 255, 0.9)";
                    this.ctx.beginPath();
                    this.ctx.arc(this.cursor.x, this.cursor.y, 18, 0, Math.PI*2);
                    this.ctx.fill();
                }

                requestAnimationFrame(() => this.loop());
            }
        };

        window.onload = window.renderSlide;
    </script>
