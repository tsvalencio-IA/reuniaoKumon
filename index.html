<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reunião de Pais 2026 - Kumon Rio Preto Shopping</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 1. BLOQUEIO FÍSICO DA TELA (Zero Scroll) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100vw; height: 100vh;
            overflow: hidden; /* Proíbe qualquer rolagem */
            background-color: #0f172a;
            font-family: 'Poppins', sans-serif;
            touch-action: none; /* Evita que o celular tente rolar a tela */
        }

        /* 2. ARQUITETURA DO VIEWPORT */
        #app-container {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            background-color: white;
            position: relative;
        }

        /* Fundo Animado Baseado no Viewport */
        .bg-blobs::before {
            content: ''; position: absolute; top: -10vh; right: -5vw; width: 40vmin; height: 40vmin;
            background: radial-gradient(circle, rgba(0, 174, 239, 0.08) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }
        .bg-blobs::after {
            content: ''; position: absolute; bottom: -10vh; left: -5vw; width: 50vmin; height: 50vmin;
            background: radial-gradient(circle, rgba(243, 146, 0, 0.05) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }

        /* 3. CORES INSTITUCIONAIS */
        :root {
            --k-blue: #00AEEF;
            --k-dark: #004578;
            --k-orange: #F39200;
            --k-yellow: #FFB703;
            --txt-main: #334155;
        }

        /* 4. TIPOGRAFIA MATEMÁTICA (vmin garante que caiba em qualquer tela) */
        .txt-mega { font-family: 'Nunito', sans-serif; font-size: 8vmin; font-weight: 900; line-height: 1.1; color: var(--k-dark); text-transform: uppercase; }
        .txt-title { font-family: 'Nunito', sans-serif; font-size: 5vmin; font-weight: 900; color: var(--k-dark); text-transform: uppercase; }
        .txt-sub { font-size: 3vmin; font-weight: 700; letter-spacing: 0.3vmin; color: var(--k-blue); text-transform: uppercase; }
        .txt-body { font-size: 2.5vmin; font-weight: 600; color: var(--txt-main); line-height: 1.3; }
        .txt-small { font-size: 1.5vmin; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1vmin; }
        
        .icon-xl { font-size: 12vmin; }
        .icon-lg { font-size: 6vmin; }
        .icon-md { font-size: 3.5vmin; }

        /* 5. GESTÃO DE ÁREAS DA TELA (Garante 100vh no total) */
        .progress-bar { height: 1vh; width: 0%; background: var(--k-orange); transition: width 0.3s; z-index: 50; }
        
        .header-area {
            height: 12vh; width: 100%; display: flex; align-items: center;
            padding: 0 5vw; border-bottom: 0.2vh solid #f1f5f9; z-index: 10;
        }
        
        .main-area {
            height: 75vh; width: 100%; display: flex; flex-direction: column;
            justify-content: center; padding: 2vh 5vw; z-index: 10; position: relative;
        }
        
        .footer-area {
            height: 12vh; width: 100%; display: flex; align-items: center; justify-content: space-between;
            padding: 0 5vw; border-top: 0.2vh solid #f1f5f9; z-index: 10; background: white;
        }

        /* 6. LAYOUTS INTERNOS (Sempre flexionam para caber) */
        .slide { display: none; width: 100%; height: 100%; flex-direction: column; }
        .slide.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .flex-row-locked { display: flex; flex-direction: row; gap: 4vw; height: 100%; align-items: center; }
        .flex-col-locked { display: flex; flex-direction: column; gap: 2vh; height: 100%; justify-content: center; }
        
        /* Grid flexível para caber na altura */
        .grid-locked { display: grid; gap: 2vmin; height: 100%; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        /* Adaptação estrita para celulares (Mantém na tela) */
        @media (orientation: portrait) {
            .flex-row-locked { flex-direction: column; justify-content: space-evenly; gap: 2vh; }
            .grid-2, .grid-4 { grid-template-columns: 1fr; grid-auto-rows: minmax(0, 1fr); }
            .txt-mega { font-size: 10vmin; }
            .txt-title { font-size: 7vmin; }
            .txt-body { font-size: 3.5vmin; }
            .media-box { height: 30vh !important; } /* Restringe mídia em pé */
        }

        /* 7. ELEMENTOS VISUAIS */
        .card-box {
            background: white; padding: 2vmin 3vmin; border-radius: 2vmin;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.08); border-left: 1vmin solid var(--k-blue);
            display: flex; align-items: center; gap: 3vmin; flex: 1; min-height: 0;
        }
        
        .grid-card {
            background: white; padding: 3vmin; border-radius: 3vmin;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.08); border-bottom: 1vmin solid var(--k-orange);
            display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; min-height: 0;
        }

        .media-box {
            background: black; border-radius: 3vmin; overflow: hidden;
            width: 100%; height: 100%; border: 0.5vmin solid white; box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.2);
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .media-box img, .media-box video, .media-box iframe { width: 100%; height: 100%; object-fit: cover; border: none; }

        /* 8. BOTÕES DO RODAPÉ */
        .btn-nav {
            height: 8vh; width: 8vh; border-radius: 50%; background: #f1f5f9; color: var(--k-dark);
            display: flex; align-items: center; justify-content: center; font-size: 3vh; cursor: pointer;
            border: none; transition: 0.2s; box-shadow: 0 0.5vh 1vh rgba(0,0,0,0.05);
        }
        .btn-nav:active { transform: scale(0.9); }
        .btn-logo {
            height: 10vh; width: 10vh; border-radius: 50%; background: var(--k-blue); color: white;
            display: flex; align-items: center; justify-content: center; font-size: 4vh; font-weight: 900; cursor: pointer;
            border: none; box-shadow: 0 1vh 2vh rgba(0,174,239,0.3); transition: 0.2s;
        }

        /* 9. MODO GESTOR E EDIÇÃO (*177) */
        .admin-mode .editable {
            outline: 0.4vmin dashed var(--k-orange); position: relative; cursor: pointer; border-radius: 1vmin;
            transition: background 0.2s;
        }
        .admin-mode .editable:hover { background: rgba(243, 146, 0, 0.1); }
        .admin-mode .editable::before {
            content: '🔗 LINK'; position: absolute; top: -2.5vmin; left: 0; background: var(--k-orange); color: white;
            font-size: 1.5vmin; font-weight: bold; padding: 0.2vmin 1vmin; border-radius: 0.5vmin; z-index: 100;
        }
        
        .admin-mode .editable-media { outline: 0.5vmin dashed var(--k-blue); cursor: pointer; }
        .admin-mode .editable-media::after {
            content: '📸 ALTERAR MÍDIA'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,174,239,0.95); color: white; padding: 1.5vmin 3vmin; border-radius: 1vmin; font-size: 2.5vmin; font-weight: bold;
        }
        .has-link:not(.editable) { cursor: pointer; border-bottom: 0.3vmin solid var(--k-blue); }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Barra Fixa Superior -->
        <div class="progress-bar" id="progress-bar"></div>

        <!-- Header Fixo -->
        <header class="header-area" id="main-header">
            <div style="display: flex; align-items: center; gap: 3vmin; width: 100%;">
                <div id="slide-icon" style="width: 7vh; height: 7vh; background: var(--k-blue); color: white; border-radius: 1.5vh; display: flex; align-items: center; justify-content: center;" class="icon-md">
                    <i class="fa-solid fa-star"></i>
                </div>
                <h2 id="slide-title" class="txt-title editable" data-id="global_title">Título Padrão</h2>
            </div>
        </header>

        <!-- Área de Conteúdo Central (Restrita) -->
        <main class="main-area bg-blobs" id="main-content">
            <!-- Os slides são injetados aqui via JS -->
        </main>

        <!-- Footer Fixo -->
        <footer class="footer-area">
            <div style="display: flex; gap: 2vw; align-items: center;">
                <button onclick="prevSlide()" class="btn-nav"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="triggerAdmin()" class="btn-logo" title="Gestor: 3 Cliques">K</button>
                <button onclick="nextSlide()" class="btn-nav"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end;">
                <span class="txt-small">Reunião 2026</span>
                <span class="txt-small" style="text-transform: none; color: #cbd5e1;">powered by <strong style="color: var(--k-dark);">thIAguinho Soluções</strong></span>
            </div>
        </footer>
    </div>

    <script>
        let currentIndex = 0;
        let isAdmin = false;
        let adminClicks = 0;
        let savedLinks = JSON.parse(localStorage.getItem('kumon_v177_links') || '{}');
        let savedMedia = JSON.parse(localStorage.getItem('kumon_v177_media') || '{}');

        // BANCO DE DADOS: DADOS 100% REAIS BASEADOS NOS PDFs FORNECIDOS
        const slidesData = [
            { id: 'capa', type: 'cover', t: "REUNIÃO DE PAIS 2026", sub: "KUMON RIO PRETO SHOPPING", ext: "Bem-vindos!", bg: "linear-gradient(135deg, #00AEEF, #004578)" },
            { id: 'origem', type: 'list', title: "Toru Kumon: A Origem", icon: "fa-seedling", 
              items: ["A metodologia Kumon nasceu da imensa dedicação de um pai com a educação de seu filho.", "Foco total e absoluto no desenvolvimento da autonomia.", "Baseado no amor e na consistência inabalável de estudos diários."] },
            { id: 'frase1', type: 'quote', text: "Obter máximo resultado com o mínimo de esforço. Produzir os melhores resultados no menor espaço de tempo é possível.", author: "Filosofia Toru Kumon", bg: "#F39200" },
            { id: 'oque', type: 'grid', title: "O que é o Kumon?", icon: "fa-circle-question", grid: [
                { id: 'g1', t: "AUTODIDATISMO", d: "Capacidade de aprender por si, buscando o conhecimento de forma ativa.", i: "fa-brain" },
                { id: 'g2', t: "MATERIAL DIDÁTICO", d: "Estruturado e auto-instrutivo, evoluindo de forma suave e lógica.", i: "fa-book-open" },
                { id: 'g3', t: "INDIVIDUALIZAÇÃO", d: "Ensino focado no ritmo e na capacidade única de cada aluno.", i: "fa-bullseye" },
                { id: 'g4', t: "ORIENTADOR", d: "Guia o aluno a descobrir seu próprio potencial máximo.", i: "fa-compass" }
            ]},
            { id: 'objetivos', type: 'list', title: "Objetivos do Kumon", icon: "fa-rocket",
              items: ["Ressignificar o sentido da educação para crianças e jovens.", "Promover mudança de vida e transformação social, transformando a educação pós-pandemia.", "Garantir uma organização de estudos com sequência lógica e coerente.", "Respeitar o ritmo de cada aluno, construindo a base para a vida toda."] },
            { id: 'historia', type: 'list', title: "Nossa História", icon: "fa-landmark", items: ["Início em 1993 com a pioneira Fernanda Musolino.", "Única unidade Clube Ouro de São José do Rio Preto desde 1998.", "Atingimos a marca incrível de 450 alunos durante a pandemia.", "Liderada por Maria Flavia Musolino desde 2013. Referência em excelência para a Matriz Kumon."] },
            { id: 'equipe', type: 'team', title: "Equipe da Unidade", icon: "fa-users", groups: [
                { t: "Liderança e Gestão", m: ["Orientadora: Maria Flavia", "Gerente Geral: Thamis", "Psicóloga: Maria Carolina (Desenvolvimento de equipe e alunos)", "Recepção / Administrativo: Ingrid e Rafaela"] },
                { t: "Equipe Pedagógica", m: ["Auxiliares: Tia Dani, Tia Gabi, Tia Ana Julia", "Auxiliares: Tia Maria Clara, Tia Isadhora, Tio João", "Estagiário de Correção: Tio Bruno"] }
            ]},
            { id: 'tabela', type: 'table', title: "Estrutura Pedagógica", icon: "fa-sitemap", rows: [
                { mat: "Português", ini: "Estágios 7A ao CII", ava: "Estágios DI ao L" }, 
                { mat: "Matemática", ini: "Estágios 6A ao A", ava: "Estágios B ao F | G ao O" }, 
                { mat: "Inglês", ini: "Estágios 7A ao C", ava: "Estágios D ao O" }
            ]},
            { id: 'indicadores', type: 'stats', title: "Nossos Indicadores", icon: "fa-chart-pie", stats: [
                { label: "Total de Alunos", val: "364", color: "var(--k-blue)" }, { label: "Acima da Série Escolar", val: "197", color: "var(--k-orange)" }
            ]},
            { id: 'baby', type: 'list', title: "Kumon Baby", icon: "fa-baby-carriage",
              items: ["Atendimento especial a partir de 6 meses de idade.", "Estímulos focados desde a primeira infância, com foco motor e cognitivo.", "Construção de uma base sólida para o aprendizado futuro.", "Ambiente lúdico, seguro e extremamente acolhedor para os pequenos."] },
            { id: 'frase2', type: 'quote', text: "Seus filhos vão herdar seus hábitos. Isso te preocupa ou te tranquiliza?", author: "Reflexão para o Futuro", bg: "#004578" },
            { id: 'complemento', type: 'list', title: "Complemento Escolar", icon: "fa-plus",
              items: ["Preenche possíveis lacunas deixadas pelo ensino tradicional.", "Fortalece ativamente a base de aprendizado escolar.", "Desenvolve o tão importante hábito de estudo diário.", "Aumenta a confiança, reduzindo a ansiedade e preparando com autonomia."] },
            { id: 'inclusao', type: 'media-left', title: "TDAH, TDA e Dislexia", icon: "fa-brain", mediaId: "video_tdah", mediaType: "video",
              items: ["Acompanhamento focado no desenvolvimento individual de cada aluno.", "Respeito absoluto ao ritmo e à forma de aprendizado única de cada criança.", "Apoio e direcionamento da nossa psicóloga, Maria Carolina, atuando junto à equipe.", "Material didático que permite o aumento da capacidade de concentração de forma gradativa.", "Parceria e comunicação contínua entre a unidade Kumon, a escola regular e a família."] },
            { id: 'sophia', type: 'sophia', title: "Aluna Destaque", name: "Sophia Sangolete", mediaId: "video_sophia",
              details: ["Início: 16/06/2016 (Matemática).", "Atual: Matemática Estágio M 111.", "Concluinte das disciplinas de Português e Inglês."] },
            { id: 'connect', type: 'list', title: "Kumon Connect", icon: "fa-tablet-screen-button",
              items: ["A evolução do nosso método tradicional para o formato digital.", "Estudo diário realizado através de tablets e canetas interativas.", "Correção ágil e acompanhamento da evolução em tempo real.", "Sustentabilidade e inovação educacional na palma da mão."] },
            { id: 'triade', type: 'grid', title: "A Tríade Kumon", icon: "fa-circle-nodes", grid: [
                { id: 'tr1', t: "A Unidade", d: "Responsável pelo planejamento adequado, orientação individual e motivação constante do aluno.", i: "fa-school" },
                { id: 'tr2', t: "Os Pais", d: "Essenciais no acompanhamento diário, fornecendo elogios, apoio e um ambiente tranquilo.", i: "fa-house-chimney-user" },
                { id: 'tr3', t: "O Aluno", d: "Protagonista do método, focado na resolução diária, dedicação e busca pela autonomia.", i: "fa-user-graduate" }
            ]},
            { id: 'avisos', type: 'list', title: "Avisos Importantes", icon: "fa-bell", items: ["Atenção máxima aos horários de aula agendados na unidade. Chegar no horário garante o fluxo!", "As reposições devem ser marcadas sempre com antecedência na recepção.", "Lembre-se: A consistência diária é o que garante os resultados do método.", "Mantenham sempre comunicação aberta com a nossa equipe administrativa."] },
            { id: 'fim', type: 'end', title: "MUITO OBRIGADO!", subtitle: "Unidade Kumon Rio Preto Shopping", contact: "Tel: 3227-0644" }
        ];

        // GESTÃO DE MÍDIA INTELIGENTE
        function getMediaTag(mediaId, defaultType) {
            let src = savedMedia[mediaId];
            if (!src) return `<div style="color: white; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; opacity: 0.5;"><i class="fa-solid fa-play-circle icon-xl"></i><br><span class="txt-small" style="color: white; margin-top: 1vh;">Área de Mídia (Vídeo/Imagem)</span></div>`;
            
            // Detecta YouTube
            if (src.includes('youtube.com') || src.includes('youtu.be')) {
                let vid = src.split('v=')[1] || src.split('youtu.be/')[1];
                if(vid && vid.includes('&')) vid = vid.split('&')[0];
                return `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=0" allowfullscreen></iframe>`;
            }
            // Detecta Video Local MP4
            if (src.endsWith('.mp4') || defaultType === 'video') return `<video src="${src}" controls></video>`;
            
            // Fallback Imagem
            return `<img src="${src}" alt="Midia" />`;
        }

        // MOTOR DE RENDERIZAÇÃO ABSOLUTO
        function renderSlide() {
            const data = slidesData[currentIndex];
            const mainContent = document.getElementById('main-content');
            const header = document.getElementById('main-header');
            let html = '';

            // Configurações Globais
            document.body.style.background = data.bg ? data.bg : '#0f172a';
            document.getElementById('app-container').style.background = data.bg ? 'transparent' : 'white';
            
            // Exibir ou Ocultar Header
            if(data.type === 'cover' || data.type === 'quote' || data.type === 'end') {
                header.style.display = 'none';
            } else {
                header.style.display = 'flex';
                document.getElementById('slide-title').innerHTML = data.title;
                document.getElementById('slide-title').dataset.id = `${data.id}_title`;
                document.getElementById('slide-icon').innerHTML = `<i class="fa-solid ${data.icon}"></i>`;
                
                const isDark = data.bg ? true : false;
                document.getElementById('slide-title').style.color = isDark ? 'white' : 'var(--k-dark)';
            }

            // INJEÇÃO DE CONTEÚDO
            
            // SLIDE: CAPA
            if (data.type === 'cover') {
                html = `
                    <div class="flex-col-locked" style="align-items: center; text-align: center; height: 100%;">
                        <h1 class="txt-mega editable text-white" data-id="${data.id}_t" style="text-shadow: 0 1vh 2vh rgba(0,0,0,0.3); color: white;">${data.t}</h1>
                        <div style="width: 20vw; height: 1vh; background: var(--k-orange); border-radius: 1vh;"></div>
                        <p class="txt-sub editable text-white" data-id="${data.id}_sub" style="color: white; margin-top: 2vh;">${data.sub}</p>
                        <div class="editable" data-id="${data.id}_ext" style="margin-top: 4vh; background: rgba(255,255,255,0.15); border: 0.3vh solid rgba(255,255,255,0.3); padding: 2vh 4vw; border-radius: 4vh;">
                            <p class="txt-body text-white" style="margin:0; color: white; font-weight: 800; font-size: 3vmin;">${data.ext}</p>
                        </div>
                    </div>`;
            } 
            // SLIDE: LISTA PADRÃO
            else if (data.type === 'list') {
                html = `
                    <div class="flex-col-locked" style="width: 100%; max-width: 85vw; margin: auto;">
                        ${data.items.map((item, i) => `
                            <div class="card-box editable" data-id="${data.id}_i${i}" style="border-left-width: 1vmin;">
                                <div style="background: #f0f9ff; color: var(--k-blue); width: 6vmin; height: 6vmin; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;" class="icon-md"><i class="fa-solid fa-check"></i></div>
                                <p class="txt-body" style="margin:0;">${item}</p>
                            </div>
                        `).join('')}
                    </div>`;
            }
            // SLIDE: MÍDIA ESQUERDA OU DIREITA (Usado para TDAH)
            else if (data.type === 'media-left' || data.type === 'media-right') {
                const mediaBlock = `
                    <div class="media-box editable-media" data-media-id="${data.mediaId}" style="flex: 1; border: 0.8vmin solid #e2e8f0;">
                        ${getMediaTag(data.mediaId, data.mediaType)}
                    </div>`;
                
                const listBlock = `
                    <div class="flex-col-locked" style="flex: 1.2;">
                        ${data.items.map((item, i) => `
                            <div class="card-box editable" data-id="${data.id}_i${i}" style="padding: 2vmin; border-left-width: 0.8vmin;">
                                <div style="background: #f0f9ff; color: var(--k-blue); width: 4.5vmin; height: 4.5vmin; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;" class="icon-md"><i class="fa-solid fa-check"></i></div>
                                <p class="txt-body" style="margin:0; font-size: 2.2vmin;">${item}</p>
                            </div>
                        `).join('')}
                    </div>`;
                
                html = `
                    <div class="flex-row-locked w-full h-full" style="align-items: stretch; padding: 2vh 0;">
                        ${data.type === 'media-left' ? mediaBlock + listBlock : listBlock + mediaBlock}
                    </div>`;
            }
            // SLIDE: CITAÇÃO (QUOTE)
            else if (data.type === 'quote') {
                html = `
                    <div class="flex-col-locked" style="align-items: center; text-align: center; max-width: 80vw; margin: auto;">
                        <i class="fa-solid fa-quote-left text-white icon-xl" style="opacity: 0.3;"></i>
                        <h2 class="txt-title editable" data-id="${data.id}_t" style="color: white; font-style: italic; text-transform: none; line-height: 1.4;">"${data.text}"</h2>
                        <cite class="txt-sub editable" data-id="${data.id}_auth" style="color: white; opacity: 0.8; margin-top: 3vh;">— ${data.author}</cite>
                    </div>`;
            }
            // SLIDE: GRID (Tríade, O que é)
            else if (data.type === 'grid') {
                const cols = data.grid.length > 3 ? 'grid-4' : 'grid-2';
                html = `
                    <div class="grid-locked ${cols} w-full h-full" style="align-items: stretch; padding: 2vh 0;">
                        ${data.grid.map(g => `
                            <div class="grid-card editable" data-id="${g.id}" style="justify-content: flex-start; padding-top: 4vh;">
                                <div style="color: var(--k-orange);" class="icon-lg"><i class="fa-solid ${g.i}"></i></div>
                                <h3 class="txt-title" style="margin: 3vh 0 2vh 0; font-size: 3.5vmin;">${g.t}</h3>
                                <p class="txt-body" style="margin:0; text-align: center;">${g.d}</p>
                            </div>
                        `).join('')}
                    </div>`;
            }
            // SLIDE: EQUIPE (Design Premium Melhorado)
            else if (data.type === 'team') {
                html = `
                    <div class="flex-row-locked w-full h-full" style="align-items: flex-start; padding-top: 2vh;">
                        ${data.groups.map((grp, gIdx) => `
                            <div class="flex-col-locked" style="flex: 1; justify-content: flex-start; gap: 2.5vh;">
                                <div style="background: var(--k-dark); color: white; padding: 2vmin; border-radius: 1.5vmin; text-align: center; box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.1);">
                                    <span class="txt-title" style="font-size: 3.5vmin; color: white;">${grp.t}</span>
                                </div>
                                <div class="flex-col-locked" style="gap: 1.5vh; justify-content: flex-start;">
                                    ${grp.m.map((m, mIdx) => `
                                        <div class="card-box editable" data-id="${data.id}_${gIdx}_${mIdx}" style="border-left-width: 1.2vmin; border-left-color: ${gIdx===0 ? 'var(--k-orange)' : 'var(--k-blue)'}; padding: 2.5vmin;">
                                            <p class="txt-body" style="margin:0; font-size: 2.6vmin;">${m}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
            }
            // SLIDE: TABELA (Estrutura Pedagógica Premium)
            else if (data.type === 'table') {
                html = `
                    <div class="flex-col-locked w-full h-full" style="justify-content: center; align-items: center;">
                        <div style="width: 100%; max-width: 90vw; background: white; border-radius: 3vmin; overflow: hidden; box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.1); border: 0.2vmin solid #e2e8f0;">
                            <table style="width: 100%; border-collapse: collapse;">
                                <thead>
                                    <tr style="background: var(--k-dark); color: white;">
                                        <th style="padding: 4vmin; font-size: 3.5vmin; text-align: left; width: 33%; font-family: 'Nunito', sans-serif;">Disciplina</th>
                                        <th style="padding: 4vmin; font-size: 3.5vmin; text-align: center; width: 33%; font-family: 'Nunito', sans-serif;">Orientação Inicial</th>
                                        <th style="padding: 4vmin; font-size: 3.5vmin; text-align: center; width: 33%; color: var(--k-orange); font-family: 'Nunito', sans-serif;">Orientação Avançada</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${data.rows.map((r, i) => `
                                        <tr style="border-bottom: 0.2vmin solid #e2e8f0; background: ${i%2===0?'#f8fafc':'white'};">
                                            <td style="padding: 4vmin; font-size: 3vmin; font-weight: 800; color: var(--k-dark); text-align: left;">${r.mat}</td>
                                            <td style="padding: 4vmin; font-size: 2.8vmin; font-weight: 600; color: var(--txt-main); text-align: center;">${r.ini}</td>
                                            <td style="padding: 4vmin; font-size: 3vmin; font-weight: 900; color: var(--k-orange); text-align: center;">${r.ava}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            }
            // SLIDE: INDICADORES
            else if (data.type === 'stats') {
                html = `
                    <div class="flex-row-locked w-full h-full" style="justify-content: center;">
                        ${data.stats.map((s, i) => `
                            <div class="grid-card editable" data-id="${data.id}_s${i}" style="border-bottom: none; border-top: 2.5vmin solid ${i===0 ? 'var(--k-blue)' : 'var(--k-orange)'}; justify-content: center; gap: 3vh;">
                                <div class="txt-mega" style="font-size: 18vmin; color: ${s.color};">${s.val}</div>
                                <div class="txt-title" style="font-size: 4vmin; color: #94a3b8;">${s.label}</div>
                            </div>
                        `).join('')}
                    </div>`;
            }
            // SLIDE: SOPHIA (Destaque Exclusivo)
            else if (data.type === 'sophia') {
                html = `
                    <div class="flex-row-locked w-full h-full" style="align-items: stretch; padding: 2vh 0;">
                        <div class="flex-col-locked" style="flex: 1.2; background: #f8fafc; padding: 5vmin; border-radius: 3vmin; border-left: 1.5vmin solid var(--k-blue); justify-content: center;">
                            <div style="background: var(--k-yellow); color: var(--k-dark); padding: 1.5vmin 3vmin; border-radius: 3vmin; font-weight: 900; align-self: flex-start; box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.1);" class="txt-small"><i class="fa-solid fa-trophy"></i> ALUNA DE SUCESSO</div>
                            
                            <h3 class="txt-mega editable" data-id="${data.id}_name" style="margin: 3vh 0;">${data.name}</h3>
                            
                            <div class="flex-col-locked" style="gap: 2.5vh; justify-content: flex-start;">
                                ${data.details.map((d, i) => `
                                    <div style="display: flex; align-items: flex-start; gap: 2.5vmin;" class="editable" data-id="${data.id}_d${i}">
                                        <i class="fa-solid fa-check" style="color: var(--k-blue); font-size: 3.5vmin; margin-top: 0.5vmin;"></i>
                                        <span class="txt-body" style="font-size: 3vmin;">${d}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="media-box editable-media" data-media-id="${data.mediaId}" style="flex: 1; border: 0.8vmin solid #e2e8f0; background: black;">
                            ${getMediaTag(data.mediaId, 'video')}
                        </div>
                    </div>`;
            }
            // SLIDE: ENCERRAMENTO
            else if (data.type === 'end') {
                html = `
                    <div class="flex-col-locked" style="align-items: center; text-align: center; height: 100%;">
                        <i class="fa-regular fa-handshake icon-xl" style="color: var(--k-orange); margin-bottom: 2vh;"></i>
                        <h2 class="txt-mega editable" data-id="${data.id}_t" style="font-size: 9vmin;">${data.title}</h2>
                        <p class="txt-sub editable" data-id="${data.id}_sub" style="margin: 2vh 0; color: var(--k-dark);">${data.subtitle}</p>
                        <div class="editable" data-id="${data.id}_contact" style="background: var(--k-blue); color: white; padding: 2.5vh 5vw; border-radius: 5vh; margin-top: 3vh; box-shadow: 0 2vmin 4vmin rgba(0,174,239,0.3);">
                            <span class="txt-title" style="color: white; text-transform: none; font-size: 4vmin;">${data.contact}</span>
                        </div>
                    </div>`;
            }

            mainContent.innerHTML = `<div class="slide active w-full h-full">${html}</div>`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / slidesData.length) * 100}%`;
            setupGestor();
        }

        // CONTROLES DE NAVEGAÇÃO
        function nextSlide() { if (currentIndex < slidesData.length - 1) { currentIndex++; renderSlide(); } }
        function prevSlide() { if (currentIndex > 0) { currentIndex--; renderSlide(); } }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') nextSlide();
            if (e.key === 'ArrowLeft' || e.key === 'Backspace') prevSlide();
        });

        // GESTOR: AUTENTICAÇÃO (*177)
        function triggerAdmin() {
            adminClicks++;
            if (adminClicks === 3) {
                const pass = prompt("SISTEMA GESTOR (*177). SENHA:");
                if (pass === "*177") {
                    isAdmin = true; document.body.classList.add('admin-mode');
                    alert("Painel Gestor Ativado!\n\n1. Clique nos textos tracejados em laranja para inserir links externos.\n2. Clique nas áreas de mídia (tracejadas em azul) para alterar vídeos e imagens.\n\nPara vídeos, digite o nome do arquivo MP4 (ex: video_sophia.mp4) ou um link do YouTube.");
                    renderSlide(); 
                } else {
                    alert("Senha Incorreta.");
                }
                adminClicks = 0;
            }
        }

        // GESTOR: EDIÇÃO DE LINKS E MÍDIAS
        function setupGestor() {
            // Edição de Links
            document.querySelectorAll('.editable').forEach(el => {
                const id = el.dataset.id;
                if (savedLinks[id]) el.classList.add('has-link'); else el.classList.remove('has-link');
                
                el.onclick = (e) => {
                    if (isAdmin) {
                        e.stopPropagation();
                        const val = prompt(`Definir URL de destino (Link):`, savedLinks[id] || "");
                        if (val !== null) { 
                            if (val.trim() === "") delete savedLinks[id]; else savedLinks[id] = val.trim();
                            localStorage.setItem('kumon_v177_links', JSON.stringify(savedLinks)); renderSlide(); 
                        }
                    } else if (savedLinks[id]) { 
                        e.stopPropagation(); window.open(savedLinks[id], '_blank'); 
                    }
                };
            });

            // Edição de Mídias
            if (isAdmin) {
                document.querySelectorAll('.editable-media').forEach(box => {
                    box.onclick = (e) => {
                        e.stopPropagation();
                        const mId = box.dataset.mediaId;
                        const val = prompt("Insira URL (Link do YouTube, arquivo .mp4 local, ou imagem):\n\nExemplo Local: video_sophia.mp4", savedMedia[mId] || "");
                        if (val !== null) {
                            if (val.trim() === "") delete savedMedia[mId]; else savedMedia[mId] = val.trim();
                            localStorage.setItem('kumon_v177_media', JSON.stringify(savedMedia)); renderSlide();
                        }
                    };
                });
            }
        }

        // START
        window.onload = renderSlide;
    </script>
</body>
</html>
