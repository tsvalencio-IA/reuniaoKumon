    <style>
        /* BLOQUEIO FÍSICO DO ECRÃ (Zero Scroll) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Poppins', sans-serif;
            touch-action: none;
        }

        /* ARQUITETURA DO VIEWPORT ABSOLUTO */
        #app-container {
            width: 100vw; height: 100vh;
            background-color: white;
            position: relative;
        }

        .bg-blobs::before {
            content: ''; position: absolute; top: -10vh; right: -5vw; width: 40vmin; height: 40vmin;
            background: radial-gradient(circle, rgba(0, 174, 239, 0.08) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }
        .bg-blobs::after {
            content: ''; position: absolute; bottom: -10vh; left: -5vw; width: 50vmin; height: 50vmin;
            background: radial-gradient(circle, rgba(243, 146, 0, 0.05) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; pointer-events: none;
        }

        /* CORES INSTITUCIONAIS */
        :root {
            --k-blue: #00AEEF;
            --k-dark: #004578;
            --k-orange: #F39200;
            --k-yellow: #FFB703;
            --txt-main: #334155;
        }

        /* TIPOGRAFIA MATEMÁTICA */
        .txt-mega { font-family: 'Nunito', sans-serif; font-size: 8vmin; font-weight: 900; line-height: 1.1; color: var(--k-dark); text-transform: uppercase; }
        .txt-title { font-family: 'Nunito', sans-serif; font-size: 5vmin; font-weight: 900; color: var(--k-dark); text-transform: uppercase; }
        .txt-sub { font-size: 3vmin; font-weight: 700; letter-spacing: 0.3vmin; color: var(--k-blue); text-transform: uppercase; }
        .txt-body { font-size: 2.5vmin; font-weight: 600; color: var(--txt-main); line-height: 1.3; }
        .txt-small { font-size: 1.5vmin; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1vmin; }
        
        .icon-xl { font-size: 12vmin; }
        .icon-lg { font-size: 6vmin; }
        .icon-md { font-size: 3.5vmin; }

        /* GESTÃO DE ÁREAS DA TELA */
        .progress-bar { 
            position: absolute; top: 0; left: 0; height: 1vh; width: 0%; 
            background: var(--k-orange); transition: width 0.3s; z-index: 1000; 
        }
        
        .header-area {
            position: absolute; top: 1vh; left: 0; height: 11vh; width: 100%;
            display: flex; align-items: center; padding: 0 5vw; 
            border-bottom: 0.2vh solid #f1f5f9; z-index: 100;
        }
        
        .main-area {
            position: absolute; top: 0; left: 0; height: 100vh; width: 100vw;
            padding-top: 12vh; padding-bottom: 12vh;
            display: flex; flex-direction: column; justify-content: center; z-index: 10;
        }
        
        .footer-area {
            position: absolute; bottom: 0; left: 0; height: 12vh; width: 100%; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5vw; border-top: 0.2vh solid #f1f5f9; z-index: 100; background: white;
        }

        /* LAYOUTS INTERNOS */
        .slide { display: none; width: 100%; height: 100%; flex-direction: column; padding: 0 5vw; }
        .slide.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .flex-row-locked { display: flex; flex-direction: row; gap: 4vw; height: 100%; align-items: center; }
        .flex-col-locked { display: flex; flex-direction: column; gap: 2vh; height: 100%; justify-content: center; }
        
        .grid-locked { display: grid; gap: 2vmin; height: 100%; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        @media (orientation: portrait) {
            .flex-row-locked { flex-direction: column; justify-content: space-evenly; gap: 2vh; }
            .grid-2, .grid-4 { grid-template-columns: 1fr; grid-auto-rows: minmax(0, 1fr); }
            .txt-mega { font-size: 10vmin; }
            .txt-title { font-size: 7vmin; }
            .txt-body { font-size: 3.5vmin; }
            .media-box { height: 30vh !important; } 
        }

        /* ELEMENTOS VISUAIS */
        .card-box {
            background: white; padding: 2vmin 3vmin; border-radius: 2vmin;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.08); border-left: 1vmin solid var(--k-blue);
            display: flex; align-items: center; gap: 3vmin; flex: 1; min-height: 0;
        }
        
        .grid-card {
            background: white; padding: 3vmin; border-radius: 3vmin;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.08); border-bottom: 1vmin solid var(--k-orange);
            display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; min-height: 0;
        }

        .media-box {
            background: black; border-radius: 3vmin; overflow: hidden;
            width: 100%; height: 100%; border: 0.5vmin solid white; box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.2);
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .media-box img, .media-box video, .media-box iframe { width: 100%; height: 100%; object-fit: cover; border: none; }

        /* BOTÕES DO RODAPÉ */
        .btn-nav {
            height: 8vh; width: 8vh; border-radius: 50%; background: #f1f5f9; color: var(--k-dark);
            display: flex; align-items: center; justify-content: center; font-size: 3vh; cursor: pointer;
            border: none; transition: 0.2s; box-shadow: 0 0.5vh 1vh rgba(0,0,0,0.05);
        }
        .btn-nav:active { transform: scale(0.9); }
        .btn-logo {
            height: 10vh; width: 10vh; border-radius: 50%; background: var(--k-blue); color: white;
            display: flex; align-items: center; justify-content: center; font-size: 4vh; font-weight: 900; cursor: pointer;
            border: none; box-shadow: 0 1vh 2vh rgba(0,174,239,0.3); transition: 0.2s;
        }

        /* Botões Extras */
        .btn-extras {
            background: none; border: none; color: var(--k-dark); cursor: pointer;
            font-size: 3.5vmin; margin-right: 1.5vw; opacity: 0.5; transition: 0.3s;
        }
        .btn-extras:hover, .btn-extras.active-ar { opacity: 1; color: var(--k-blue); }
        .btn-extras.active-ar { color: #00ff66; text-shadow: 0 0 10px #00ff66; }

        /* MODO GESTOR (*177) */
        .admin-mode .editable {
            outline: 0.4vmin dashed var(--k-orange); position: relative; cursor: pointer; border-radius: 1vmin;
            transition: background 0.2s;
        }
        .admin-mode .editable:hover { background: rgba(243, 146, 0, 0.1); }
        .admin-mode .editable::before {
            content: '🔗 LINK'; position: absolute; top: -2.5vmin; left: 0; background: var(--k-orange); color: white;
            font-size: 1.5vmin; font-weight: bold; padding: 0.2vmin 1vmin; border-radius: 0.5vmin; z-index: 100;
        }
        
        .admin-mode .editable-media { 
            outline: 0.5vmin dashed var(--k-blue); cursor: pointer; position: relative;
        }
        .admin-mode .editable-media::after {
            content: '📸 ALTERAR MÍDIA'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,174,239,0.95); color: white; padding: 1.5vmin 3vmin; border-radius: 1vmin; font-size: 2.5vmin; font-weight: bold; pointer-events: none;
        }
        .admin-mode .editable-media > * { pointer-events: none !important; }
        .has-link:not(.editable) { cursor: pointer; border-bottom: 0.3vmin solid var(--k-blue); }

        table { width: 100%; height: 100%; border-collapse: collapse; background: white; border-radius: 2vmin; overflow: hidden; box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.08); }
        th { background: var(--k-dark); color: white; padding: 1.5vmin; font-size: 2.2vmin; text-align: center; }
        td { padding: 1.5vmin; text-align: center; font-size: 2vmin; font-weight: 600; color: var(--txt-main); border-bottom: 0.2vmin solid #f1f5f9; }
        td:first-child { background: #f8fafc; text-align: left; color: var(--k-dark); font-weight: 800; }

        /* MODAIS CUSTOMIZADOS */
        #admin-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8);
            z-index: 999999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .admin-modal-content {
            background: white; padding: 4vmin; border-radius: 2vmin; width: 85vw; max-width: 600px;
            box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.5); font-family: 'Poppins', sans-serif; max-height: 90vh; overflow-y: auto;
        }
        .admin-input { width: 100%; padding: 1.5vmin; border: 0.2vmin solid #cbd5e1; border-radius: 1vmin; font-size: 2vmin; margin-bottom: 1.5vmin; font-family: 'Poppins', sans-serif; color: #1e293b; }
        .admin-input:focus { outline: 0.2vmin solid var(--k-blue); }
        .admin-btn { padding: 1.5vmin 2.5vmin; border: none; border-radius: 1vmin; font-weight: 700; font-size: 2vmin; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--k-blue); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--txt-main); }
        .btn-upload { background: var(--k-orange); color: white; width: 100%; margin-bottom: 2vmin; font-size: 2.2vmin !important; padding: 2vmin !important;}
        .btn-danger { background: #ef4444; color: white; }
        
        .status-warning {
            position: absolute; top: 2vh; right: 2vw; background: #22c55e; color: white;
            padding: 1vmin 2vmin; border-radius: 1vmin; font-size: 1.5vmin; font-weight: bold;
            z-index: 9999; display: none; box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.2);
        }
        .fade-out { animation: fadeOut 5s forwards; animation-delay: 3s; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; display: none; } }
        .pulse { animation: pulse 1.5s infinite; background: #f59e0b; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* AR CANVAS (Camada invisível para o esqueleto) */
        #ar-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9998;
        }
    </style>
</head>

        // CONFIGURAÇÕES BASE E VARIÁVEIS GLOBAIS
        function safeParseJSON(key, defaultObj) {
            try { return localStorage.getItem(key) ? JSON.parse(localStorage.getItem(key)) : defaultObj; } catch (e) { return defaultObj; }
        }

        window.currentIndex = 0; window.isAdmin = false; window.adminClicks = 0; window.currentEditingId = null;

        window.savedLinks = safeParseJSON('kumon_v177_links', {});
        window.savedMedia = safeParseJSON('kumon_v177_media', {});
        window.cloudinaryConfig = safeParseJSON('kumon_v177_cloud', {cloudName: "", preset: ""});
        
        let db = null;
        try {
            firebase.initializeApp(window.firebaseCfg);
            db = firebase.database(); 
            db.ref("kumon_config/settings").on("value", (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    window.savedLinks = data.links || window.savedLinks;
                    window.savedMedia = data.media || window.savedMedia;
                    window.cloudinaryConfig = data.cloudinary || window.cloudinaryConfig;
                    
                    localStorage.setItem('kumon_v177_links', JSON.stringify(window.savedLinks));
                    localStorage.setItem('kumon_v177_media', JSON.stringify(window.savedMedia));
                    localStorage.setItem('kumon_v177_cloud', JSON.stringify(window.cloudinaryConfig));

            document.getElementById('firebase-warning').style.display = 'block';

            if (['Space', ' ', 'ArrowDown', 'ArrowUp', 'PageDown', 'PageUp'].includes(e.key)) e.preventDefault();

            const v = document.querySelector('.slide.active .slide-video');
            if (e.key === ' ' || e.key === 'Enter') {
                if (v) { if (v.paused) v.play(); else v.pause(); return; } 
                else { window.nextSlide(); return; }
            }
            if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === 'ArrowDown') window.nextSlide();
            if (e.key === 'ArrowLeft' || e.key === 'PageUp' || e.key === 'ArrowUp' || e.key === 'Backspace') window.prevSlide();

        // =========================================================================
        // MÓDULO AR (MINORITY REPORT) - IA MOVENET
        // =========================================================================
        window.ARController = {
            isActive: false, video: null, canvas: null, ctx: null, detector: null, lastTime: 0,
            cursor: { x: 0, y: 0, active: false }, hoverTime: 0, hoveredElement: null,

            async toggle() {
                const btn = document.getElementById('btn-ar-toggle');
                if (this.isActive) { this.stop(); btn.classList.remove('active-ar'); } 
                else { btn.classList.add('active-ar'); await this.start(); }
            },

            async start() {
                this.video = document.getElementById('ar-video');
                this.canvas = document.getElementById('ar-canvas');
                this.ctx = this.canvas.getContext('2d');

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    this.video.srcObject = stream;
                    await new Promise(resolve => this.video.onloadedmetadata = resolve);
                    this.video.play();

                    const w = this.canvas.width = window.innerWidth;
                    const h = this.canvas.height = window.innerHeight;

                    document.getElementById('ar-status-warning').style.display = 'block';

                    if (!this.detector) {
                        const model = poseDetection.SupportedModels.MoveNet;
                        this.detector = await poseDetection.createDetector(model, { enableSmoothing: true });
                    }

                    this.isActive = true;
                    this.lastTime = performance.now();
                    document.getElementById('ar-status-warning').style.display = 'none';
                    this.loop();
                } catch(e) {
                    alert("Erro ao acessar a câmera (Verifique as permissões): " + e.message);
                    document.getElementById('btn-ar-toggle').classList.remove('active-ar');
                }
            },

            stop() {
                this.isActive = false;
                if (this.video && this.video.srcObject) { this.video.srcObject.getTracks().forEach(t => t.stop()); }
                if (this.ctx) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            },

            async loop() {
                if (!this.isActive) return;

                const now = performance.now();
                let dt = (now - this.lastTime) / 1000;
                if(dt > 0.1) dt = 0.016;
                this.lastTime = now;

                const w = this.canvas.width = window.innerWidth;
                const h = this.canvas.height = window.innerHeight;
                this.ctx.clearRect(0, 0, w, h);

                let poses = [];
                try { poses = await this.detector.estimatePoses(this.video, { flipHorizontal: false }); } catch(e) {}

                this.cursor.active = false;

                if (poses.length > 0) {
                    const kps = poses[0].keypoints;
                    const vW = this.video.videoWidth; const vH = this.video.videoHeight;

                    // Mapeamento em espelho para câmera frontal
                    const mapKpx = (valX) => w - (valX / vW) * w;
                    const mapKpy = (valY) => (valY / vH) * h;

                    this.ctx.lineWidth = 6;
                    this.ctx.strokeStyle = "rgba(0, 255, 255, 0.6)";
                    this.ctx.fillStyle = "#fff";

                    // Desenha o esqueleto ("bracinhos em palitinhos")
                    const drawBone = (p1Name, p2Name) => {
                        const kp1 = kps.find(k => k.name === p1Name);
                        const kp2 = kps.find(k => k.name === p2Name);
                        if (kp1 && kp2 && kp1.score > 0.25 && kp2.score > 0.25) {
                            const x1 = mapKpx(kp1.x); const y1 = mapKpy(kp1.y);
                            const x2 = mapKpx(kp2.x); const y2 = mapKpy(kp2.y);
                            this.ctx.beginPath(); this.ctx.moveTo(x1, y1); this.ctx.lineTo(x2, y2); this.ctx.stroke();
                            this.ctx.beginPath(); this.ctx.arc(x1, y1, 6, 0, Math.PI*2); this.ctx.fill();
                            this.ctx.beginPath(); this.ctx.arc(x2, y2, 6, 0, Math.PI*2); this.ctx.fill();
                        }
                    };

                    drawBone('left_shoulder', 'right_shoulder'); 
                    drawBone('left_shoulder', 'left_elbow'); drawBone('left_elbow', 'left_wrist');
                    drawBone('right_shoulder', 'right_elbow'); drawBone('right_elbow', 'right_wrist');

                    // Define pulso dominante para ser o cursor
                    const rw = kps.find(k => k.name === 'right_wrist');
                    const lw = kps.find(k => k.name === 'left_wrist');
                    let domWrist = null;
                    if (rw && rw.score > 0.25 && lw && lw.score > 0.25) domWrist = rw.y < lw.y ? rw : lw;
                    else if (rw && rw.score > 0.25) domWrist = rw; 
                    else if (lw && lw.score > 0.25) domWrist = lw;

                    if (domWrist) {
                        this.cursor.x = mapKpx(domWrist.x);
                        this.cursor.y = mapKpy(domWrist.y);
                        this.cursor.active = true;
                    }
                }

                // ==========================================
                // LÓGICA DE INTERAÇÃO (HOVER -> CLICK)
                // ==========================================
                let foundClickable = null;
                
                if (this.cursor.active) {
                    // Ignora o canvas no pointer-events, busca o elemento DOM por baixo
                    const elementsUnderCursor = document.elementsFromPoint(this.cursor.x, this.cursor.y);
                    
                    for (let el of elementsUnderCursor) {
                        // Elementos que podem ser clicados via AR
                        if (
                            el.tagName === 'BUTTON' || 
                            el.id === 'logo-btn' ||
                            el.classList.contains('btn-nav') || 
                            el.classList.contains('admin-btn-target') ||
                            (window.isAdmin && (el.classList.contains('editable') || el.classList.contains('editable-media')))
                        ) {
                            foundClickable = el;
                            break;
                        }
                    }

                    if (foundClickable) {
                        if (this.hoveredElement !== foundClickable) {
                            this.hoveredElement = foundClickable;
                            this.hoverTime = 0;
                        }
                        this.hoverTime += dt;

                        // Desenha anel de carregamento (Verde Neon)
                        this.ctx.strokeStyle = "#00ff66";
                        this.ctx.lineWidth = 10;
                        this.ctx.beginPath();
                        this.ctx.arc(this.cursor.x, this.cursor.y, 45, -Math.PI/2, -Math.PI/2 + (this.hoverTime/1.5) * (Math.PI*2));
                        this.ctx.stroke();

                        // Simula o Clique
                        if (this.hoverTime >= 1.5) {
                            foundClickable.click();
                            this.hoverTime = 0;
                            this.hoveredElement = null; 
                            
                            // Feedback Visual de Clique (Explosão verde)
                            this.ctx.fillStyle = "rgba(0, 255, 102, 0.8)";
                            this.ctx.beginPath();
                            this.ctx.arc(this.cursor.x, this.cursor.y, 80, 0, Math.PI*2);
                            this.ctx.fill();
                        }
                    } else {
                        this.hoveredElement = null;
                        this.hoverTime = 0;
                    }

                    // Desenha o Cursor
                    this.ctx.fillStyle = "rgba(0, 255, 255, 0.9)";
                    this.ctx.beginPath();
                    this.ctx.arc(this.cursor.x, this.cursor.y, 18, 0, Math.PI*2);
                    this.ctx.fill();
                }

                requestAnimationFrame(() => this.loop());
            }
        };

        // Ligar o botão AR à função
        document.getElementById('btn-ar-toggle').addEventListener('click', () => window.ARController.toggle());

        window.onload = window.renderSlide;
    </script>
</body>
</html>
